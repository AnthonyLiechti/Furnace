async function sparkCreateBudgetForProject(projectCode) {
  var container = document.getElementById('sparkProjectBudget');
  if (!container) return;
  container.innerHTML = '<div style="padding:20px;color:var(--mid-gray)">Creating budget...</div>';

  /* Find the project in portfolio */
  var proj = null;
  for (var i = 0; i < CLIENTS.length; i++) {
    for (var j = 0; j < CLIENTS[i].projects.length; j++) {
      if (CLIENTS[i].projects[j].code === projectCode) {
        proj = CLIENTS[i].projects[j];
        proj._clientName = CLIENTS[i].name;
        proj._clientCode = CLIENTS[i].code;
        break;
      }
    }
    if (proj) break;
  }
  if (!proj) {
    container.innerHTML = '<div style="padding:16px 20px;color:var(--ember);font-size:13px;background:var(--white);border-radius:10px;margin-bottom:20px">Could not find project in portfolio.</div>';
    return;
  }

  try {
    /* 1. Check if a Supabase project record already exists */
    var existingProj = await sparkFetch('projects', 'project_code=eq.' + encodeURIComponent(projectCode) + '&select=id');
    var supaProjectId;
    if (existingProj && existingProj.length > 0) {
      supaProjectId = existingProj[0].id;
    } else {
      /* Check if client exists */
      var existingClient = await sparkFetch('clients', 'client_number=eq.' + encodeURIComponent(proj._clientCode) + '&select=id');
      var clientId;
      if (existingClient && existingClient.length > 0) {
        clientId = existingClient[0].id;
      } else {
        var newClient = await sparkFetch('clients', '', 'POST', {
          name: proj._clientName,
          client_number: proj._clientCode
        });
        if (!newClient || !newClient[0]) throw new Error('Failed to create client');
        clientId = newClient[0].id;
      }
      /* Create project */
      var newProj = await sparkFetch('projects', '', 'POST', {
        name: proj.name,
        project_code: projectCode,
        client_id: clientId
      });
      if (!newProj || !newProj[0]) throw new Error('Failed to create project');
      supaProjectId = newProj[0].id;
    }

    /* 2. Create budget record */
    var newBudget = await sparkFetch('budgets', '', 'POST', {
      name: proj.name,
      project_id: supaProjectId,
      status: 'proposed',
      visibility: 'visible',
      client_price: 0,
      total_amount: 0,
      has_discount: false,
      discount_percentage: 0,
      reserve_percentage: 5,
      oop_markup_percentage: 20
    });
    if (!newBudget || !newBudget[0]) throw new Error('Failed to create budget');
    var budgetId = newBudget[0].id;

    /* 2b. Pre-fill all active team members with 0 hours */
    var allTeam = await sparkFetch('team_members', 'select=id,name,department,employment_type&is_active=eq.true&order=name.asc');
    if (allTeam && allTeam.length) {
      var laborBatch = [];
      for (var ti = 0; ti < allTeam.length; ti++) {
        var tm = allTeam[ti];
        var dept = tm.department;
        if (dept && dept !== 'Executive/Admin' && dept !== 'Account' && dept !== 'Creative' && dept !== 'Post') dept = null;
        laborBatch.push({
          budget_id: budgetId, team_member_id: tm.id, department: dept,
          employment_type: tm.employment_type || 'Employee',
          phase1: 0, phase2: 0, phase3_1: 0, phase3_2: 0, phase4: 0, phase5: 0,
          display_order: ti
        });
      }
      await sparkFetch('labor_budget_entries', '', 'POST', laborBatch);
    }

    /* 3. Create default OOP entries from categories template */
    var oopSections = await sparkFetch('oop_sections', 'select=id,slug');
    var oopCats = await sparkFetch('oop_categories', 'select=id,name,section_id&order=display_order.asc');
    if (oopCats && oopCats.length) {
      for (var i = 0; i < oopCats.length; i++) {
        await sparkFetch('oop_budget_entries', '', 'POST', {
          budget_id: budgetId,
          category_id: oopCats[i].id,
          section_id: oopCats[i].section_id,
          line_item_name: oopCats[i].name,
          count: 0,
          rate: 0,
          days: 1,
          head_count: 1,
          is_active: true,
          display_order: i
        });
      }
    }

    /* 4. Update local state so project no longer shows as needs_review */
    sparkBudgetMap[projectCode] = budgetId;
    SUPA_BUDGETS[projectCode] = newBudget[0];
    for (var ci = 0; ci < CLIENTS.length; ci++) {
      for (var pi = 0; pi < CLIENTS[ci].projects.length; pi++) {
        var lp = CLIENTS[ci].projects[pi];
        if (lp.code === projectCode) {
          lp._supabudget = newBudget[0];
          lp.dataSource = 'supabase';
          lp.dollarBudget = 0;
          lp.laborCost = 0;
          lp.oopCost = 0;
          lp.profit = 0;
          lp.totalBudget = 0;
        }
      }
    }
    renderSidebar();

    /* 5. Reload the budget view */
    await sparkLoadBudgetForProject(projectCode);
  } catch (err) {
    console.error('Failed to create budget:', err);
    container.innerHTML = '<div style="padding:16px 20px;color:var(--ember);font-size:13px;background:var(--white);border-radius:10px;margin-bottom:20px">Failed to create budget: ' + err.message + '</div>';
  }
}

async function sparkLoadBudgetForProject(projectCode) {
  var container = document.getElementById('sparkProjectBudget');
  if (!container) return;

  var budgetId = await sparkFindBudgetForProject(projectCode);
  if (!budgetId) {
    /* Issue 4: Show "Create Budget" button for unbudgeted projects */
    container.innerHTML = '<div style="background:var(--white);border-radius:10px;padding:20px;margin-bottom:20px;text-align:center">'
      + '<div style="font-size:13px;color:var(--mid-gray);margin-bottom:12px">No Furnace budget found for <span style="font-family:monospace">' + projectCode + '</span></div>'
      + '<button onclick="sparkCreateBudgetForProject(\'' + projectCode + '\')" style="padding:8px 20px;border-radius:6px;border:none;background:var(--ocean);color:var(--white);cursor:pointer;font-size:13px;font-weight:600">Create Budget</button>'
      + '</div>';
    return;
  }

  /* Load full budget data */
  sparkSelectedBudget = budgetId;
  var loadingEl = container;
  loadingEl.innerHTML = '<div style="padding:20px;color:var(--mid-gray)">Loading budget data...</div>';

  var results = await Promise.all([
    sparkFetch('budgets', 'id=eq.' + budgetId + '&select=*,projects(id,name,project_code,clients(id,name,client_number))'),
    sparkFetch('labor_budget_entries', 'budget_id=eq.' + budgetId + '&select=*,team_member:team_members(id,name,billable_rate,fully_burdened_rate,department,employment_type)&order=department.asc,display_order.asc'),
    sparkFetch('oop_budget_entries', 'budget_id=eq.' + budgetId + '&select=*,section:oop_sections(id,name,slug),category:oop_categories(id,name)&order=display_order.asc'),
    sparkFetch('oop_sections', 'select=*&order=display_order.asc'),
    sparkFetch('oop_categories', 'select=*&order=display_order.asc'),
    sparkFetch('labor_actuals', 'budget_id=eq.' + budgetId + '&select=*,team_member:team_members(id,name,department,employment_type)&order=work_date.desc'),
    sparkFetch('agency_settings', 'select=*&order=category.asc,sort_order.asc')
  ]);

  sparkCurrentData = {
    budget: results[0] && results[0][0] ? results[0][0] : null,
    labor: results[1] || [],
    oop: results[2] || [],
    oopSections: results[3] || [],
    oopCategories: results[4] || [],
    actuals: results[5] || [],
    settings: results[6] || []
  };

  sparkPhaseTab = 'all';
  sparkOopTab = (sparkCurrentData.oopSections.length && sparkCurrentData.oopSections[0].slug) || 'creative';

  if (!sparkCurrentData.budget) {
    container.innerHTML = '<div style="padding:16px 20px;color:var(--mid-gray);font-size:13px;background:var(--white);border-radius:10px;margin-bottom:20px">Could not load budget data. Showing snapshot data below.</div>';
    return;
  }

  /* Render the budget content into the project page (snapshotSection stays collapsed by default) */
  sparkRenderBudgetContent(true);
}

function sparkFmt(n) {
  if (n == null || isNaN(n)) return '$0';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function sparkFmtDec(n) {
  if (n == null || isNaN(n)) return '$0.00';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function sparkGetRate(entry) {
  /* Flat $200/hr agency rate for all labor, always */
  return 200;
}

function sparkGetInternalRate(entry) {
  /* Flat $200/hr — same as client rate, no internal distinction */
  return 200;
}

function sparkEntryHours(entry, phaseKey) {
  if (phaseKey === 'all') {
    var total = 0;
    for (var i = 0; i < SPARK_PHASES.length; i++) {
      total += (entry[SPARK_PHASES[i].key] || 0);
    }
    return total;
  }
  return entry[phaseKey] || 0;
}

function sparkEntryTotal(entry) {
  var rate = sparkGetRate(entry);
  var hrs = 0;
  for (var i = 0; i < SPARK_PHASES.length; i++) {
    hrs += (entry[SPARK_PHASES[i].key] || 0);
  }
  return hrs * rate;
}

function sparkSettingVal(settings, category, key, fallback) {
  for (var i = 0; i < settings.length; i++) {
    if (settings[i].category === category && settings[i].key === key) return parseFloat(settings[i].value) || fallback;
  }
  return fallback;
}

function sparkOopItemTotal(item) {
  /* Planned total (always from planned fields) */
  var rate = item.rate || item.rate_override || item.vendor_rate || 0;
  return (item.count || 0) * rate * (item.days || 1) * (item.head_count || 1);
}

function sparkOopItemEffective(item) {
  /* Cascade: Actual → Adjusted → Planned */
  if (item.actual_amount != null) return item.actual_amount;
  var adjCount = item.adjusted_count, adjRate = item.adjusted_rate, adjDays = item.adjusted_days, adjHead = item.adjusted_head_count;
  if (adjCount != null || adjRate != null) {
    return (adjCount != null ? adjCount : (item.count||0)) * (adjRate != null ? adjRate : (item.rate||0)) * (adjDays != null ? adjDays : (item.days||1)) * (adjHead != null ? adjHead : (item.head_count||1));
  }
  return sparkOopItemTotal(item);
}

function sparkOopItemSpent(item) {
  /* Only counts if Paid is checked */
  if (!item.paid) return 0;
  return sparkOopItemEffective(item);
}

function sparkDebouncedPatchLabor(entryId, phaseKey, value) {
  var timerKey = 'labor-' + entryId + '-' + phaseKey;
  if (sparkSaveTimers[timerKey]) clearTimeout(sparkSaveTimers[timerKey]);
  /* Update local data immediately */
  if (sparkCurrentData && sparkCurrentData.labor) {
    for (var i = 0; i < sparkCurrentData.labor.length; i++) {
      if (sparkCurrentData.labor[i].id === entryId) {
        sparkCurrentData.labor[i][phaseKey] = parseFloat(value) || 0;

  sparkRenderSummary();
  sparkSaveTimers[timerKey] = setTimeout(function() { sparkPatchLabor(entryId, phaseKey, value); }, 500);
}

function sparkDebouncedPatchOop(entryId, field, value) {

  if (sparkSaveTimers[timerKey]) clearTimeout(sparkSaveTimers[timerKey]);

    for (var i = 0; i < sparkCurrentData.oop.length; i++) {

async function sparkAddOopEntry(categoryId, budgetId) {

async function sparkSetProjectStatus(status) {
  if (!sparkCurrentData || !sparkCurrentData.budget) return;
  var budgetId = sparkCurrentData.budget.id;
  sparkShowSaving();
  /* Map our UI statuses to Supabase values */
  var dbStatus = status; /* nonbillable, bizdev, active, complete all stored as-is */
  await sparkFetch('budgets?id=eq.' + budgetId, '', 'PATCH', { status: dbStatus });
  sparkCurrentData.budget.status = dbStatus;
  sparkHideSaving();

  /* Also update the local portfolio project data so sidebar/completed reflects change */
  for (var ci = 0; ci < CLIENTS.length; ci++) {
    for (var pi = 0; pi < CLIENTS[ci].projects.length; pi++) {
      var p = CLIENTS[ci].projects[pi];
      if (p._supabudget && p._supabudget.id === budgetId) {
        if (status === 'complete') {
          p.status = 'complete';
          p.projectType = 'billable';
        } else if (status === 'nonbillable') {
          p.status = 'active';
          p.projectType = 'internal';
        } else if (status === 'bizdev') {
          p.status = 'active';
          p.projectType = 'bizdev';
        } else {
          p.status = 'active';
          p.projectType = 'billable';
        }
      }
    }
  }
  renderSidebar();
  sparkRenderBudgetContent(true);
}

async function sparkSaveSmallProjHours(val) {

  if (!sparkCurrentData || !sparkCurrentData.budget) return;

  if (existing.length > 0) {
    /* Update existing */
    await sparkFetch('labor_budget_entries?id=eq.' + existing[0].id, '', 'PATCH', { phase4: hours });
    existing[0].phase4 = hours;
  } else {
    /* Create new "Team" entry */
    var result = await sparkFetch('labor_budget_entries', '', 'POST', {
      budget_id: budgetId, team_member_id: null, department: null,
      employment_type: 'Employee', phase4: hours, display_order: 0
    });
    if (result && result.length) sparkCurrentData.labor.push(result[0]);
  }
  sparkHideSaving();
}

async function sparkPatchBudgetField(field, value) {
  if (!sparkCurrentData || !sparkCurrentData.budget) return;
  var budgetId = sparkCurrentData.budget.id;
  sparkShowSaving();
  var patch = {};
  patch[field] = value;
  await sparkFetch('budgets?id=eq.' + budgetId, '', 'PATCH', patch);
  sparkCurrentData.budget[field] = value;
  /* Also update the global SUPA_BUDGETS cache so other pages (Needs Attention) see the change */
  var projCode = sparkCurrentData.budget.projects ? sparkCurrentData.budget.projects.project_code : null;
  if (projCode && SUPA_BUDGETS && SUPA_BUDGETS[projCode]) {
    SUPA_BUDGETS[projCode][field] = value;
  }
  sparkHideSaving();
  /* Re-render to reflect changes */
  sparkRenderBudgetContent(true);
}

async function sparkTogglePaidWithDate(entryId, isChecked) {
  sparkShowSaving();
  var today = new Date().toISOString().slice(0, 10);
  var patchData = { paid: isChecked };
  if (isChecked) {
    patchData.paid_date = today;
  } else {
    patchData.paid_date = null;
  }
  await sparkFetch('oop_budget_entries?id=eq.' + entryId, '', 'PATCH', patchData);
  /* Update local data */
  if (sparkCurrentData && sparkCurrentData.oop) {
    for (var i = 0; i < sparkCurrentData.oop.length; i++) {
      if (sparkCurrentData.oop[i].id === entryId) {
        sparkCurrentData.oop[i].paid = isChecked;
        sparkCurrentData.oop[i].paid_date = isChecked ? today : null;
        break;
      }
    }
  }
  sparkHideSaving();
  sparkRenderOopContent();
}

async function sparkDeleteOopEntry(entryId) {
  if (!entryId) return;
  sparkShowSaving();
  await sparkFetch('oop_budget_entries?id=eq.' + entryId, '', 'DELETE');
  sparkHideSaving();
  /* Remove from local data and re-render */
  if (sparkCurrentData && sparkCurrentData.oop) {
    sparkCurrentData.oop = sparkCurrentData.oop.filter(function(e) { return e.id !== entryId; });
  }
  sparkRenderOopContent();
  sparkRenderSummary();
}

function sparkRenderSummary() {
  var el = document.getElementById('sparkSummaryBar');
  if (!el || !sparkCurrentData) return;
  var data = sparkCurrentData;
  var totalLaborHrs = 0, totalLaborCost = 0;
  for (var i = 0; i < data.labor.length; i++) {
    var e = data.labor[i];
    var hrs = sparkEntryHours(e, 'all');
    totalLaborHrs += hrs;
    totalLaborCost += hrs * sparkGetRate(e);
  }
  var totalOop = 0;
  for (var i = 0; i < data.oop.length; i++) {
    if (data.oop[i].is_active !== false) totalOop += sparkOopItemTotal(data.oop[i]);
  }
  var markupPct = sparkSettingVal(data.settings, 'markup', 'oop_markup_percentage', 20);
  var totalOopWithMarkup = totalOop * (1 + markupPct / 100);
  var totalAmount = totalLaborCost + totalOopWithMarkup;
  var budget = data.budget;
  var clientPrice = budget.client_price || 0;
  var profit = clientPrice - totalAmount;
  var margin = clientPrice > 0 ? (profit / clientPrice * 100) : 0;

  var h = '';
  h += '<div class="spark-summary-item"><div class="ss-label">Total Labor</div><div class="ss-value">' + sparkFmt(totalLaborCost) + '</div><div class="ss-sub">' + totalLaborHrs.toFixed(1) + ' hrs</div></div>';
  h += '<div class="spark-summary-item"><div class="ss-label">Total OOP</div><div class="ss-value">' + sparkFmt(totalOopWithMarkup) + '</div><div class="ss-sub">incl. ' + markupPct + '% markup</div></div>';
  h += '<div class="spark-summary-item"><div class="ss-label">Total Amount</div><div class="ss-value">' + sparkFmt(totalAmount) + '</div></div>';
  h += '<div class="spark-summary-item"><div class="ss-label">Client Price</div><div class="ss-value" style="color:var(--sand)">' + sparkFmt(clientPrice) + '</div></div>';
  h += '<div class="spark-summary-item"><div class="ss-label">Reserve</div><div class="ss-value" style="color:' + (profit >= 0 ? '#81C784' : 'var(--ember)') + '">' + sparkFmt(profit) + '</div><div class="ss-sub">' + margin.toFixed(1) + '% margin</div></div>';
  el.innerHTML = h;
}

function sparkRenderLaborContent() {
  var el = document.getElementById('sparkLaborContent');
  if (!el || !sparkCurrentData) return;
  var data = sparkCurrentData;
  var labor = data.labor;
  var phaseKey = sparkPhaseTab;

  /* Group by department */
  var deptGroups = {};
  for (var i = 0; i < SPARK_DEPT_ORDER.length; i++) deptGroups[SPARK_DEPT_ORDER[i]] = [];
  var otherDept = [];
  for (var i = 0; i < labor.length; i++) {
    var dept = labor[i].department || (labor[i].team_member && labor[i].team_member.department) || 'Other';
    if (deptGroups[dept]) deptGroups[dept].push(labor[i]);
    else otherDept.push(labor[i]);
  }

  var h = '<table class="spark-labor-table">';
  h += '<thead><tr><th>Name</th><th class="num">Rate</th>';
  if (phaseKey === 'all') {
    for (var p = 0; p < SPARK_PHASES.length; p++) {
      h += '<th class="num">' + SPARK_PHASES[p].label + '</th>';
    }
  } else {
    h += '<th class="num">Hours</th>';
  }
  h += '<th class="num">Total Hrs</th><th class="num">Total $</th></tr></thead><tbody>';

  var allDepts = SPARK_DEPT_ORDER.slice();
  if (otherDept.length) allDepts.push('Other');

  for (var d = 0; d < allDepts.length; d++) {
    var deptName = allDepts[d];
    var members = deptName === 'Other' ? otherDept : deptGroups[deptName];
    if (!members || !members.length) continue;
    var deptColor = SPARK_DEPT_COLORS[deptName] || 'var(--mid-gray)';

    /* Department subtotals */
    var deptHrs = 0, deptCost = 0;
    for (var m = 0; m < members.length; m++) {
      deptHrs += sparkEntryHours(members[m], 'all');
      deptCost += sparkEntryTotal(members[m]);
    }

    var colCount = phaseKey === 'all' ? SPARK_PHASES.length + 4 : 5;
    h += '<tr class="spark-dept-row"><td colspan="' + colCount + '"><div class="spark-dept-label"><div class="spark-dept-bar" style="background:' + deptColor + '"></div>' + deptName + '<span style="font-weight:400;font-size:11px;color:var(--mid-gray);margin-left:8px">' + deptHrs.toFixed(1) + ' hrs / ' + sparkFmt(deptCost) + '</span></div></td></tr>';

    for (var m = 0; m < members.length; m++) {
      var entry = members[m];
      var name = (entry.team_member && entry.team_member.name) || 'Unknown';
      var rate = sparkGetRate(entry);
      var totalHrs = sparkEntryHours(entry, 'all');
      var totalCost = totalHrs * rate;
      var empType = entry.employment_type || (entry.team_member && entry.team_member.employment_type) || '';
      var isFreelancer = empType === 'Freelancer';

      h += '<tr class="spark-person-row">';
      h += '<td>' + name + (isFreelancer ? ' <span style="font-size:9px;color:var(--mid-gray)">(FL)</span>' : '') + '</td>';
      h += '<td class="num">' + sparkFmtDec(rate) + '</td>';

      if (phaseKey === 'all') {
        for (var p = 0; p < SPARK_PHASES.length; p++) {
          var pk = SPARK_PHASES[p].key;
          var phVal = entry[pk] || 0;
          h += '<td class="num"><input type="number" class="spark-input" value="' + phVal + '" min="0" step="0.5" onchange="sparkDebouncedPatchLabor(\'' + entry.id + '\',\'' + pk + '\',this.value)" oninput="sparkDebouncedPatchLabor(\'' + entry.id + '\',\'' + pk + '\',this.value)"></td>';
        }
      } else {
        var phVal = entry[phaseKey] || 0;
        h += '<td class="num"><input type="number" class="spark-input" value="' + phVal + '" min="0" step="0.5" onchange="sparkDebouncedPatchLabor(\'' + entry.id + '\',\'' + phaseKey + '\',this.value)" oninput="sparkDebouncedPatchLabor(\'' + entry.id + '\',\'' + phaseKey + '\',this.value)"></td>';
      }

      h += '<td class="num" style="font-weight:600">' + totalHrs.toFixed(1) + '</td>';
      h += '<td class="num" style="font-weight:600">' + sparkFmt(totalCost) + '</td>';
      h += '</tr>';
    }
  }

  h += '</tbody></table>';

  /* Add Team Member button */
  h += '<div style="padding:10px 0"><button onclick="sparkShowAddTeamMember()" style="padding:6px 16px;border-radius:6px;border:1px dashed var(--mid-gray);background:transparent;color:var(--mid-gray);cursor:pointer;font-size:12px;font-weight:600">+ Add Team Member</button></div>';

  /* If no labor entries at all, show a helpful message */
  if (!labor.length) {
    h = '<div style="padding:20px;text-align:center;color:var(--mid-gray)">';
    h += '<div style="font-size:14px;margin-bottom:8px">No team members assigned yet</div>';
    h += '<div style="font-size:12px;margin-bottom:14px">Add team members to estimate labor hours by phase.</div>';
    h += '<button onclick="sparkShowAddTeamMember()" style="padding:8px 20px;border-radius:6px;border:none;background:var(--ocean);color:var(--white);cursor:pointer;font-size:13px;font-weight:600">+ Add Team Member</button>';
    h += '</div>';
  }

  el.innerHTML = h;
}

async function sparkShowAddTeamMember() {
  /* Fetch available team members from Supabase */
  var allMembers = await sparkFetch('team_members', 'select=id,name,department,employment_type,billable_rate&is_active=eq.true&order=name.asc');
  if (!allMembers || !allMembers.length) { alert('No team members found in Supabase.'); return; }

  /* Filter out members already in this budget */
  var existingIds = {};
  if (sparkCurrentData && sparkCurrentData.labor) {
    for (var i = 0; i < sparkCurrentData.labor.length; i++) {
      var tmId = sparkCurrentData.labor[i].team_member_id || (sparkCurrentData.labor[i].team_member && sparkCurrentData.labor[i].team_member.id);
      if (tmId) existingIds[tmId] = true;
    }
  }
  var available = allMembers.filter(function(m) { return !existingIds[m.id]; });

  if (!available.length) { alert('All active team members are already assigned.'); return; }

  /* Build a simple dropdown modal */
  var overlay = document.createElement('div');
  overlay.id = 'sparkAddMemberOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';

  var modal = document.createElement('div');
  modal.style.cssText = 'background:var(--white);border-radius:12px;padding:24px;min-width:320px;max-width:400px;max-height:500px;overflow-y:auto';

  var h = '<div style="font-size:16px;font-weight:700;margin-bottom:16px">Add Team Member</div>';
  h += '<div style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">Select team members to add to this budget:</div>';

  for (var i = 0; i < available.length; i++) {
    var m = available[i];
    var dept = m.department || 'Other';
    var type = m.employment_type === 'Freelancer' ? ' (FL)' : '';
    h += '<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:13px">';
    h += '<input type="checkbox" value="' + m.id + '" data-dept="' + dept + '" data-type="' + (m.employment_type || 'Employee') + '">';
    h += m.name + type + ' <span style="font-size:10px;color:var(--mid-gray)">' + dept + '</span>';
    h += '</label>';
  }

  h += '<div style="display:flex;gap:8px;margin-top:16px">';
  h += '<button onclick="sparkAddSelectedMembers()" style="padding:8px 20px;border-radius:6px;border:none;background:var(--ocean);color:var(--white);cursor:pointer;font-size:13px;font-weight:600;flex:1">Add Selected</button>';
  h += '<button onclick="document.getElementById(\'sparkAddMemberOverlay\').remove()" style="padding:8px 16px;border-radius:6px;border:1px solid var(--canvas);background:var(--white);cursor:pointer;font-size:13px;color:var(--mid-gray)">Cancel</button>';
  h += '</div>';

  modal.innerHTML = h;
  overlay.appendChild(modal);
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

async function sparkAddSelectedMembers() {
  var overlay = document.getElementById('sparkAddMemberOverlay');
  if (!overlay) return;
  var checkboxes = overlay.querySelectorAll('input[type="checkbox"]:checked');
  if (!checkboxes.length) { overlay.remove(); return; }

  var budgetId = sparkCurrentData.budget.id;
  sparkShowSaving();

  for (var i = 0; i < checkboxes.length; i++) {
    var tmId = checkboxes[i].value;
    var dept = checkboxes[i].getAttribute('data-dept') || null;
    var empType = checkboxes[i].getAttribute('data-type') || 'Employee';
    if (dept && dept !== 'Executive/Admin' && dept !== 'Account' && dept !== 'Creative' && dept !== 'Post') dept = null;

    var result = await sparkFetch('labor_budget_entries', '', 'POST', {
      budget_id: budgetId,
      team_member_id: tmId,
      department: dept,
      employment_type: empType,
      phase1: 0, phase2: 0, phase3_1: 0, phase3_2: 0, phase4: 0, phase5: 0,
      display_order: sparkCurrentData.labor.length + i
    });
    if (result && result.length) {
      sparkCurrentData.labor.push(result[0]);
    }
  }

  sparkHideSaving();
  overlay.remove();

  /* Reload the full budget to get team_member joins */
  await sparkLoadBudget(budgetId);
}

function sparkToggleOopSection(sectionId) {

  sparkRenderOopContent();
}

function sparkToggleOopCategory(catId) {
  sparkOopCategoryExpanded[catId] = !sparkOopCategoryExpanded[catId];
  sparkRenderOopContent();
}

  if (slug === 'talent') return 'spark-oop-grid-talent';

  h += '<div class="oop-tier-group adjusted">ADJUSTED</div>';
  h += '<div class="oop-tier-group actual">ACTUAL</div>';
  h += '<div></div><div></div><div></div>';

function sparkRenderOopContent() {
  var el = document.getElementById('sparkOopContent');
  if (!el || !sparkCurrentData) return;
  var data = sparkCurrentData;
  var sections = data.oopSections;
  var allCategories = data.oopCategories || [];
  var entries = data.oop;
  var settings = data.settings;
  var markupPct = sparkSettingVal(settings, 'markup', 'oop_markup_percentage', 20);

  if (!sections.length) { el.innerHTML = '<p style="color:var(--mid-gray)">No OOP sections found.</p>'; return; }

  /* Build lookup: sectionId -> categories */
  var catsBySec = {};
  for (var i = 0; i < allCategories.length; i++) {
    var cat = allCategories[i];
    var sid = cat.section_id;
    if (!catsBySec[sid]) catsBySec[sid] = [];
    catsBySec[sid].push(cat);
  }

  /* Build lookup: categoryId -> entries */
  var entriesByCat = {};
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var cid = e.category_id || (e.category ? e.category.id : null) || 'uncategorized';
    if (!entriesByCat[cid]) entriesByCat[cid] = [];
    entriesByCat[cid].push(e);
  }

  var grandTotal = 0;
  var h = '';

  for (var s = 0; s < sections.length; s++) {
    var sec = sections[s];
    var secId = sec.id;
    var slug = sec.slug || '';
    var secExpanded = sparkOopSectionExpanded[secId] !== false; /* default open */
    var secCats = catsBySec[secId] || [];
    var gc = sparkOopGridClass(slug);

    /* Compute section totals */
    var sectionSubtotal = 0;
    var activeItems = 0;
    for (var c = 0; c < secCats.length; c++) {
      var catEntries = entriesByCat[secCats[c].id] || [];
      for (var e = 0; e < catEntries.length; e++) {
        if (catEntries[e].is_active !== false) {
          sectionSubtotal += sparkOopItemTotal(catEntries[e]);
          activeItems++;
        }
      }
    }
    var markupAmt = sectionSubtotal * (markupPct / 100);
    var sectionTotal = sectionSubtotal + markupAmt;
    grandTotal += sectionTotal;

    /* Department display name */
    var deptName = sec.name || 'Section';
    if (slug !== 'travel-meals' && slug !== 'talent') deptName += ' Department';

    h += '<div class="spark-oop-wrap">';

    /* Section header */
    h += '<div class="spark-oop-dept-header" onclick="sparkToggleOopSection(\'' + secId + '\')">';
    h += '<div><span style="font-size:11px;margin-right:6px">' + (secExpanded ? '&#9660;' : '&#9654;') + '</span>';
    h += '<span class="dept-title">' + deptName + '</span>';
    h += '<span class="dept-meta">' + secCats.length + ' categories &middot; ' + activeItems + ' active</span></div>';
    h += '<div class="dept-total">' + sparkFmt(sectionTotal) + '</div>';
    h += '</div>';

    if (secExpanded) {
      h += '<div class="spark-oop-dept-body">';

      /* Column headers */
      h += sparkOopColHeaders(slug);

      /* Categories */
      for (var c = 0; c < secCats.length; c++) {
        var cat = secCats[c];
        var catId = cat.id;
        var catExpanded = !!sparkOopCategoryExpanded[catId];
        var catEntries = entriesByCat[catId] || [];
        var activeCatEntries = [];
        var catTotal = 0;
        for (var e = 0; e < catEntries.length; e++) {
          if (catEntries[e].is_active !== false) {
            activeCatEntries.push(catEntries[e]);
            catTotal += sparkOopItemTotal(catEntries[e]);
          }
        }

        /* Category row */
        h += '<div class="spark-oop-cat-row" onclick="sparkToggleOopCategory(\'' + catId + '\')">';
        h += '<div><span class="cat-toggle">' + (catExpanded ? '&#9660;' : '&#9654;') + '</span>';
        h += '<span class="cat-label">' + (cat.name || 'Unnamed') + '</span>';
        h += '<span class="cat-meta">' + activeCatEntries.length + ' items</span></div>';
        h += '<div class="cat-total">' + sparkFmt(catTotal) + '</div>';
        h += '</div>';

        /* Expanded line items */
        if (catExpanded) {
          if (activeCatEntries.length === 0) {
            h += '<div style="padding:10px 24px;font-size:12px;color:var(--mid-gray)">No active line items.</div>';
          }
          for (var e = 0; e < activeCatEntries.length; e++) {
            var item = activeCatEntries[e];
            var itemRate = item.rate || item.rate_override || item.vendor_rate || 0;
            var itemTotal = sparkOopItemTotal(item);
            var itemName = item.line_item_name || (item.category ? item.category.name : null) || 'Unnamed';

            /* Adjusted values — override planned if set */
            var adjCount = item.adjusted_count;
            var adjRate = item.adjusted_rate;
            var adjDays = item.adjusted_days;
            var adjHead = item.adjusted_head_count;
            var adjTotal = (adjCount != null || adjRate != null) ? (adjCount != null ? adjCount : (item.count||0)) * (adjRate != null ? adjRate : itemRate) * (adjDays != null ? adjDays : (item.days||1)) * (adjHead != null ? adjHead : (item.head_count||1)) : null;

            /* Actual values */
            var actCount = item.actual_count;
            var actRate = item.actual_rate;
            var actDays = item.actual_days;
            var actHead = item.actual_head_count;
            var actAmount = item.actual_amount;
            var actTotal = actAmount != null ? actAmount : ((actCount != null || actRate != null) ? (actCount != null ? actCount : 0) * (actRate != null ? actRate : 0) * (actDays != null ? actDays : 1) * (actHead != null ? actHead : 1) : null);

            var iid = item.id;
            h += '<div class="spark-oop-line-item-3tier">';
            /* Name */
            h += '<div><input type="text" class="spark-input" style="width:100%;text-align:left;font-weight:500" value="' + itemName.replace(/"/g, '&quot;') + '" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'line_item_name\',this.value)" onblur="sparkDebouncedPatchOop(\'' + iid + '\',\'line_item_name\',this.value)"></div>';
            /* ── PLANNED ── */
            h += '<div class="num tier-planned"><input type="number" class="spark-input" value="' + (item.count||0) + '" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'count\',this.value)"></div>';
            h += '<div class="num tier-planned"><input type="number" class="spark-input" value="' + (itemRate||0) + '" min="0" step="0.01" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'rate\',this.value)"></div>';
            if (slug === 'talent' || slug === 'travel-meals') {
              h += '<div class="num tier-planned"><input type="number" class="spark-input" value="' + (item.days||1) + '" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'days\',this.value)"></div>';
            }
            if (slug === 'travel-meals') {
              h += '<div class="num tier-planned"><input type="number" class="spark-input" value="' + (item.head_count||1) + '" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'head_count\',this.value)"></div>';
            }
            h += '<div class="num tier-planned" style="font-weight:600">' + sparkFmt(itemTotal) + '</div>';
            /* ── ADJUSTED ── */
            h += '<div class="num tier-adjusted"><input type="number" class="spark-input adj-input" value="' + (adjCount != null ? adjCount : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'adjusted_count\',this.value)"></div>';
            h += '<div class="num tier-adjusted"><input type="number" class="spark-input adj-input" value="' + (adjRate != null ? adjRate : '') + '" placeholder="—" min="0" step="0.01" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'adjusted_rate\',this.value)"></div>';
            if (slug === 'talent' || slug === 'travel-meals') {
              h += '<div class="num tier-adjusted"><input type="number" class="spark-input adj-input" value="' + (adjDays != null ? adjDays : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'adjusted_days\',this.value)"></div>';
            }

              h += '<div class="num tier-adjusted"><input type="number" class="spark-input adj-input" value="' + (adjHead != null ? adjHead : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'adjusted_head_count\',this.value)"></div>';
            }
            h += '<div class="num tier-adjusted" style="font-weight:600">' + (adjTotal != null ? sparkFmt(adjTotal) : '<span style="opacity:.3">—</span>') + '</div>';
            /* ── ACTUAL ── */
            h += '<div class="num tier-actual"><input type="number" class="spark-input act-input" value="' + (actCount != null ? actCount : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'actual_count\',this.value)"></div>';
            h += '<div class="num tier-actual"><input type="number" class="spark-input act-input" value="' + (actRate != null ? actRate : '') + '" placeholder="—" min="0" step="0.01" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'actual_rate\',this.value)"></div>';
            if (slug === 'talent' || slug === 'travel-meals') {
              h += '<div class="num tier-actual"><input type="number" class="spark-input act-input" value="' + (actDays != null ? actDays : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'actual_days\',this.value)"></div>';
            }
            if (slug === 'travel-meals') {
              h += '<div class="num tier-actual"><input type="number" class="spark-input act-input" value="' + (actHead != null ? actHead : '') + '" placeholder="—" min="0" step="1" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'actual_head_count\',this.value)"></div>';
            }
            h += '<div class="num tier-actual" style="font-weight:600">' + (actTotal != null ? sparkFmt(actTotal) : '<span style="opacity:.3">—</span>') + '</div>';
            /* Paid checkbox + date */
            var isPaid = item.paid || false;
            var paidDate = item.paid_date || '';
            h += '<div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px">';
            h += '<input type="checkbox" ' + (isPaid ? 'checked' : '') + ' onchange="sparkTogglePaidWithDate(\'' + iid + '\',this.checked)" title="Mark as paid" style="cursor:pointer;width:15px;height:15px;accent-color:#81C784">';
            if (isPaid) {
              h += '<input type="date" class="spark-input" style="width:90px;font-size:9px;padding:1px 3px;text-align:center;color:#2E7D32;border-color:#C8E6C9" value="' + paidDate + '" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'paid_date\',this.value)" title="Date paid">';
            }
            h += '</div>';
            /* Notes + Delete */
            h += '<div style="display:flex;align-items:center;gap:4px"><input type="text" class="spark-input" style="flex:1;text-align:left" value="' + (item.notes || '').replace(/"/g, '&quot;') + '" placeholder="Notes" onchange="sparkDebouncedPatchOop(\'' + iid + '\',\'notes\',this.value)">';
            h += '<button onclick="sparkDeleteOopEntry(\'' + iid + '\')" title="Delete line item" style="background:none;border:none;color:var(--mid-gray);cursor:pointer;font-size:14px;padding:2px 4px;opacity:.5;transition:opacity .2s" onmouseenter="this.style.opacity=1;this.style.color=\'var(--ember)\'" onmouseleave="this.style.opacity=.5;this.style.color=\'var(--mid-gray)\'">&times;</button></div>';
            h += '</div>';
          }
          /* Add line item button */
          h += '<div style="padding:6px 24px"><button onclick="sparkAddOopEntry(\'' + catId + '\',\'' + (data.budget.id || '') + '\')" style="padding:4px 12px;border-radius:4px;border:1px dashed var(--mid-gray);background:transparent;color:var(--mid-gray);cursor:pointer;font-size:11px">+ Add Line Item</button></div>';
        }
      }

      /* Section subtotal / markup / total */
      h += '<div class="spark-oop-subtotal"><span>' + deptName + ' Subtotal</span><span style="font-weight:600">' + sparkFmt(sectionSubtotal) + '</span></div>';
      h += '<div class="spark-oop-markup-row"><span>Markup <input type="number" value="' + markupPct + '" min="0" max="100" step="1" disabled> %</span><span>' + sparkFmt(markupAmt) + '</span></div>';
      h += '<div class="spark-oop-dept-total"><span>' + deptName + ' Total</span><span>' + sparkFmt(sectionTotal) + '</span></div>';

      h += '</div>'; /* end dept-body */
    }

    h += '</div>'; /* end spark-oop-wrap */
  }

  /* Grand total bar */
  h += '<div class="spark-oop-grand-total"><span>Out-of-Pocket Total</span><span>' + sparkFmt(grandTotal) + '</span></div>';

  el.innerHTML = h;
}

function sparkSetPhaseTab(tab) {
  sparkPhaseTab = tab;
  /* Update tab UI */
  var tabs = document.querySelectorAll('.spark-phase-tab[data-group="labor"]');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = 'spark-phase-tab' + (tabs[i].getAttribute('data-tab') === tab ? ' active' : '');

async function sparkLoadBudget(budgetId) {
  sparkSelectedBudget = budgetId;
  if (!budgetId) { sparkCurrentData = null; sparkRenderBudgetContent(); return; }

  var loadingEl = document.getElementById('sparkBudgetContent');
  if (loadingEl) loadingEl.innerHTML = '<div style="padding:40px;text-align:center;color:var(--mid-gray)">Loading budget data...</div>';

  var results = await Promise.all([
    sparkFetch('budgets', 'id=eq.' + budgetId + '&select=*,projects(id,name,project_code,clients(id,name,client_number))'),
    sparkFetch('labor_budget_entries', 'budget_id=eq.' + budgetId + '&select=*,team_member:team_members(id,name,billable_rate,fully_burdened_rate,department,employment_type)&order=department.asc,display_order.asc'),
    sparkFetch('oop_budget_entries', 'budget_id=eq.' + budgetId + '&select=*,section:oop_sections(id,name,slug),category:oop_categories(id,name)&order=display_order.asc'),
    sparkFetch('oop_sections', 'select=*&order=display_order.asc'),
    sparkFetch('oop_categories', 'select=*&order=display_order.asc'),
    sparkFetch('labor_actuals', 'budget_id=eq.' + budgetId + '&select=*,team_member:team_members(id,name,department,employment_type)&order=work_date.desc'),
    sparkFetch('agency_settings', 'select=*&order=category.asc,sort_order.asc')
  ]);

  sparkCurrentData = {
    budget: results[0] && results[0][0] ? results[0][0] : null,
    labor: results[1] || [],
    oop: results[2] || [],
    oopSections: results[3] || [],
    oopCategories: results[4] || [],
    actuals: results[5] || [],
    settings: results[6] || []
  };

  sparkPhaseTab = 'all';
  sparkOopTab = (sparkCurrentData.oopSections.length && sparkCurrentData.oopSections[0].slug) || 'creative';
  sparkRenderBudgetContent();
}

function sparkRenderBudgetContent(embedded) {
  var el = embedded ? document.getElementById('sparkProjectBudget') : document.getElementById('sparkBudgetContent');
  if (!el) return;
  if (!sparkCurrentData || !sparkCurrentData.budget) {
    el.innerHTML = embedded
      ? '<div style="padding:16px 20px;color:var(--mid-gray);font-size:13px;background:var(--white);border-radius:10px;margin-bottom:20px">Could not load budget data.</div>'
      : '<div style="padding:40px;text-align:center;color:var(--mid-gray)">Select a budget above to begin editing.</div>';
    return;
  }

  var data = sparkCurrentData;
  var budget = data.budget;
  var settings = data.settings;
  var reservePct = sparkSettingVal(settings, 'reserve', 'reserve_percentage', 5);
  var discountPct = budget.has_discount ? 3.5 : 0;
  var clientPrice = budget.client_price || 0;
  var discountAmt = clientPrice * (discountPct / 100);
  var tcv = clientPrice - discountAmt;
  var reserveAmt = tcv * (reservePct / 100);

  /* Compute labor total + hours */
  var totalLaborCost = 0;  /* Client-facing @ $200/hr */
  var totalLaborInternal = 0;  /* Internal cost @ actual rates */
  var totalLaborHrs = 0;
  for (var i = 0; i < data.labor.length; i++) {
    var hrs = sparkEntryHours(data.labor[i], 'all');
    totalLaborCost += hrs * sparkGetRate(data.labor[i]);
    totalLaborInternal += hrs * sparkGetInternalRate(data.labor[i]);
    totalLaborHrs += hrs;
  }
  /* Compute OOP total */
  var totalOop = 0;
  for (var i = 0; i < data.oop.length; i++) {
    if (data.oop[i].is_active !== false) totalOop += sparkOopItemTotal(data.oop[i]);
  }
  var markupPct = sparkSettingVal(settings, 'markup', 'oop_markup_percentage', 20);
  var totalOopWithMarkup = totalOop * (1 + markupPct / 100);
  var totalAmount = totalLaborCost + totalOopWithMarkup;
  var profit = clientPrice - totalAmount;
  var profitMargin = clientPrice > 0 ? (profit / clientPrice * 100) : 0;

  var h = '';

  if (embedded) {
    /* ── PROJECT OVERVIEW → renders into sparkProjectOverview (always visible) ── */
    var overviewEl = document.getElementById('sparkProjectOverview');
    if (overviewEl) {
      var oh = '';
      var curStatus = budget.status || 'active';
      oh += '<div class="snapshot-banner" style="margin-bottom:16px">';
      oh += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
      oh += '<div style="font-size:16px;font-weight:700">PROJECT OVERVIEW <span style="font-size:13px;font-weight:400;opacity:.5">#' + (budget.estimate_number || '\u2014') + '</span></div>';
      oh += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
      var statusOpts = [
        {label:'Non-Billable', val:'nonbillable', color:'var(--mid-gray)'},
        {label:'Business Development', val:'bizdev', color:'#F57F17'},
        {label:'Active Billable', val:'active', color:'var(--ocean)'},
        {label:'Finished', val:'complete', color:'#81C784'}
      ];
      for (var si = 0; si < statusOpts.length; si++) {
        var so = statusOpts[si];
        var isSel = (curStatus === so.val);
        oh += '<span style="padding:5px 12px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;' + (isSel ? 'background:' + so.color + ';color:var(--white)' : 'background:rgba(255,255,255,.08);color:var(--mid-gray)') + '" onclick="sparkSetProjectStatus(\'' + so.val + '\')">' + (isSel ? '\u2714 ' : '') + so.label + '</span>';
      }
      oh += '</div></div>';
      oh += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">';
      oh += '<div>';
      oh += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;opacity:.5;margin-bottom:8px">PRICE</div>';
      oh += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">';
      oh += '<span style="font-size:12px;opacity:.6">Budget Amount</span>';
      oh += '<div style="position:relative;display:inline-flex;align-items:center"><span style="position:absolute;left:10px;font-size:14px;font-weight:600;color:rgba(255,255,255,.5);pointer-events:none">$</span>';
      oh += '<input type="text" id="sparkBudgetAmount" class="spark-input" style="width:160px;font-size:16px;font-weight:600;padding:6px 10px 6px 22px;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:var(--white)" value="' + Math.round(clientPrice || 0).toLocaleString() + '" onfocus="sparkBudgetAmtFocus(this)" onblur="sparkBudgetAmtBlur(this)">';
      oh += '</div>';
      oh += '</div>';
      oh += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      oh += '<span style="font-size:12px;opacity:.6">Discount 3.5%</span>';
      oh += '<label style="position:relative;display:inline-block;width:36px;height:20px;cursor:pointer"><input type="checkbox" ' + (budget.has_discount ? 'checked' : '') + ' onchange="sparkPatchBudgetField(\'has_discount\',this.checked)" style="opacity:0;width:0;height:0"><span style="position:absolute;top:0;left:0;right:0;bottom:0;background:' + (budget.has_discount ? 'var(--ocean)' : 'rgba(255,255,255,.2)') + ';border-radius:10px;transition:.3s"></span><span style="position:absolute;left:' + (budget.has_discount ? '18px' : '2px') + ';top:2px;width:16px;height:16px;background:white;border-radius:50%;transition:.3s"></span></label>';
      if (budget.has_discount) {
        oh += '<span style="font-size:11px;opacity:.5;margin-left:4px">(-$' + Math.round(discountAmt).toLocaleString() + ')</span>';
      }
      oh += '</div>';
      oh += '<div style="font-size:12px;opacity:.6">TCV <span style="font-size:16px;font-weight:700;color:var(--white);margin-left:8px">$' + Math.round(tcv).toLocaleString() + '</span></div>';
      oh += '</div>';
      oh += '<div>';
      oh += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;opacity:.5;margin-bottom:8px">ALLOCATION</div>';
      oh += '<div style="font-size:12px;margin-bottom:6px">Fee (Labor) <span style="float:right;font-weight:600">$' + Math.round(totalLaborCost).toLocaleString() + '</span></div>';
      oh += '<div style="font-size:12px;margin-bottom:6px">Pass-Through (OOP) <span style="float:right;font-weight:600">$' + Math.round(totalOopWithMarkup).toLocaleString() + '</span></div>';
      oh += '</div>';
      oh += '</div>';
      oh += '</div>';
      overviewEl.innerHTML = oh;
    }

    /* Labor + OOP go inside sparkProjectBudget (inside the collapsible) */
  } else {
    /* Full Spark editor mode (non-embedded) */
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div>';
    h += '<div style="font-size:16px;font-weight:700">' + (budget.name || 'Untitled') + '</div>';
    h += '<div style="font-size:12px;opacity:.55;margin-top:2px">#' + (budget.estimate_number || '\u2014') + '</div>';
    h += '</div><div style="display:flex;gap:8px;align-items:center">';
    h += '<span class="spark-status-badge ' + (budget.status || '') + '">' + (budget.status || '\u2014') + '</span>';
    h += '<span id="sparkSavingIndicator" class="spark-saving">Saving...</span>';
    h += '</div></div>';

    /* Client info */
    var cl = budget.projects && budget.projects.clients ? budget.projects.clients : budget.clients;
    var clientName = cl ? (cl.client_number || '') + ' - ' + (cl.name || '') : '\u2014';
    h += '<div style="font-size:12px;opacity:.55;margin-bottom:14px">Client: ' + clientName + '</div>';

    /* Financial overview grid */
    h += '<div class="spark-overview-grid">';
    h += '<div class="spark-overview-item"><div class="so-label">Client Price</div><div class="so-value" style="color:var(--sand)">' + sparkFmt(clientPrice) + '</div></div>';
    if (discountPct > 0) {
      h += '<div class="spark-overview-item"><div class="so-label">Discount (' + discountPct + '%)</div><div class="so-value">-' + sparkFmt(discountAmt) + '</div></div>';
    }
    h += '<div class="spark-overview-item"><div class="so-label">TCV</div><div class="so-value">' + sparkFmt(tcv) + '</div></div>';
    h += '<div class="spark-overview-item"><div class="so-label">Fee (Labor)</div><div class="so-value" style="color:var(--ocean)">' + sparkFmt(totalLaborCost) + '</div></div>';
    h += '<div class="spark-overview-item"><div class="so-label">Pass-Through (OOP)</div><div class="so-value">' + sparkFmt(totalOopWithMarkup) + '</div></div>';
    h += '<div class="spark-overview-item"><div class="so-label">Reserve (' + reservePct + '%)</div><div class="so-value">' + sparkFmt(reserveAmt) + '</div></div>';
    h += '</div></div>';
  }

  /* ── Labor Fee Section ── */
  /* Check if this is a "Small Projects" type — simplified labor view */
  var projCode = budget.projects ? budget.projects.project_code : '';
  var isSmallProject = (projCode.indexOf('_10_') >= 0 && projCode.indexOf('XXX') >= 0) || projCode === '334_20_01' || (budget.name && budget.name.toLowerCase().indexOf('small project') >= 0);

  h += '<div class="section-title" style="margin-top:28px">Labor Fee</div>';

  if (isSmallProject) {
    /* Simplified Small Projects view — lump sum budget + total hours */
    var totalHrs = 0;
    for (var li = 0; li < data.labor.length; li++) {
      totalHrs += (data.labor[li].phase1||0) + (data.labor[li].phase2||0) + (data.labor[li].phase3_1||0) + (data.labor[li].phase3_2||0) + (data.labor[li].phase4||0) + (data.labor[li].phase5||0);
    }
    /* Auto-fill: if hours are 0 but budget exists, suggest budget/200 */
    var suggestedHrs = totalHrs;
    if (totalHrs === 0 && clientPrice > 0) {
      suggestedHrs = Math.round(clientPrice / 200);
    }
    var displayHrs = totalHrs > 0 ? totalHrs : suggestedHrs;
    h += '<div class="rt-card" style="padding:20px">';
    h += '<div style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">Small Projects mode — anyone on the team can work on these tasks.</div>';
    h += '<div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">';
    h += '<div><label style="font-size:11px;text-transform:uppercase;color:var(--mid-gray);letter-spacing:.5px">Total Planned Hours</label>';
    h += '<input type="number" id="sparkSmallProjHours" class="spark-input" style="display:block;width:120px;font-size:18px;font-weight:700;padding:8px 12px;margin-top:4px" value="' + displayHrs + '" min="0" step="1" onchange="sparkSaveSmallProjHours(this.value)" oninput="document.getElementById(\'sparkSmallCost\').textContent=\'$\'+Math.round(parseFloat(this.value||0)*200).toLocaleString()">';
    if (totalHrs === 0 && suggestedHrs > 0) {
      h += '<div style="font-size:10px;color:var(--ocean);margin-top:2px">Auto: $' + clientPrice.toLocaleString() + ' ÷ $200 = ' + suggestedHrs + 'h</div>';
    }
    h += '</div>';
    h += '<div><label style="font-size:11px;text-transform:uppercase;color:var(--mid-gray);letter-spacing:.5px">Rate</label>';
    h += '<div style="font-size:18px;font-weight:700;margin-top:4px;padding:8px 0">$200/hr</div></div>';

  } else {
    h += '<div class="spark-phase-tabs">';
    h += '<div class="spark-phase-tab' + (sparkPhaseTab === 'all' ? ' active' : '') + '" data-group="labor" data-tab="all" onclick="sparkSetPhaseTab(\'all\')">ALL</div>';
    for (var p = 0; p < SPARK_PHASES.length; p++) {
      var pk = SPARK_PHASES[p].key;
      h += '<div class="spark-phase-tab' + (sparkPhaseTab === pk ? ' active' : '') + '" data-group="labor" data-tab="' + pk + '" onclick="sparkSetPhaseTab(\'' + pk + '\')">' + SPARK_PHASES[p].label + '</div>';
    }
    h += '</div>';
    h += '<div class="rt-card"><div id="sparkLaborContent"></div></div>';
  }

  /* ── OOP Section ── */
  /* OOP section with No OOP toggle */
  var noOopChecked = data.budget.no_oop === true;
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:28px">';
  h += '<div class="section-title" style="margin:0">Out-of-Pocket (OOP)</div>';
  h += '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--mid-gray)">';
  h += '<span>No OOP</span>';
  h += '<div style="position:relative;display:inline-block;width:36px;height:20px"><input type="checkbox" ' + (noOopChecked ? 'checked' : '') + ' onchange="sparkPatchBudgetField(\'no_oop\',this.checked)" style="opacity:0;width:0;height:0"><span style="position:absolute;top:0;left:0;right:0;bottom:0;background:' + (noOopChecked ? 'var(--ocean)' : 'rgba(0,0,0,.15)') + ';border-radius:10px;transition:.3s;cursor:pointer"></span><span style="position:absolute;left:' + (noOopChecked ? '18px' : '2px') + ';top:2px;width:16px;height:16px;background:white;border-radius:50%;transition:.3s;cursor:pointer"></span></div>';
  h += '</label></div>';
  h += '<div id="sparkOopContent"></div>';

  /* ── Summary Bar ── */
  h += '<div class="spark-summary" id="sparkSummaryBar"></div>';

  el.innerHTML = h;

  /* Render sub-sections */
  sparkRenderLaborContent();
  sparkRenderOopContent();
  sparkRenderSummary();
}

async function renderSpark() {
  if (!sparkAuth.connected) {
    var h = '<h1 class="page-title">&#9889; Spark Budget Editor</h1>';
    h += '<p class="page-subtitle">Connect to Spark in Settings to use the budget editor.</p>';
    h += '<div class="snapshot-banner" style="max-width:500px;margin-top:24px">';
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:10px;height:10px;border-radius:50%;background:var(--ember)"></div><div style="font-size:14px;font-weight:600">Not Connected</div></div>';
    h += '<div style="font-size:12px;opacity:.6;margin-bottom:14px">Go to Settings and sign in with Google to connect Spark.</div>';
    h += '<button onclick="navigate(\'settings\')" style="padding:8px 20px;border-radius:6px;border:none;background:var(--ocean);color:var(--white);cursor:pointer;font-size:13px;font-weight:600">Go to Settings</button>';
    h += '</div>';
    document.getElementById('mainContent').innerHTML = h;
    return;
  }

  var h = '<h1 class="page-title">&#9889; Spark Budget Editor</h1>';
  h += '<p class="page-subtitle">Edit live project budgets from Spark</p>';

  /* Budget selector */
  h += '<div style="margin-bottom:24px">';
  h += '<select class="spark-select" id="sparkBudgetSelect" onchange="sparkLoadBudget(this.value)">';
  h += '<option value="">Loading budgets...</option>';
  h += '</select></div>';

  /* Content area */
  h += '<div id="sparkBudgetContent"><div style="padding:40px;text-align:center;color:var(--mid-gray)">Select a budget to begin editing.</div></div>';

  document.getElementById('mainContent').innerHTML = h;

  /* Fetch budget list */
  sparkBudgets = await sparkFetch('budgets', 'status=in.(active,closeout,proposed)&visibility=eq.visible&select=id,name,estimate_number,status,client_price,clients(name,client_number)&order=updated_at.desc') || [];

  var sel = document.getElementById('sparkBudgetSelect');
  if (sel) {
    var opts = '<option value="">-- Select a budget --</option>';
    for (var i = 0; i < sparkBudgets.length; i++) {
      var b = sparkBudgets[i];
      var clientLabel = b.clients ? (b.clients.client_number || '') + ' ' + (b.clients.name || '') : '';
      var statusTag = b.status ? ' [' + b.status.toUpperCase() + ']' : '';
      opts += '<option value="' + b.id + '"' + (sparkSelectedBudget === b.id ? ' selected' : '') + '>#' + (b.estimate_number || '—') + ' — ' + (b.name || 'Untitled') + ' — ' + clientLabel + statusTag + '</option>';
    }
    sel.innerHTML = opts;
  }

  /* If a budget was already selected, reload it */
  if (sparkSelectedBudget) {
    sparkLoadBudget(sparkSelectedBudget);
  }
}

var RT_WEEKS = [];
var RT_LEADERSHIP = [];
var rtView = 'people';
var rtShowLeadership = false;
var rtSortBy = 'project';
var rtWeekIdx = -1; /* -1 = latest week with actuals */
var rtTimeMode = 'week'; /* week | month */

function rtGetCurrentIdx() {
  if (rtWeekIdx >= 0 && rtWeekIdx < RT_WEEKS.length) return rtWeekIdx;
  /* Default: latest week with actual hours */
  for (var i = RT_WEEKS.length - 1; i >= 0; i--) {
    var tot = 0;
    for (var p in RT_WEEKS[i].people) tot += RT_WEEKS[i].people[p].actual || 0;
    if (tot > 0) return i;
  }
  return RT_WEEKS.length - 1;
}
function rtNav(dir) {
  var idx = rtGetCurrentIdx();
  if (rtTimeMode === 'week') {
    rtWeekIdx = Math.max(0, Math.min(RT_WEEKS.length - 1, idx + dir));
  } else {
    /* Jump to next/prev month */
    var curMon = RT_WEEKS[idx].sunday.substring(0, 7);
    if (dir > 0) {
      for (var i = idx + 1; i < RT_WEEKS.length; i++) {
        if (RT_WEEKS[i].sunday.substring(0, 7) !== curMon) { rtWeekIdx = i; break; }
      }
    } else {
      for (var i = idx - 1; i >= 0; i--) {
        if (RT_WEEKS[i].sunday.substring(0, 7) !== curMon) {
          /* Find first week of that month */
          var tgtMon = RT_WEEKS[i].sunday.substring(0, 7);
          for (var j = 0; j <= i; j++) {
            if (RT_WEEKS[j].sunday.substring(0, 7) === tgtMon) { rtWeekIdx = j; break; }
          }
          break;
        }
      }
    }
  }
  renderResource();
}
function rtGetMonthWeeks(startIdx) {
  /* Get all weeks in the same month as startIdx */
  var mon = RT_WEEKS[startIdx].sunday.substring(0, 7);
  var indices = [];
  for (var i = 0; i < RT_WEEKS.length; i++) {
    if (RT_WEEKS[i].sunday.substring(0, 7) === mon) indices.push(i);
  }
  return indices;
}
function rtAggregateWeeks(indices) {
  /* Combine multiple weeks into one virtual week */
  var combined = {label:'', sunday:'', people:{}};
  var labels = [];
  for (var w = 0; w < indices.length; w++) {
    var wk = RT_WEEKS[indices[w]];
    labels.push(wk.label);
    for (var pn in wk.people) {
      if (!combined.people[pn]) combined.people[pn] = {predicted:0, actual:0, projects:{}};
      combined.people[pn].predicted += wk.people[pn].predicted || 0;
      combined.people[pn].actual += wk.people[pn].actual || 0;
      var projs = wk.people[pn].projects || {};
      for (var pk in projs) {
        if (!combined.people[pn].projects[pk]) combined.people[pn].projects[pk] = {p:0, a:0};
        combined.people[pn].projects[pk].p += projs[pk].p || 0;
        combined.people[pn].projects[pk].a += projs[pk].a || 0;
      }
    }
  }
  var d = new Date(RT_WEEKS[indices[0]].sunday + 'T00:00:00');
  combined.label = d.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  combined.sunday = RT_WEEKS[indices[0]].sunday;
  return combined;
}

function rtCalcAcc(predicted, actual) {
  return Math.max(predicted, actual) > 0 ? Math.min(predicted, actual) / Math.max(predicted, actual) * 100 : 100;
}
function rtCalcAccProject(predicted, actual) {
  if (predicted === 0 && actual === 0) return 100;
  if (predicted === 0) {
    if (actual <= 0.5) return 50;
    if (actual <= 1.0) return 25;
    return 0;
  }
  return Math.min(predicted, actual) / Math.max(predicted, actual) * 100;
}

function isFutureWk(wk) {
  for (var pn in wk.people) { if ((wk.people[pn].actual || 0) > 0) return false; }
  return true;
}

function rtFilterNames(allNames) {
  if (rtShowLeadership) return allNames;
  var out = [];
  for (var i = 0; i < allNames.length; i++) {
    if (RT_LEADERSHIP.indexOf(allNames[i]) === -1) out.push(allNames[i]);
  }
  return out;
}

function renderResource() {
  if (!RT_WEEKS || RT_WEEKS.length === 0) {
    document.getElementById('mainContent').innerHTML = '<h1 class="page-title">Resource Analytics</h1><p style="color:var(--mid-gray);margin-top:12px">No resource tracker data available yet.</p>';
    return;
  }

  var useGlobalFilter = (globalDateFilter !== 'all');
  var idx = rtGetCurrentIdx();
  var wk;
  if (useGlobalFilter) {
    wk = getFilteredRTData();
  } else if (rtTimeMode === 'month') {
    var monthIndices = rtGetMonthWeeks(idx);
    wk = rtAggregateWeeks(monthIndices);
  } else {
    wk = RT_WEEKS[idx];
  }

  var isFuture = true;
  for (var pn in wk.people) { if ((wk.people[pn].actual || 0) > 0) { isFuture = false; break; } }

  var ppl = wk.people;
  var allNames = Object.keys(ppl).sort(function(a,b){ return (ppl[b].actual||0) - (ppl[a].actual||0); });
  var names = rtFilterNames(allNames);

  /* Aggregate totals */
  var totPred = 0, totAct = 0;
  for (var i = 0; i < names.length; i++) { totPred += ppl[names[i]].predicted || 0; totAct += ppl[names[i]].actual || 0; }
  var totalAcc = rtCalcAcc(totPred, totAct);
  var onTarget = 0;
  for (var i = 0; i < names.length; i++) {
    var p = ppl[names[i]].predicted || 0, a = ppl[names[i]].actual || 0;
    if (rtCalcAcc(p, a) >= 80) onTarget++;
  }

  var h = '<h1 class="page-title">Resource Analytics</h1>';
  h += '<p class="page-subtitle">Comparing resource planner predictions vs actual hours logged</p>';

  if (useGlobalFilter) {
    /* When global date filter is active, show filtered label instead of week nav */
    var range = getDateRange(globalDateFilter);
    var opts = {month:'short', day:'numeric', year:'numeric'};
    var rangeLabel = range ? (range.start.toLocaleDateString('en-US', opts) + ' – ' + range.end.toLocaleDateString('en-US', opts)) : 'Filtered';
    var filteredIndices = getFilteredWeekIndices();
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:10px 16px;background:var(--light-gray);border-radius:8px">';
    h += '<span style="font-size:12px;color:var(--mid-gray)">Showing data for:</span>';
    h += '<span style="font-size:14px;font-weight:600;color:var(--abyss)">' + rangeLabel + '</span>';
    h += '<span style="font-size:11px;color:var(--mid-gray)">(' + filteredIndices.length + ' week' + (filteredIndices.length !== 1 ? 's' : '') + ')</span>';
    h += '</div>';
  } else {
    /* ── Standard Time navigation bar ── */
    var canPrev = (rtTimeMode === 'week') ? idx > 0 : rtGetMonthWeeks(idx)[0] > 0;
    var canNext = (rtTimeMode === 'week') ? idx < RT_WEEKS.length - 1 : rtGetMonthWeeks(idx).slice(-1)[0] < RT_WEEKS.length - 1;

    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
    h += '<div style="display:flex;gap:4px">';
    h += '<div class="rt-tab' + (rtTimeMode === 'week' ? ' active' : '') + '" onclick="rtTimeMode=\'week\';renderResource()" style="font-size:11px;padding:4px 12px">Weekly</div>';
    h += '<div class="rt-tab' + (rtTimeMode === 'month' ? ' active' : '') + '" onclick="rtTimeMode=\'month\';renderResource()" style="font-size:11px;padding:4px 12px">Monthly</div>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:center">';
    h += '<div onclick="' + (canPrev ? 'rtNav(-1)' : '') + '" style="width:28px;height:28px;border-radius:50%;border:1px solid ' + (canPrev ? 'var(--canvas)' : 'var(--light-gray)') + ';display:flex;align-items:center;justify-content:center;cursor:' + (canPrev ? 'pointer' : 'default') + ';color:' + (canPrev ? 'var(--abyss)' : 'var(--canvas)') + ';font-size:14px;user-select:none' + (canPrev ? ';background:var(--white)' : '') + '">&#9664;</div>';
    h += '<div style="font-size:14px;font-weight:600;color:var(--abyss);min-width:200px;text-align:center">';
    if (isFuture) h += '<span style="font-size:9px;background:var(--ocean);color:var(--white);padding:2px 6px;border-radius:3px;margin-right:6px;vertical-align:middle">UPCOMING</span>';
    h += wk.label + '</div>';
    h += '<div onclick="' + (canNext ? 'rtNav(1)' : '') + '" style="width:28px;height:28px;border-radius:50%;border:1px solid ' + (canNext ? 'var(--canvas)' : 'var(--light-gray)') + ';display:flex;align-items:center;justify-content:center;cursor:' + (canNext ? 'pointer' : 'default') + ';color:' + (canNext ? 'var(--abyss)' : 'var(--canvas)') + ';font-size:14px;user-select:none' + (canNext ? ';background:var(--white)' : '') + '">&#9654;</div>';
    h += '</div>';
    h += '<div style="width:120px"></div>'; /* spacer to balance layout */
    h += '</div>';
  }

  /* Summary cards */
  h += '<div class="rt-summary">';
  h += '<div class="rt-scard"><div class="rs-label">Predicted</div><div class="rs-val">' + totPred.toFixed(1) + '</div><div class="rs-sub">total hrs planned</div></div>';
  if (isFuture) {
    h += '<div class="rt-scard"><div class="rs-label">Status</div><div class="rs-val" style="font-size:18px;color:var(--ocean)">Upcoming</div><div class="rs-sub">actuals will fill in</div></div>';
  } else {
    h += '<div class="rt-scard"><div class="rs-label">Actual</div><div class="rs-val">' + totAct.toFixed(1) + '</div><div class="rs-sub">total hrs logged</div></div>';
  }
  h += '<div class="rt-scard"><div class="rs-label">' + (isFuture ? 'People' : 'Accuracy') + '</div><div class="rs-val" style="color:' + (isFuture ? 'var(--abyss)' : accColor(totalAcc)) + '">' + (isFuture ? names.length : totalAcc.toFixed(1) + '%') + '</div><div class="rs-sub">' + (isFuture ? 'with planned allocations' : (totAct > totPred ? '+' : '') + (totAct - totPred).toFixed(1) + ' hrs variance') + '</div></div>';
  h += '<div class="rt-scard"><div class="rs-label">' + (isFuture ? 'Projects' : 'On Target') + '</div>';
  if (isFuture) {
    var projCount;
    if (wk.billableProjects !== undefined) {
      projCount = wk.billableProjects;
    } else {
      var projSet = {};
      for (var i = 0; i < names.length; i++) { var pr = ppl[names[i]].projects || {}; for (var pk in pr) { projSet[pk] = true; } }
      projCount = Object.keys(projSet).length;
    }
    h += '<div class="rs-val">' + projCount + '</div><div class="rs-sub">billable projects</div>';
  } else {
    h += '<div class="rs-val">' + onTarget + '/' + names.length + '</div><div class="rs-sub">people within 80% accuracy</div>';
  }
  h += '</div></div>';

  /* View toggle + leadership */
  h += '<div class="rt-tabs">';
  h += '<div class="rt-tab' + (rtView === 'people' ? ' active' : '') + '" onclick="rtView=\'people\';renderResource()">By Person</div>';
  h += '<div class="rt-tab' + (rtView === 'projects' ? ' active' : '') + '" onclick="rtView=\'projects\';renderResource()">By Project</div>';
  h += '<div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid-gray)">';
  h += '<span>Include Leadership</span>';
  h += '<div onclick="rtShowLeadership=!rtShowLeadership;renderResource()" style="width:36px;height:20px;border-radius:10px;background:' + (rtShowLeadership ? 'var(--ocean)' : 'var(--canvas)') + ';cursor:pointer;position:relative;transition:background .2s"><div style="width:16px;height:16px;border-radius:50%;background:var(--white);position:absolute;top:2px;' + (rtShowLeadership ? 'left:18px' : 'left:2px') + ';transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></div>';
  h += '</div>';
  h += '</div>';

  if (rtView === 'people') {
    h += renderRTPeople(wk);
  } else {
    h += renderRTProjects(wk);
  }
  document.getElementById('mainContent').innerHTML = h;
}

function accColor(v) { return v >= 80 ? '#2E7D32' : v >= 50 ? 'var(--honey)' : 'var(--ember)'; }
function accClass(v) { return v >= 80 ? 'high' : v >= 50 ? 'mid' : 'low'; }

function renderRTPeople(wk) {
  var ppl = wk.people;
  var allFiltered = rtFilterNames(Object.keys(ppl));
  var names;
  if (rtSortBy === 'accuracy') {
    names = allFiltered.sort(function(a,b){ return rtCalcAcc(ppl[b].predicted||0,ppl[b].actual||0) - rtCalcAcc(ppl[a].predicted||0,ppl[a].actual||0); });
  } else {
    names = allFiltered.sort(function(a,b){ return (ppl[b].actual||ppl[b].predicted||0) - (ppl[a].actual||ppl[a].predicted||0); });
  }
  var maxHrs = 1;
  for (var i = 0; i < names.length; i++) { var m = Math.max(ppl[names[i]].predicted||0, ppl[names[i]].actual||0); if (m > maxHrs) maxHrs = m; }

  var sortIcon = rtSortBy === 'accuracy' ? ' &#9650;' : '';
  var h = '<div class="rt-card"><h3>Team ' + (isFutureWk(wk) ? 'Plan' : 'Accuracy') + '</h3>';
  h += '<div class="rt-row rt-hdr"><div>Person</div><div class="rt-num">Predicted</div><div class="rt-num">Actual</div><div class="rt-num">Diff</div><div>Comparison</div><div class="rt-acc" style="cursor:pointer;user-select:none" onclick="rtSortBy=rtSortBy===\'accuracy\'?\'actual\':\'accuracy\';renderResource()">' + (isFutureWk(wk) ? 'Planned' : 'Accuracy' + sortIcon) + '</div></div>';
  for (var i = 0; i < names.length; i++) {
    var n = names[i], d = ppl[n];
    var pred = d.predicted || 0, act = d.actual || 0;
    var acc = rtCalcAcc(pred, act);
    var diff = act - pred;
    var predW = (pred / maxHrs) * 100;
    var actW = (act / maxHrs) * 100;
    var pc = PC[n] || '#9B9590';
    h += '<div class="rt-row">';
    h += '<div class="rt-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + pc + ';margin-right:6px"></span>' + n + '</div>';
    h += '<div class="rt-num" style="color:var(--mid-gray)">' + pred.toFixed(1) + '</div>';
    h += '<div class="rt-num" style="font-weight:600">' + act.toFixed(1) + '</div>';
    h += '<div class="rt-num" style="color:' + (diff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (diff >= 0 ? '+' : '') + diff.toFixed(1) + '</div>';
    h += '<div class="rt-bar-wrap"><div class="rt-bar-pred" style="width:' + predW + '%"></div><div class="rt-bar-act" style="width:' + actW + '%;background:' + pc + '"></div></div>';
    h += '<div class="rt-acc ' + accClass(acc) + '">' + acc.toFixed(0) + '%</div>';
    h += '</div>';
  }
  h += '</div>';

  /* Per-person project breakdown */
  h += '<div class="rt-card"><h3>Per-Person Project Breakdown</h3>';
  for (var i = 0; i < names.length; i++) {
    var n = names[i], d = ppl[n];
    var pred = d.predicted || 0, act = d.actual || 0;
    var acc = rtCalcAcc(pred, act);
    var pc = PC[n] || '#9B9590';
    h += '<div style="margin-bottom:20px;padding:14px 0;border-bottom:1px solid var(--light-gray)">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + pc + '"></span><strong>' + n + '</strong><span style="font-size:11px;color:var(--mid-gray)">' + pred.toFixed(1) + 'h predicted → ' + act.toFixed(1) + 'h actual</span><span class="rt-acc ' + accClass(acc) + '" style="margin-left:auto">' + acc.toFixed(0) + '%</span></div>';
    var projs = d.projects || {};
    var pkeys = Object.keys(projs).sort(function(a,b){ return Math.max(projs[b].p||0,projs[b].a||0) - Math.max(projs[a].p||0,projs[a].a||0); });
    h += '<div style="display:grid;grid-template-columns:200px 60px 60px 60px 1fr;gap:6px;font-size:11px;padding-left:18px">';
    h += '<div style="color:var(--mid-gray)">Project</div><div style="color:var(--mid-gray);text-align:right">Pred</div><div style="color:var(--mid-gray);text-align:right">Act</div><div style="color:var(--mid-gray);text-align:right">Diff</div><div></div>';
    for (var j = 0; j < pkeys.length; j++) {
      var pk = pkeys[j], pv = projs[pk];
      var pp = pv.p || 0, pa = pv.a || 0;
      var pdiff = pa - pp;
      h += '<div style="font-weight:500">' + pk + '</div>';
      h += '<div style="text-align:right;color:var(--mid-gray)">' + pp.toFixed(1) + '</div>';
      h += '<div style="text-align:right;font-weight:600">' + pa.toFixed(1) + '</div>';
      h += '<div style="text-align:right;color:' + (pdiff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (pdiff >= 0 ? '+' : '') + pdiff.toFixed(1) + '</div>';
      var mh = Math.max(pp, pa); if (mh === 0) mh = 1;
      h += '<div style="display:flex;gap:2px;align-items:center"><div style="height:6px;border-radius:3px;background:var(--canvas);width:' + (pp/mh*100) + '%"></div><div style="height:6px;border-radius:3px;background:' + pc + ';width:' + (pa/mh*100) + '%"></div></div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderRTProjects(wk) {
  var ppl = wk.people;
  /* Aggregate by project across all people */
  var projAgg = {};
  var names = rtFilterNames(Object.keys(ppl));
  for (var i = 0; i < names.length; i++) {
    var projs = ppl[names[i]].projects || {};
    for (var pk in projs) {
      if (!projAgg[pk]) projAgg[pk] = {predicted:0, actual:0, people:{}};
      projAgg[pk].predicted += projs[pk].p || 0;
      projAgg[pk].actual += projs[pk].a || 0;
      if ((projs[pk].p||0) > 0 || (projs[pk].a||0) > 0) {
        projAgg[pk].people[names[i]] = {p:projs[pk].p||0, a:projs[pk].a||0};
      }
    }
  }
  /* Enrich projAgg with code and remaining */
  var projKeys = Object.keys(projAgg);
  for (var i = 0; i < projKeys.length; i++) {
    var pk = projKeys[i];
    projAgg[pk].code = PROJECT_CODES[pk] || '';
    var bud = PROJECT_BUDGETS[pk];
    projAgg[pk].remaining = bud ? bud.remaining : null;
    projAgg[pk].acc = rtCalcAccProject(projAgg[pk].predicted, projAgg[pk].actual);
    projAgg[pk].diff = projAgg[pk].actual - projAgg[pk].predicted;
  }

  /* Sort helpers — expose globally for onclick */
  window.rtProjSort = function(field) { rtSortBy = (rtSortBy === field) ? field + '_asc' : field; renderResource(); };
  var desc = rtSortBy.indexOf('_asc') === -1;
  var sortField = rtSortBy.replace('_asc','');
  function sIcon(f) { return sortField === f ? (desc ? ' &#9660;' : ' &#9650;') : ''; }
  var hdrStyle = 'cursor:pointer;user-select:none';

  if (sortField === 'project') {
    projKeys.sort(function(a,b){ return desc ? (projAgg[b].code||'').localeCompare(projAgg[a].code||'') : (projAgg[a].code||'').localeCompare(projAgg[b].code||''); });
  } else if (sortField === 'remaining') {
    projKeys.sort(function(a,b){ var ra = projAgg[a].remaining === null ? -99999 : projAgg[a].remaining; var rb = projAgg[b].remaining === null ? -99999 : projAgg[b].remaining; return desc ? rb - ra : ra - rb; });
  } else if (sortField === 'predicted') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].predicted - projAgg[a].predicted : projAgg[a].predicted - projAgg[b].predicted; });
  } else if (sortField === 'actual') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].actual - projAgg[a].actual : projAgg[a].actual - projAgg[b].actual; });
  } else if (sortField === 'diff') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].diff - projAgg[a].diff : projAgg[a].diff - projAgg[b].diff; });
  } else if (sortField === 'accuracy') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].acc - projAgg[a].acc : projAgg[a].acc - projAgg[b].acc; });
  } else {
    /* Default: sort by project code ascending */
    projKeys.sort(function(a,b){ return (projAgg[a].code||'zzz').localeCompare(projAgg[b].code||'zzz'); });
  }

  var maxHrs = 1;
  for (var i = 0; i < projKeys.length; i++) { var m = Math.max(projAgg[projKeys[i]].predicted, projAgg[projKeys[i]].actual); if (m > maxHrs) maxHrs = m; }

  /* Group projects by client code prefix and sort by project code within each group */
  function getClientFromCode(code) {
    if (!code) return '999_Unknown';
    var prefix = code.replace(/[a-zA-Z]/, '').split('_')[0];
    return prefix;
  }
  function getClientLabel(prefix) {
    for (var ci = 0; ci < CLIENTS.length; ci++) { if (CLIENTS[ci].code === prefix) return CLIENTS[ci].code + ' ' + CLIENTS[ci].name; }
    /* Check RT alias targets too */
    if (prefix === '100') return '100 Forge';
    return prefix;
  }

  /* Always sort by project code for grouping, then apply user sort within groups */
  var grouped = {};
  for (var i = 0; i < projKeys.length; i++) {
    var pk = projKeys[i], d = projAgg[pk];
    var code = d.code || '';
    var clientPrefix = getClientFromCode(code);
    if (!grouped[clientPrefix]) grouped[clientPrefix] = [];
    grouped[clientPrefix].push(pk);
  }

  /* Sort client groups by prefix */
  var clientPrefixes = Object.keys(grouped).sort();

  /* Sort projects within each group by code */
  for (var gi = 0; gi < clientPrefixes.length; gi++) {
    var grp = grouped[clientPrefixes[gi]];
    if (sortField === 'predicted') {
      grp.sort(function(a,b){ return desc ? projAgg[b].predicted - projAgg[a].predicted : projAgg[a].predicted - projAgg[b].predicted; });
    } else if (sortField === 'actual') {
      grp.sort(function(a,b){ return desc ? projAgg[b].actual - projAgg[a].actual : projAgg[a].actual - projAgg[b].actual; });
    } else if (sortField === 'diff') {
      grp.sort(function(a,b){ return desc ? projAgg[b].diff - projAgg[a].diff : projAgg[a].diff - projAgg[b].diff; });
    } else if (sortField === 'remaining') {
      grp.sort(function(a,b){ var ra = projAgg[a].remaining === null ? -99999 : projAgg[a].remaining; var rb = projAgg[b].remaining === null ? -99999 : projAgg[b].remaining; return desc ? rb - ra : ra - rb; });
    } else if (sortField === 'accuracy') {
      grp.sort(function(a,b){ return desc ? projAgg[b].acc - projAgg[a].acc : projAgg[a].acc - projAgg[b].acc; });
    } else {
      /* Default: sort by project code ascending */
      grp.sort(function(a,b){ return (projAgg[a].code||'zzz').localeCompare(projAgg[b].code||'zzz'); });
    }
  }

  var h = '<div class="rt-card"><h3>Project Accuracy</h3>';
  h += '<div class="rt-row rt-hdr rt-proj">';
  h += '<div style="' + hdrStyle + '" onclick="rtProjSort(\'project\')">Project' + sIcon('project') + '</div>';
