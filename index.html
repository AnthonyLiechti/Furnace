    h += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:20px">';
    h += '<div style="font-size:11px;font-weight:600;color:var(--mid-gray);text-transform:uppercase;letter-spacing:.5px">Portfolio Profitability</div>';
    h += '<div style="flex:1;height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden"><div style="height:100%;width:' + Math.min(Math.max(profPctNum, 0), 100) + '%;background:' + gaugeColor + ';border-radius:6px;transition:width .3s"></div></div>';
    h += '<div style="font-size:18px;font-weight:700;color:' + gaugeColor + '">' + overallProfitPct + '%</div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + Math.max(0, profitDollar) + totalOOP;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((totalOOP / barTotal) * 100);
    var profBarPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 8 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 8 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 8 ? '$' + totalOOP.toLocaleString() : '') + '</div>';
    if (profBarPct > 0) h += '<div class="lob-seg" style="width:' + profBarPct + '%;background:#81C784">' + (profBarPct >= 8 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Profit</div>';
    h += '</div></div>';
    h += '</div>';
  }

  /* ── PROJECT TABLE WITH SORTING ── */
  /* Pre-compute sort values for each project */
  var rows = [];
  for (var i = 0; i < all.length; i++) {
    var p = all[i];
    var sp = filteredProjectSpent(p);
    var pBudget = p.dollarBudget || 0;
    var pLabor = p.laborCost || 0;
    var pOOP = p.oopCost || 0;
    var pProfit = p.profit || 0;
    var pMarginNum = pBudget > 0 ? (pProfit / pBudget) * 100 : 0;
    rows.push({ p:p, budget:pBudget, labor:pLabor, oop:pOOP, profit:pProfit, margin:pMarginNum, spent:sp });
  }
  /* Sort */
  var dir = masterSortDir === 'asc' ? 1 : -1;
  rows.sort(function(a, b) {
    var va, vb;
    switch (masterSortCol) {
      case 'name': va = a.p.code || ''; vb = b.p.code || ''; return va < vb ? -dir : va > vb ? dir : 0;
      case 'client': va = (a.p.clientName||'').toLowerCase(); vb = (b.p.clientName||'').toLowerCase(); return va < vb ? -dir : va > vb ? dir : 0;
      case 'budget': return (a.budget - b.budget) * dir;
      case 'labor': return (a.labor - b.labor) * dir;
      case 'oop': return (a.oop - b.oop) * dir;
      case 'profit': return (a.profit - b.profit) * dir;
      case 'margin': return (a.margin - b.margin) * dir;
      default: return 0;
    }
  });

  var sortArrow = function(col) {
    if (masterSortCol !== col) return ' <span style="opacity:.3;font-size:10px">&#9650;&#9660;</span>';
    return masterSortDir === 'asc' ? ' <span style="font-size:10px">&#9650;</span>' : ' <span style="font-size:10px">&#9660;</span>';
  };
  var thStyle = 'cursor:pointer;user-select:none;white-space:nowrap';

  h += '<div class="section-title" style="margin-top:28px">Projects</div>';
  h += '<table class="phase-table"><thead><tr>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'name\')">Project' + sortArrow('name') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'client\')">Client' + sortArrow('client') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'budget\')">Budget' + sortArrow('budget') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'labor\')">Labor' + sortArrow('labor') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'oop\')">OOP' + sortArrow('oop') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'profit\')">Profit' + sortArrow('profit') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'margin\')">Profitability' + sortArrow('margin') + '</th>';
  h += '</tr></thead><tbody>';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i], p = r.p;
    var pMargin = r.margin.toFixed(1);
    var mColor = r.margin >= 30 ? '#81C784' : r.margin >= 15 ? 'var(--honey)' : r.margin >= 0 ? 'var(--sand)' : '#C62828';

    h += '<tr onclick="navigate(\'project:' + p.id + '\')" style="cursor:pointer">';
    h += '<td><div style="font-size:11px;color:var(--mid-gray)">' + p.code + '</div><div style="font-weight:600">' + p.name + '</div></td>';
    h += '<td style="font-size:12px;color:var(--mid-gray)">' + (p.clientName || '') + '</td>';
    h += '<td>' + (r.budget > 0 ? '$' + r.budget.toLocaleString() : '$0') + '</td>';
    h += '<td>' + (r.labor > 0 ? '$' + r.labor.toLocaleString() : '—') + '</td>';
    h += '<td>' + (r.oop > 0 ? '$' + r.oop.toLocaleString() : '—') + '</td>';
    h += '<td style="color:' + (r.profit >= 0 ? '' : '#C62828') + '">' + (r.budget > 0 || r.profit !== 0 ? '$' + r.profit.toLocaleString() : '—') + '</td>';
    h += '<td><div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="height:8px;width:80px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden"><div style="height:100%;width:' + Math.min(Math.max(r.margin, 0), 100) + '%;background:' + mColor + ';border-radius:4px"></div></div>';
    h += '<span style="font-size:12px;font-weight:600;color:' + mColor + '">' + pMargin + '%</span>';
    h += '</div></td>';
    h += '</tr>';
  }
  h += '</tbody></table>';

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: CLIENT ── */
function renderClient(clientId) {
  var c = clientById(clientId);
  if (!c) return;
  /* Split active vs completed */
  var activeList = [], doneList = [];
  for (var i = 0; i < c.projects.length; i++) {
    if (isProjectCompleted(c.projects[i])) doneList.push(c.projects[i]);
    else activeList.push(c.projects[i]);
  }
  var visibleList = showFinalized ? c.projects : activeList;
  var rate = getRate(c.id);

  /* Aggregate financials from snapshots */
  var totalBudget = 0, totalSpent = 0;
  var totalDollarBudget = 0, totalLaborMU = 0, totalLaborCost = 0, totalOOP = 0;
  var totalEstProfit = 0, totalActiveProfit = 0, snapshotCount = 0;
  for (var i = 0; i < visibleList.length; i++) {
    var p = visibleList[i];
    totalBudget += p.totalBudget || 0;
    totalSpent += filteredProjectSpent(p);
    if (p.dataSource === 'snapshot') {
      totalDollarBudget += p.dollarBudget || 0;
      totalLaborMU += p.laborCost || 0;
      totalLaborCost += (p.laborCost || 0) * 0.833;
      totalOOP += p.oopCost || 0;
      totalEstProfit += p.profit || 0;
      totalActiveProfit += p.profit || 0;
      snapshotCount++;
    }
  }

  var h = '<h1 class="page-title">' + c.code + ' ' + c.name;
  h += '<span class="view-toggle"><button class="view-toggle-btn ' + (!showFinalized ? 'active' : '') + '" onclick="showFinalized=false;navigate(currentView)">Active</button>';
  h += '<button class="view-toggle-btn ' + (showFinalized ? 'active' : '') + '" onclick="showFinalized=true;navigate(currentView)">All</button></span>';
  h += '</h1>';
  var label = showFinalized ? (visibleList.length + ' total project' + (visibleList.length !== 1 ? 's' : '')) : (activeList.length + ' active project' + (activeList.length !== 1 ? 's' : '') + (doneList.length ? ' &middot; ' + doneList.length + ' completed' : ''));
  h += '<p class="page-subtitle">' + label + ' &middot; Rate: ' + (rate > 0 ? '$' + rate + '/hr' : 'Not set') + '</p>';

  /* ── CLIENT FINANCIALS BANNER (snapshot-based) ── */
  if (snapshotCount > 0) {
    var costPerHr = totalBudget > 0 ? totalLaborCost / totalBudget : 0;
    var spentDollar = totalSpent * costPerHr;
    var remainingHrs = Math.max(0, totalBudget - totalSpent);
    var estRemainDollar = remainingHrs * costPerHr;
    var totalEstPrice = totalLaborMU + totalOOP;
    var profitDollar = totalDollarBudget - totalEstPrice;
    var estProfitPct = totalDollarBudget > 0 ? Math.round((totalEstProfit / totalDollarBudget) * 10000) / 100 : 0;
    var actProfitPct = totalDollarBudget > 0 ? Math.round((totalActiveProfit / totalDollarBudget) * 10000) / 100 : 0;

    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Client Financials</div><div class="snap-version">' + snapshotCount + ' project' + (snapshotCount !== 1 ? 's' : '') + ' with snapshots</div></div>';

    /* Row 1: Dollar financials */
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Client Budget</div><div class="sf-value sf-gold">$' + totalDollarBudget.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value">$' + totalLaborMU.toLocaleString() + '</div><div class="sf-sub">Cost: $' + totalLaborCost.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Out-of-Pocket</div><div class="sf-value">$' + totalOOP.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Est. Profit</div><div class="sf-value sf-green">$' + totalEstProfit.toLocaleString() + '</div><div class="sf-sub">' + estProfitPct + '%</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Active Profit</div><div class="sf-value sf-green">$' + totalActiveProfit.toLocaleString() + '</div><div class="sf-sub">' + actProfitPct + '%</div></div>';
    h += '</div>';

    /* Row 2: Hours tracking */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Hours Budget</div><div class="sf-value">' + totalBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + totalSpent.toFixed(1) + '</div><div class="sf-sub">' + pct(totalSpent, totalBudget) + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value">' + remainingHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Spent</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(spentDollar).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Remaining</div><div class="sf-value">$' + Math.round(estRemainDollar).toLocaleString() + '</div></div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + profitDollar + totalOOP;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((totalOOP / barTotal) * 100);
    var profPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 8 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 8 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 8 ? '$' + totalOOP.toLocaleString() : '') + '</div>';
    if (profPct > 0) h += '<div class="lob-seg" style="width:' + profPct + '%;background:#81C784">' + (profPct >= 8 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Profit</div>';
    h += '</div></div>';
    h += '</div>';
  } else {
    /* Fallback for clients without any snapshots */
    h += '<div class="stats-row">';
    h += '<div class="stat-card"><div class="label">Client Budget</div><div class="value">' + fmt(totalBudget, c.id) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Spent</div><div class="value">' + fmt(totalSpent, c.id) + '</div><div class="sub">' + pct(totalSpent, totalBudget) + '%</div></div>';
    h += '<div class="stat-card"><div class="label">Remaining</div><div class="value">' + fmt(totalBudget - totalSpent, c.id) + '</div></div>';
    if (rate > 0) { h += '<div class="stat-card"><div class="label">Revenue (Spent)</div><div class="value">$' + Math.round(totalSpent * rate).toLocaleString() + '</div></div>'; }
    h += '</div>';
  }

  /* ── PROJECT STATUS TABLE ── */
  h += '<div class="section-title" style="margin-top:28px">Projects</div>';
  h += '<table class="phase-table"><thead><tr>';
  h += '<th>Project</th><th>Type</th><th>Current Phase</th><th>Budget</th><th>Spent</th><th>Hours Progress</th>';
  h += '</tr></thead><tbody>';

  for (var i = 0; i < visibleList.length; i++) {
    var p = visibleList[i];
    var isDone = isProjectCompleted(p);
    var spent = filteredProjectSpent(p);
    var prog = isDone ? 100 : pct(spent, p.totalBudget);

    /* Find current phase */
    var curPhase = '—';
    for (var j = 0; j < p.phases.length; j++) {
      if (p.phases[j].status === 'active') { curPhase = p.phases[j].name; break; }
    }
    if (isDone) curPhase = '<span class="badge badge-completed">Complete</span>';

    /* Hour type badge */
    var typeBadge = '<span class="badge badge-billable">Billable</span>';
    if (p.hourType === 'bizdev') typeBadge = '<span class="badge badge-bizdev">Biz Dev</span>';
    else if (p.hourType === 'ops') typeBadge = '<span class="badge badge-ops">Ops</span>';

    var isOver = spent > p.totalBudget && p.totalBudget > 0;

    h += '<tr onclick="navigate(\'project:' + p.id + '\')" style="cursor:pointer">';
    h += '<td><div style="font-weight:600">' + p.name + '</div><div style="font-size:11px;color:var(--mid-gray)">' + p.code + '</div></td>';
    h += '<td>' + typeBadge + '</td>';
    h += '<td style="font-size:12px">' + curPhase + '</td>';
    h += '<td>' + (p.totalBudget > 0 ? p.totalBudget.toFixed(1) : '—') + '</td>';
    h += '<td style="' + (isOver ? 'color:#C62828;font-weight:700' : '') + '">' + spent.toFixed(1) + '</td>';
    h += '<td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar-wrap" style="height:10px;width:140px;display:inline-block;vertical-align:middle"><div class="progress-bar-fill" style="width:' + Math.min(prog, 100) + '%;background:' + (isDone ? '#2E7D32' : isOver ? '#C62828' : barColor(prog)) + '"></div></div><span style="font-size:11px;color:' + (isOver ? '#C62828' : 'var(--mid-gray)') + '">' + prog + '%</span></div></td>';
    h += '</tr>';
  }
  h += '</tbody></table>';

  /* ── UPCOMING RESOURCE ALLOCATION (this week + next week) ── */
  var todayStr = new Date().toISOString().slice(0,10);
  var curWeekSun = getWeekMon(todayStr);
  var curWeekSat = getSaturday(curWeekSun);
  var curWeekNum = getISOWeek(curWeekSun);
  var nwDate = new Date(curWeekSun + 'T00:00:00');
  nwDate.setDate(nwDate.getDate() + 7);
  var nextWeekSun = nwDate.toISOString().slice(0,10);
  var nextWeekSat = getSaturday(nextWeekSun);
  var nextWeekNum = getISOWeek(nextWeekSun);

  /* Show two weeks: current and next */
  var weekPairs = [
    { sun: curWeekSun, sat: curWeekSat, num: curWeekNum, label: 'This Week' },
    { sun: nextWeekSun, sat: nextWeekSat, num: nextWeekNum, label: 'Next Week' }
  ];

  for (var wpi = 0; wpi < weekPairs.length; wpi++) {
    var wp = weekPairs[wpi];
    h += '<div class="section-title" style="margin-top:' + (wpi === 0 ? '28' : '20') + 'px">' + wp.label + ' — Week ' + wp.num + ' <span style="font-size:11px;font-weight:400;color:var(--mid-gray)">(' + fmtDateShort(wp.sun) + ' – ' + fmtDateShort(wp.sat) + ')</span></div>';

    var anyAlloc = false;
    for (var i = 0; i < visibleList.length; i++) {
      var p = visibleList[i];
      if (isProjectCompleted(p)) continue;
      var weeks = buildWeeks(p.id);
      var wk = null;
      for (var wi = 0; wi < weeks.length; wi++) {
        if (weeks[wi].sunday === wp.sun) { wk = weeks[wi]; break; }
      }
      if (!wk) continue;
      anyAlloc = true;

      var ppl = [];
      for (var pk in wk.people) ppl.push([pk, wk.people[pk]]);
      ppl.sort(function(a,b){ return b[1] - a[1]; });

      h += '<div style="margin-bottom:16px;padding:14px 16px;background:var(--cloud);border-radius:10px;border-left:3px solid ' + c.color + '">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h += '<div><span style="font-weight:700;font-size:13px;color:var(--abyss)">' + p.name + '</span> <span style="font-size:11px;color:var(--mid-gray)">' + p.code + '</span></div>';
      h += '<div style="font-weight:700;font-size:14px;color:var(--ocean)">' + wk.total.toFixed(1) + ' hrs</div>';
      h += '</div>';

      h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      for (var si = 0; si < ppl.length; si++) {
        if (ppl[si][0] === 'Unknown') continue;
        var fn = ppl[si][0].split(' ')[0];
        h += '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(255,255,255,.7);border-radius:12px;font-size:11px;color:var(--abyss)"><span style="width:6px;height:6px;border-radius:50%;background:' + (PC[ppl[si][0]] || '#9B9590') + '"></span>' + fn + ' ' + ppl[si][1].toFixed(1) + 'h</span>';
      }
      h += '</div></div>';
    }

    if (!anyAlloc) {
      h += '<div style="font-size:13px;color:var(--mid-gray);padding:16px;background:var(--cloud);border-radius:8px">No allocations for ' + wp.label.toLowerCase() + ' <span style="font-weight:600">(' + fmtDateShort(wp.sun) + ' – ' + fmtDateShort(wp.sat) + ')</span></div>';
    }
  }

  /* Hour Type Breakdown for this client */
  var clientHt = computeHourTypes(visibleList);
  if (clientHt.bizdev.count > 0 || clientHt.ops.count > 0) {
    h += renderHourTypeSection(clientHt, c.id);
  }

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: PROJECT ── */
function renderProject(projectId) {
  var p = projectById(projectId);
  if (!p) return;
  var cascaded = computeCascade(p);
  var spent = filteredProjectSpent(p);
  var prog = pct(spent, p.totalBudget);
  var rate = getRate(p.clientId);

  var h = '<p class="page-subtitle" style="margin-bottom:2px;font-family:monospace;font-size:12px;letter-spacing:.5px;color:var(--mid-gray)">' + p.code + '</p>';
  h += '<h1 class="page-title">' + p.name + '</h1>';
  h += '<p class="page-subtitle">' + p.clientCode + ' ' + p.clientName + ' &middot; Rate: ' + (rate > 0 ? '$' + rate + '/hr' : 'Not set') + '</p>';

  if (!p.hasBudgetData && p.dataSource !== 'snapshot') {
    h += '<div class="flagged-card" style="margin-bottom:16px"><div class="flag-title">&#9888; No Budget Data</div><div class="flag-reason">This project has no planned effort or snapshot. Time tracked against it will still appear below.</div></div>';
  }

  var isBizDev = p.projectType === 'bizdev';
  var isSmallProj = p.projectType === 'small_projects';

  if (isSmallProj && p.subSnapshots && p.subSnapshots.length > 0) {
    /* ── SMALL PROJECTS: Aggregated header + individual sub-snapshots ── */
    var subs = p.subSnapshots;
    var aggBudget = 0, aggLabor = 0, aggOop = 0, aggProfit = 0, aggHrsBudget = 0, aggHrsSpent = 0;
    for (var si = 0; si < subs.length; si++) {
      aggBudget += subs[si].dollarBudget || 0;
      aggLabor += subs[si].laborCost || 0;
      aggOop += subs[si].oopCost || 0;
      aggProfit += subs[si].profit || 0;
      aggHrsBudget += subs[si].totalBudget || 0;
      aggHrsSpent += subs[si].timesheetHours || 0;
    }
    var aggMargin = aggBudget > 0 ? ((aggProfit / aggBudget) * 100).toFixed(1) : 0;
    var unallocHrs = Math.max(0, spent - aggHrsSpent);

    /* Aggregated top-level financials */
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Portfolio Financials (Aggregated)</div><div class="snap-version">' + subs.length + ' Sub-Project' + (subs.length !== 1 ? 's' : '') + '</div></div>';
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Client Budget</div><div class="sf-value sf-gold">$' + aggBudget.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total FMG Labor</div><div class="sf-value">$' + aggLabor.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total OOP</div><div class="sf-value">$' + aggOop.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Profit</div><div class="sf-value ' + (aggProfit >= 0 ? 'sf-green' : '') + '">$' + aggProfit.toLocaleString() + '</div><div class="sf-sub">' + aggMargin + '%</div></div>';
    h += '</div>';
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Budgeted</div><div class="sf-value">' + aggHrsBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Tracked (Timesheet)</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Allocated to Sub-Projects</div><div class="sf-value">' + aggHrsSpent.toFixed(1) + '</div></div>';
    if (unallocHrs > 0) {
      h += '<div class="snap-fin-item"><div class="sf-label">Unallocated Hours</div><div class="sf-value" style="color:var(--sand)">' + unallocHrs.toFixed(1) + '</div></div>';
    }
    h += '</div></div>';

    /* Individual sub-snapshot cards */
    h += '<div class="section-title" style="margin-top:24px">Sub-Project Breakdown</div>';
    for (var si = 0; si < subs.length; si++) {
      var ss = subs[si];
      var ssMargin = ss.dollarBudget > 0 ? ((ss.profit / ss.dollarBudget) * 100).toFixed(1) : 0;
      var ssHrsSpent = ss.timesheetHours || 0;
      var ssHrsBudget = ss.totalBudget || 0;
      var ssHrsProg = ssHrsBudget > 0 ? Math.round((ssHrsSpent / ssHrsBudget) * 100) : 0;
      h += '<div class="snapshot-banner" style="margin-bottom:12px;padding:16px 20px">';
      h += '<div class="snap-header"><div class="snap-title" style="font-size:14px">' + (ss.code ? ss.code + ' — ' : '') + ss.name + '</div></div>';
      h += '<div class="snap-financials" style="margin-top:10px">';
      h += '<div class="snap-fin-item"><div class="sf-label">Budget</div><div class="sf-value sf-gold" style="font-size:18px">$' + (ss.dollarBudget || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value" style="font-size:18px">$' + (ss.laborCost || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">OOP</div><div class="sf-value" style="font-size:18px">$' + (ss.oopCost || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Profit</div><div class="sf-value ' + ((ss.profit || 0) >= 0 ? 'sf-green' : '') + '" style="font-size:18px">$' + (ss.profit || 0).toLocaleString() + '</div><div class="sf-sub">' + ssMargin + '%</div></div>';
      h += '</div>';
      h += '<div class="snap-financials" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)">';
      h += '<div class="snap-fin-item"><div class="sf-label">Hrs Budgeted</div><div class="sf-value" style="font-size:16px">' + ssHrsBudget.toFixed(1) + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Hrs Spent</div><div class="sf-value" style="font-size:16px;color:var(--ember)">' + ssHrsSpent.toFixed(1) + '</div><div class="sf-sub">' + ssHrsProg + '% of budget</div></div>';
      h += '</div></div>';
    }

    /* Unallocated bucket if applicable */
    if (unallocHrs > 0) {
      h += '<div class="snapshot-banner" style="margin-bottom:12px;padding:16px 20px;border-left:3px solid var(--sand)">';
      h += '<div class="snap-header"><div class="snap-title" style="font-size:14px">Unallocated Hours</div><div class="snap-version">No snapshot linked</div></div>';
      h += '<div class="snap-financials" style="margin-top:10px">';
      h += '<div class="snap-fin-item"><div class="sf-label">Hours Tracked</div><div class="sf-value" style="font-size:18px;color:var(--sand)">' + unallocHrs.toFixed(1) + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Budget</div><div class="sf-value" style="font-size:18px">—</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Profit</div><div class="sf-value" style="font-size:18px">—</div></div>';
      h += '</div></div>';
    }

  } else if (p.dataSource === 'snapshot' && isBizDev) {
    /* ── BIZ DEV HEADER — $200/hr labor tracking, no budget ── */
    var bdLabor = spent * 200;
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Business Development</div><div class="snap-version">Labor @ $200/hr</div></div>';
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Hours</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Investment</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(bdLabor).toLocaleString() + '</div><div class="sf-sub">@ $200/hr</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Team Members</div><div class="sf-value">' + (p.people ? p.people.length : 0) + '</div></div>';
    h += '</div>';
    h += '</div>';

  } else if (p.dataSource === 'snapshot') {
    /* ── SNAPSHOT-BASED HEADER ── */
    var db = p.dollarBudget || 0;
    var lm = p.laborCost || 0;
    var lc = lm * 0.833;
    var oop = p.oopCost || 0;
    var tp = p.totalPrice || 0;
    var proft = p.profit || 0;
    var pm = p.profitMargin || 0;
    var costPerHr = p.totalBudget > 0 ? lc / p.totalBudget : 0;
    var spentDollar = spent * costPerHr;
    var remainingHrs = Math.max(0, p.totalBudget - spent);
    var estRemainDollar = remainingHrs * costPerHr;
    var profitDollar = db - tp;

    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Project Financials</div><div class="snap-version">From Snapshot</div></div>';

    /* Row 1: Dollar financials */
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Client Budget</div><div class="sf-value sf-gold">$' + db.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value">$' + lm.toLocaleString() + '</div><div class="sf-sub">Cost: $' + Math.round(lc).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Out-of-Pocket</div><div class="sf-value">$' + oop.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Est. Profit</div><div class="sf-value ' + (proft >= 0 ? 'sf-green' : '') + '">$' + proft.toLocaleString() + '</div><div class="sf-sub">' + pm + '%</div></div>';
    h += '</div>';

    /* Row 2: Hours tracking */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Hours Budget</div><div class="sf-value">' + p.totalBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div><div class="sf-sub">' + prog + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value">' + remainingHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Spent</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(spentDollar).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Remaining</div><div class="sf-value">$' + Math.round(estRemainDollar).toLocaleString() + '</div></div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + Math.max(0, profitDollar) + oop;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((oop / barTotal) * 100);
    var profPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 10 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 10 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 10 ? '$' + oop.toLocaleString() : '') + '</div>';
    if (profPct > 0) h += '<div class="lob-seg" style="width:' + profPct + '%;background:#81C784">' + (profPct >= 10 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent $' + Math.round(spentDollar).toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining $' + Math.round(estRemainDollar).toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP $' + oop.toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Profit $' + Math.round(profitDollar).toLocaleString() + '</div>';
    h += '</div></div>';
    h += '</div>';
  } else {
    /* ── FALLBACK: Standard stats for projects without snapshots ── */
    h += '<div class="stats-row">';
    h += '<div class="stat-card"><div class="label">Total Budget</div><div class="value">' + fmt(p.totalBudget, p.clientId) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Spent</div><div class="value">' + fmt(spent, p.clientId) + '</div><div class="sub">' + prog + '%</div></div>';
    h += '<div class="stat-card"><div class="label">Remaining</div><div class="value">' + fmt(p.totalBudget - spent, p.clientId) + '</div></div>';
    if (rate > 0) {
      h += '<div class="stat-card"><div class="label">Revenue (Spent)</div><div class="value">$' + Math.round(spent * rate).toLocaleString() + '</div></div>';
    }
    h += '</div>';
  }

  if (isBizDev) {
    /* ── BIZ DEV: Per-Person Hours Breakdown ── */
    var bdPeople = p.people || [];
    if (bdPeople.length > 0) {
      var maxPersonHrs = 0;
      for (var i = 0; i < bdPeople.length; i++) { if (bdPeople[i].spent > maxPersonHrs) maxPersonHrs = bdPeople[i].spent; }
      if (maxPersonHrs === 0) maxPersonHrs = 1;
      h += '<div class="section-title" style="margin-top:24px">Team Investment</div>';
      h += '<table class="phase-table"><thead><tr>';
      h += '<th>Team Member</th><th style="text-align:right">Hours</th><th style="text-align:right">Labor Cost</th><th style="text-align:right">% of Total</th><th>Distribution</th>';
      h += '</tr></thead><tbody>';
      for (var i = 0; i < bdPeople.length; i++) {
        var bp = bdPeople[i];
        var bpCost = bp.spent * 200;
        var bpPct = spent > 0 ? Math.round(bp.spent / spent * 100) : 0;
        var barW = Math.round(bp.spent / maxPersonHrs * 100);
        var pc = PC[bp.name] || 'var(--ocean)';
        h += '<tr>';
        h += '<td style="font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + pc + ';margin-right:8px"></span>' + bp.name + '</td>';
        h += '<td style="text-align:right">' + bp.spent.toFixed(1) + '</td>';
        h += '<td style="text-align:right">$' + Math.round(bpCost).toLocaleString() + '</td>';
        h += '<td style="text-align:right;color:var(--mid-gray)">' + bpPct + '%</td>';
        h += '<td><div class="progress-bar-wrap" style="height:8px;width:140px;display:inline-block;vertical-align:middle"><div class="progress-bar-fill" style="width:' + barW + '%;background:' + pc + '"></div></div></td>';
        h += '</tr>';
      }
      h += '</tbody></table>';
    }
  } else {
    /* ── STANDARD: Progress bar + Phase table ── */
    h += '<div class="progress-bar-wrap" style="height:14px;margin-bottom:20px"><div class="progress-bar-fill" style="width:' + prog + '%;background:' + barColor(prog) + '"></div></div>';

    /* Phase table */
    h += '<table class="phase-table"><thead><tr>';
    h += '<th>Phase</th><th>Status</th><th>Planned</th><th>Adjusted</th><th>Spent</th><th>Variance</th><th>Progress</th>';
    h += '</tr></thead><tbody>';
    for (var i = 0; i < cascaded.length; i++) {
      var ph = cascaded[i];
      if (ph.status === 'na') continue;
      var base = ph.adjusted > 0 ? ph.adjusted : ph.planned;
      var phPct = pct(ph.spent, base);
      var isOver = ph.spent > ph.adjusted && ph.adjusted > 0;
      h += '<tr>';
      h += '<td style="font-weight:600">' + ph.name + '</td>';
      h += '<td>' + badgeHTML(ph.status) + '</td>';
      h += '<td>' + fmt(ph.planned, p.clientId) + '</td>';
      h += '<td>' + fmt(ph.adjusted, p.clientId) + '</td>';
      h += '<td>' + (isOver ? '<span class="badge badge-over">' : '') + fmt(ph.spent, p.clientId) + (isOver ? '</span>' : '') + '</td>';
      h += '<td style="color:' + (ph.variance >= 0 ? '#2E7D32' : '#C62828') + '">' + (ph.variance >= 0 ? '+' : '') + fmt(ph.variance, p.clientId) + '</td>';
      h += '<td><div class="progress-bar-wrap" style="height:8px;width:120px;display:inline-block;vertical-align:middle"><div class="progress-bar-fill" style="width:' + Math.min(phPct, 100) + '%;background:' + (isOver ? '#C62828' : barColor(phPct)) + '"></div></div> <span style="font-size:11px;color:var(--mid-gray)">' + phPct + '%</span></td>';
      h += '</tr>';
    }
    h += '</tbody></table>';

    /* Cascade explanation */
    var activePhase = null;
    for (var i = 0; i < cascaded.length; i++) { if (cascaded[i].status === 'active') { activePhase = cascaded[i]; break; } }
    if (activePhase && activePhase.cascadeNote) {
      h += '<div class="cascade-detail"><strong>Cascade Budget:</strong> ' + activePhase.cascadeNote + '. Completed phases lock at actual spend; net variance flows to the active phase.</div>';
    }
  }

  /* Per-Person Phase Breakdown (from detailed Snapshot data, if available) */
  var _sn = p.snapshot || null;
  if (_sn && _sn.phases) {
    var deptColors = {'Executive/Admin':'var(--ember)','Account':'var(--ocean)','Creative':'var(--sand)','Post':'var(--honey)'};
    var deptOrder = ['Executive/Admin','Account','Creative','Post'];
    var snPhases = _sn.phases;
    var phaseKeys = Object.keys(snPhases);

    /* Map snapshot phase keys to portfolio phase spent via phase number prefix */
    var snapshotPhasePrefix = {
      'Phase 1 - Initiation':'P1','Phase 2 - Ideation':'P2','Phase 2 - Research and strategy':'P2',
      'Phase 3.1 - Execution (Pre Pro)':'P3.1','Phase 3.1 Web Design - (user experience development)':'P3.1',
      'Phase 3.2 - Execution (Production)':'P3.2','Phase 3.2 -  (User Interface & Content development)':'P3.2',
      'Phase 4 - Compilation (Post)':'P4','Phase 4 - Development (QC testing & launch)':'P4',
      'Phase 5 - Resolution':'P5'
    };
    /* Build map from prefix to portfolio phase spent */
    var prefixSpentMap = {};
    for (var pi2 = 0; pi2 < p.phases.length; pi2++) {
      var pName = p.phases[pi2].name;
      var prefix = pName.match(/^P[\d.]+/);
      if (prefix) prefixSpentMap[prefix[0]] = p.phases[pi2].spent;
    }

    h += '<div class="person-phase-section">';
    h += '<div class="section-title">Team Allocation by Phase <span style="font-size:11px;font-weight:400;color:var(--mid-gray);margin-left:8px">Estimates from Snapshot ' + (_sn.snapshotVersion || '') + ' &middot; Spent from Timesheets</span></div>';

    /* Department legend */
    h += '<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">';
    for (var di = 0; di < deptOrder.length; di++) {
      h += '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid-gray)"><div style="width:10px;height:10px;border-radius:50%;background:' + deptColors[deptOrder[di]] + '"></div>' + deptOrder[di] + '</div>';
    }
    h += '</div>';

    for (var phi = 0; phi < phaseKeys.length; phi++) {
      var phKey = phaseKeys[phi];
      var phData = snPhases[phKey];
      if (!phData.people || !phData.people.length) continue;

      /* Get actual spent from portfolio (most current) via phase number prefix */
      var phPrefix = snapshotPhasePrefix[phKey] || phKey.match(/Phase (\d[\d.]*)/);
      if (phPrefix && typeof phPrefix === 'object') phPrefix = 'P' + phPrefix[1];
      var portfolioPhaseSpent = (phPrefix && prefixSpentMap[phPrefix]) || 0;

      var shortName = phKey.replace('Phase ','P').replace(' - ',': ').replace(' (Pre Pro)','').replace(' (Post)','').replace('Compilation','Post');
      var phaseOverall = phData.estimated > 0 ? Math.round((portfolioPhaseSpent / phData.estimated) * 100) : 0;
      h += '<div class="pp-phase-block">';
      h += '<div class="pp-phase-header"><div class="pp-phase-title">' + shortName + '</div>';
      h += '<div class="pp-phase-totals">Est: ' + phData.estimated.toFixed(1) + ' &middot; Spent: ' + portfolioPhaseSpent.toFixed(1) + ' hrs <span style="font-size:11px;color:' + (phaseOverall > 100 ? '#C62828' : phaseOverall > 75 ? 'var(--ocean)' : 'var(--mid-gray)') + '">(' + phaseOverall + '%)</span></div></div>';

      /* Group estimated people by department */
      var byDept = {};
      for (var pi = 0; pi < phData.people.length; pi++) {
        var per = phData.people[pi];
        var dept = per.dept || 'Other';
        if (!byDept[dept]) byDept[dept] = [];
        byDept[dept].push({ name: per.name, estimated: per.estimated, isUnplanned: false });
      }

      /* Always distribute portfolio phase spent by estimate share (snapshot actuals are always stale) */
      h += '<div class="pp-row pp-hdr" style="grid-template-columns:24px 1fr 70px 70px 120px"><div></div><div>Name</div><div style="text-align:right">Est.</div><div style="text-align:right">Spent</div><div>Progress</div></div>';

      for (var di = 0; di < deptOrder.length; di++) {
        var deptName = deptOrder[di];
        var deptPeople = byDept[deptName];
        if (!deptPeople || !deptPeople.length) continue;

        var deptEst = 0;
        for (var dpi = 0; dpi < deptPeople.length; dpi++) { deptEst += deptPeople[dpi].estimated; }
        /* Dept spent = proportional share of portfolio phase spent */
        var deptSpent = phData.estimated > 0 ? Math.round((deptEst / phData.estimated) * portfolioPhaseSpent * 100) / 100 : 0;
        var dc = deptColors[deptName] || 'var(--mid-gray)';
        var deptPct = deptEst > 0 ? Math.round((deptSpent / deptEst) * 100) : (deptSpent > 0 ? 100 : 0);
        var deptOver = deptSpent > deptEst && deptEst > 0;

        /* Department sub-header with progress bar */
        h += '<div style="display:grid;grid-template-columns:24px 1fr 70px 70px 120px;gap:8px;align-items:center;padding:8px 0 4px;border-bottom:2px solid ' + dc + '">';
        h += '<div><div style="width:10px;height:10px;border-radius:50%;background:' + dc + '"></div></div>';
        h += '<div style="font-size:12px;font-weight:700;color:var(--abyss)">' + deptName + '</div>';
        h += '<div class="pp-num" style="font-weight:700">' + deptEst.toFixed(1) + '</div>';
        h += '<div class="pp-num" style="font-weight:700;' + (deptOver ? 'color:#C62828' : '') + '">' + deptSpent.toFixed(1) + '</div>';
        h += '<div style="display:flex;align-items:center;gap:6px"><div class="pp-bar-wrap" style="flex:1"><div class="pp-bar-fill" style="width:' + Math.min(deptPct, 100) + '%;background:' + (deptOver ? '#C62828' : dc) + '"></div></div><span style="font-size:10px;color:' + (deptOver ? '#C62828' : 'var(--mid-gray)') + ';min-width:30px">' + deptPct + '%</span></div>';
        h += '</div>';

        /* People within department */
        for (var dpi = 0; dpi < deptPeople.length; dpi++) {
          var per2 = deptPeople[dpi];
          /* Distribute portfolio spent by estimate share — snapshot actuals ignored */
          var scaledSpent = (portfolioPhaseSpent > 0 && phData.estimated > 0 && per2.estimated > 0)
            ? Math.round((per2.estimated / phData.estimated) * portfolioPhaseSpent * 100) / 100
            : 0;
          var perPct = per2.estimated > 0 ? Math.round((scaledSpent / per2.estimated) * 100) : (scaledSpent > 0 ? 100 : 0);
          var perOver = scaledSpent > per2.estimated && per2.estimated > 0;
          h += '<div class="pp-row" style="grid-template-columns:24px 1fr 70px 70px 120px">';
          h += '<div></div>';
          h += '<div class="pp-name">' + per2.name + (per2.isUnplanned ? ' <span style="font-size:9px;color:var(--ember);font-weight:400">unplanned</span>' : '') + '</div>';
          h += '<div class="pp-num">' + (per2.estimated > 0 ? per2.estimated.toFixed(1) : '<span style="color:var(--mid-gray)">—</span>') + '</div>';
          h += '<div class="pp-num" style="' + (perOver ? 'color:#C62828;font-weight:700' : '') + '">' + (scaledSpent > 0 ? scaledSpent.toFixed(1) : '<span style="color:var(--mid-gray)">—</span>') + '</div>';
          h += '<div style="display:flex;align-items:center;gap:6px"><div class="pp-bar-wrap" style="flex:1"><div class="pp-bar-fill" style="width:' + Math.min(perPct, 100) + '%;background:' + (perOver ? '#C62828' : per2.isUnplanned ? 'var(--mid-gray)' : dc) + '"></div></div><span style="font-size:10px;color:' + (perOver ? '#C62828' : 'var(--mid-gray)') + ';min-width:30px">' + (per2.estimated > 0 || scaledSpent > 0 ? perPct + '%' : '') + '</span></div>';
          h += '</div>';
        }
      }
      h += '</div>';
    }
    h += '</div>';
  }

  /* Resource Allocation Section — upcoming weeks only */
  var weeks = buildWeeks(projectId);
  var todayStr = new Date().toISOString().slice(0,10);
  var curMon = getWeekMon(todayStr);
  var upcoming = [];
  for (var i = 0; i < weeks.length; i++) { if (weeks[i].sunday >= curMon) upcoming.push(weeks[i]); }

  h += '<div class="section-title" style="margin-top:32px">Upcoming Resource Allocation</div>';

  if (upcoming.length > 0) {
    var upcomingTotal = 0;
    for (var i = 0; i < upcoming.length; i++) upcomingTotal += upcoming[i].total;
    var maxWkHrs = 1;
    for (var i = 0; i < upcoming.length; i++) { if (upcoming[i].total > maxWkHrs) maxWkHrs = upcoming[i].total; }

    h += '<div style="font-size:12px;color:var(--mid-gray);margin-bottom:14px">' + upcoming.length + ' week' + (upcoming.length !== 1 ? 's' : '') + ' &middot; ' + upcomingTotal.toFixed(1) + ' hrs allocated</div>';

    /* Weekly timeline */
    h += '<div class="week-timeline">';
    for (var wi = 0; wi < upcoming.length; wi++) {
      var w = upcoming[wi];
      var isCur = w.sunday === curMon;
      var ppl = [];
      for (var pk in w.people) ppl.push([pk, w.people[pk]]);
      ppl.sort(function(a,b){return b[1]-a[1];});
      var segs = '';
      for (var si = 0; si < ppl.length; si++) {
        var sw = (ppl[si][1] / w.total) * (w.total / maxWkHrs) * 100;
        var sc = PC[ppl[si][0]] || '#9B9590';
        segs += '<div class="wb-seg" style="width:' + sw + '%;background:' + sc + '" title="' + ppl[si][0] + ': ' + ppl[si][1].toFixed(1) + 'h"></div>';
      }
      var ptags = '';
      for (var si = 0; si < ppl.length; si++) {
        if (ppl[si][0] === 'Unknown') continue;
        var fn = ppl[si][0].split(' ')[0];
        ptags += '<span class="week-person"><span class="pd" style="background:' + (PC[ppl[si][0]]||'#9B9590') + '"></span>' + fn + ' ' + ppl[si][1].toFixed(1) + 'h</span>';
      }
      h += '<div class="week-row' + (isCur ? ' current-week' : '') + '">';
      h += '<div class="week-label">' + (isCur ? '&#9654; ' : '') + 'Week ' + getISOWeek(w.sunday) + '<span class="wd">' + fmtDateShort(w.sunday) + ' – ' + fmtDateShort(getSaturday(w.sunday)) + '</span></div>';
      h += '<div class="week-hrs">' + w.total.toFixed(1) + '<span class="wu"> hrs</span></div>';
      h += '<div class="week-bar-wrap"><div class="week-bar">' + segs + '</div><div class="week-people">' + ptags + '</div></div>';
      h += '</div>';
    }
    h += '</div>';
  } else {
    /* No upcoming allocations — show current week date range */
    var curSunStr = curMon;
    var curSatDate = getSaturday(curSunStr);
    h += '<div style="font-size:13px;color:var(--mid-gray);margin-top:8px;padding:16px;background:var(--cloud);border-radius:8px">No allocations for upcoming week <span style="font-weight:600">(' + fmtDateShort(curSunStr) + ' – ' + fmtDateShort(curSatDate) + ')</span></div>';
  }

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: FLAGGED ── */
function renderFlagged() {
  var h = '<h1 class="page-title">Needs Attention</h1>';
  h += '<p class="page-subtitle">Projects missing data or requiring team input</p>';

  var all = allProjects();

  /* Missing Snapshots section at TOP */
  var noSnapshot = [];
  for (var i = 0; i < all.length; i++) {
    if (all[i].dataSource === 'no_snapshot') noSnapshot.push(all[i]);
  }

  if (noSnapshot.length) {
    h += '<div class="section-title" style="color:var(--honey)">Missing Snapshots</div>';
    var byClient = {};
    for (var i = 0; i < noSnapshot.length; i++) {
      var p = noSnapshot[i];
      if (!byClient[p.clientId]) byClient[p.clientId] = {name:p.clientName, code:p.clientCode, projects:[]};
      byClient[p.clientId].projects.push(p);
    }
    for (var cid in byClient) {
      var g = byClient[cid];
      h += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--mid-gray);margin-bottom:6px">' + g.code + ' ' + g.name + ' (' + g.projects.length + ')</div>';
      for (var j = 0; j < g.projects.length; j++) {
        var p = g.projects[j];
        h += '<div class="flagged-card" style="border-left-color:var(--honey);margin-bottom:8px"><div class="flag-title">' + p.name + '</div><div class="flag-reason" style="color:var(--honey)">No snapshot found on Monday.com board — cannot verify budget data</div><div class="flag-client">' + p.code + '</div></div>';
      }
      h += '</div>';
    }
  }

  if (FLAGGED_NO_STRUCTURE.length) {
    h += '<div class="section-title">No Phase Structure</div>';
    for (var i = 0; i < FLAGGED_NO_STRUCTURE.length; i++) {
      var f = FLAGGED_NO_STRUCTURE[i];
      h += '<div class="flagged-card"><div class="flag-title">' + f.name + '</div><div class="flag-reason">' + f.reason + '</div><div class="flag-client">' + f.clientCode + ' ' + f.client + ' &middot; ' + f.code + '</div></div>';
    }
  }

  /* Possibly Finished — over budget or all phases complete but still marked active */
  var possiblyDone = [];
  for (var i = 0; i < all.length; i++) {
    var p = all[i];
    if (isProjectCompleted(p)) continue;
    if (!p.hasBudgetData) continue;
    var totalPlanned = 0, totalSpent = 0;
    for (var j = 0; j < p.phases.length; j++) { totalPlanned += p.phases[j].planned; totalSpent += p.phases[j].spent; }
    if (totalPlanned > 0 && totalSpent >= totalPlanned * 0.95) {
      possiblyDone.push({name:p.name, code:p.code, clientName:p.clientName, clientCode:p.clientCode, spent:Math.round(totalSpent), planned:Math.round(totalPlanned), pct:Math.round(totalSpent/totalPlanned*100)});
    }
  }
  if (possiblyDone.length) {
    h += '<div class="section-title" style="color:#1565C0">Possibly Finished — Confirm Status</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">These projects have consumed 95%+ of their budgeted hours and may be finished. Please confirm so they can be moved to the Completed tab.</p>';
    for (var i = 0; i < possiblyDone.length; i++) {
      var f = possiblyDone[i];
      h += '<div class="flagged-card" style="border-left-color:#1565C0"><div class="flag-title">' + f.name + '</div><div class="flag-reason" style="color:#1565C0">Budget ' + f.pct + '% consumed (' + f.spent + '/' + f.planned + ' hrs)</div><div class="flag-client">' + f.clientCode + ' ' + f.clientName + ' &middot; ' + f.code + '</div></div>';
    }
  }

  if (!noSnapshot.length && !FLAGGED_NO_STRUCTURE.length && !possiblyDone.length) {
    h += '<div style="text-align:center;color:var(--mid-gray);padding:60px 0"><p style="font-size:40px;margin-bottom:12px">&#10003;</p><p>All projects have complete data</p></div>';
  }
  document.getElementById('mainContent').innerHTML = h;
}
