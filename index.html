/* ── COMPUTE ENGINE (builds RT_WEEKS from native allocations + actuals) ── */
function computeResourceWeeks() {
  var weekMap = {};

  /* 1. Process predicted hours from ALLOCATIONS (per-day format: each alloc has a .date field) */
  var allocs = ALLOCATIONS.allocations || [];
  for (var i = 0; i < allocs.length; i++) {
    var a = allocs[i];
    var dateField = a.date || a.weekOf; /* support both new per-day and old per-week format */
    var monISO = getMondayOfWeek ? getMondayOfWeek(dateField) : (a.weekOf || dateField);
    var mon = new Date(monISO + 'T00:00:00');
    var sun = new Date(mon); sun.setDate(sun.getDate() - 1);
    var sunKey = sun.toISOString().slice(0, 10);
    var hrs = a.hoursPerDay || a.totalHours || 0;

    if (!weekMap[sunKey]) weekMap[sunKey] = { people: {} };
    var wk = weekMap[sunKey];
    if (!wk.people[a.person]) wk.people[a.person] = { predicted: 0, actual: 0, projects: {} };
    wk.people[a.person].predicted += hrs;
    if (!wk.people[a.person].projects[a.project]) wk.people[a.person].projects[a.project] = { p: 0, a: 0 };
    wk.people[a.person].projects[a.project].p += hrs;
  }

  /* 2. Process actual hours from Supabase (preferred) or ACTUALS.weeks (fallback) */
  if (SUPA_LOADED && SUPA_ACTUALS_ALL.length > 0) {
    /* Group by week (Sunday boundary) and person */
    for (var i = 0; i < SUPA_ACTUALS_ALL.length; i++) {
      var a = SUPA_ACTUALS_ALL[i];
      if (!a.work_date || !a.person_name || !a.hours) continue;
      var d = new Date(a.work_date + 'T00:00:00');
      var day = d.getDay();
      var sun = new Date(d); sun.setDate(sun.getDate() - day);
      var sunKey = sun.toISOString().slice(0, 10);

      if (!weekMap[sunKey]) weekMap[sunKey] = { people: {} };
      var wk = weekMap[sunKey];
      var pn = a.person_name;
      if (!wk.people[pn]) wk.people[pn] = { predicted: 0, actual: 0, projects: {} };

      /* Map board_name to project name using RT_BUDGET_ALIASES */
      var projName = a.board_name || a.project_code || 'Unknown';
      /* Clean up board name: remove project code prefix (e.g. "320_30_10 - CES4 Post" -> "CES4 Post") */
      if (projName.match(/^\d+_\d+.*? - /)) {
        projName = projName.replace(/^\d+[\d_A-Za-z]*\s*-\s*/, '');
      }
      /* Apply aliases */
      if (RT_BUDGET_ALIASES[projName]) projName = RT_BUDGET_ALIASES[projName];

      wk.people[pn].actual += a.hours;
      if (!wk.people[pn].projects[projName]) wk.people[pn].projects[projName] = { p: 0, a: 0 };
      wk.people[pn].projects[projName].a += a.hours;
    }
  } else {
    /* Fallback to ACTUALS.weeks (old format) */
    var weeks = ACTUALS.weeks || [];
    for (var i = 0; i < weeks.length; i++) {
      var aw = weeks[i];
      var mon = new Date(aw.weekOf + 'T00:00:00');
      var sun = new Date(mon); sun.setDate(sun.getDate() - 1);
      var sunKey = sun.toISOString().slice(0, 10);

      if (!weekMap[sunKey]) weekMap[sunKey] = { people: {} };
      var wk = weekMap[sunKey];
      for (var pn in aw.people) {
        if (!wk.people[pn]) wk.people[pn] = { predicted: 0, actual: 0, projects: {} };
        var projs = aw.people[pn].projects || {};
        for (var proj in projs) {
          wk.people[pn].actual += projs[proj];
          if (!wk.people[pn].projects[proj]) wk.people[pn].projects[proj] = { p: 0, a: 0 };
          wk.people[pn].projects[proj].a += projs[proj];
        }
      }
    }
  }

  /* 3. Also merge in any existing RT_WEEKS data from portfolio.json (for backward compat during migration) */
  /* This keeps old actual data visible until it's migrated to actuals.json */

  /* 4. Build sorted array */
  var sundays = Object.keys(weekMap).sort();
  var result = [];
  for (var i = 0; i < sundays.length; i++) {
    var s = sundays[i];
    var sat = new Date(s + 'T00:00:00'); sat.setDate(sat.getDate() + 6);
    var sunD = new Date(s + 'T00:00:00');
    var label = sunD.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' + sat.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    result.push({ label: label, sunday: s, people: weekMap[s].people });
  }

  /* Only replace RT_WEEKS if we have native data; otherwise keep portfolio.json data */
  if (allocs.length > 0 || weeks.length > 0) {
    /* Merge: keep portfolio.json weeks that aren't covered by native data */
    var nativeSundays = {};
    for (var i = 0; i < result.length; i++) nativeSundays[result[i].sunday] = true;
    for (var i = 0; i < RT_WEEKS.length; i++) {
      if (!nativeSundays[RT_WEEKS[i].sunday]) result.push(RT_WEEKS[i]);
    }
    result.sort(function(a, b) { return a.sunday < b.sunday ? -1 : a.sunday > b.sunday ? 1 : 0; });
    RT_WEEKS = result;
  }
}

function getNextMonday() {

function getCurrentMonday() {
  var d = new Date(); var day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d.toISOString().slice(0, 10);
}
function shiftWeek(mondayISO, delta) {
  var d = new Date(mondayISO + 'T00:00:00');
  d.setDate(d.getDate() + delta * 7);
  return d.toISOString().slice(0, 10);
}
function getMondayOfWeek(dateISO) {
  var d = new Date(dateISO + 'T00:00:00'); var day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().slice(0, 10);
}
function getWeekDays(mondayISO) {
  var days = []; var d = new Date(mondayISO + 'T00:00:00');
  for (var i = 0; i < 5; i++) {
    days.push(new Date(d).toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

  return list;
}

/* Set hours for a cell — creates or updates or deletes allocation */
function allocSetCell(project, person, dateISO, hours) {
  var allocs = ALLOCATIONS.allocations;
  var idx = -1;
  for (var i = 0; i < allocs.length; i++) {
    if (allocs[i].project === project && allocs[i].person === person && allocs[i].date === dateISO) { idx = i; break; }
  }
  var weekOf = getMondayOfWeek(dateISO);
  if (hours <= 0) {
    if (idx >= 0) allocs.splice(idx, 1);
  } else if (idx >= 0) {
    allocs[idx].hoursPerDay = hours;
    allocs[idx].modified = new Date().toISOString();
  } else {
    allocs.push({
      id: 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      person: person, project: project, date: dateISO,
      hoursPerDay: hours,
      weekOf: weekOf,
      totalHours: hours, days: 1, notes: '',
      created: new Date().toISOString(), modified: new Date().toISOString()
    });
  }
  /* Save to Supabase if connected */
  saveAllocationToSupabase(person, project, dateISO, hours, weekOf);
  allocDebouncedSave();
}

/* ── OOP PLANNER HELPERS ── */

function oopGetProjectEntries(projName, mondayISO) {
  var days = getWeekDays(mondayISO);
  var entries = OOP_SCHEDULE.entries || [];
  var matched = [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].projectName === projName && days.indexOf(entries[i].date) >= 0) matched.push(entries[i]);
  }
  return matched;
}

function oopGetDayEntries(projName, dateISO) {
  var entries = OOP_SCHEDULE.entries || [];
  var matched = [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].projectName === projName && entries[i].date === dateISO) matched.push(entries[i]);
  }
  return matched;
}

function oopGetDayTotal(dateISO) {
  var entries = OOP_SCHEDULE.entries || [];
  var total = 0;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].date === dateISO) total += entries[i].amount || 0;
  }
  return total;
}

function oopGetProjectWeekTotal(projName, mondayISO) {
  var items = oopGetProjectEntries(projName, mondayISO);
  var total = 0;
  for (var i = 0; i < items.length; i++) total += items[i].amount || 0;
  return total;
}

function oopGetWeekGrandTotal(mondayISO) {
  var days = getWeekDays(mondayISO);
  var entries = OOP_SCHEDULE.entries || [];
  var total = 0;
  for (var i = 0; i < entries.length; i++) {
    if (days.indexOf(entries[i].date) >= 0) total += entries[i].amount || 0;
  }
  return total;
}

function oopGetProjectsWithEntries(mondayISO) {
  var days = getWeekDays(mondayISO);
  var entries = OOP_SCHEDULE.entries || [];
  var names = {};
  for (var i = 0; i < entries.length; i++) {
    if (days.indexOf(entries[i].date) >= 0) names[entries[i].projectName] = true;
  }
  return names;
}

async function saveOopSchedule() {
  if (window.furnaceAPI) await window.furnaceAPI.writeOopSchedule(OOP_SCHEDULE);
}

function oopDebouncedSave() {
  if (oopSaveTimer) clearTimeout(oopSaveTimer);
  oopSaveTimer = setTimeout(function() {
    saveOopSchedule();
    var el = document.getElementById('oopSaveStatus');
    if (el) { el.textContent = 'Saved'; setTimeout(function() { if (el) el.textContent = ''; }, 1500); }
  }, 400);
}

function oopAddEntry(projName, projCode, lineItemName, amount, dateISO, notes, supaOopId) {
  var entry = {
    id: 'oop_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    projectCode: projCode,
    projectName: projName,
    lineItemName: lineItemName,
    amount: amount,
    date: dateISO,
    weekOf: getMondayOfWeek(dateISO),
    paid: false,
    notes: notes || '',
    supaOopId: supaOopId || null
  };
  OOP_SCHEDULE.entries.push(entry);
  oopDebouncedSave();
  return entry;
}

function oopUpdateEntry(id, updates) {
  var entries = OOP_SCHEDULE.entries || [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) {
      for (var k in updates) { if (updates.hasOwnProperty(k)) entries[i][k] = updates[k]; }
      oopDebouncedSave();
      return;
    }
  }
}

function oopDeleteEntry(id) {
  var entries = OOP_SCHEDULE.entries || [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) {
      entries.splice(i, 1);
      oopDebouncedSave();
      return;
    }
  }
}

function oopTogglePaid(id) {
  var entries = OOP_SCHEDULE.entries || [];
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === id) {
      entries[i].paid = !entries[i].paid;
      oopDebouncedSave();
      renderOopGrid();
      return;
    }
  }
}

function oopGetPredictedForProject(projectCode) {
  var entries = OOP_SCHEDULE.entries || [];
  var today = new Date().toISOString().slice(0, 10);
  var total = 0;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].projectCode === projectCode && !entries[i].paid && entries[i].date >= today) {
      total += entries[i].amount || 0;
    }
  }
  return total;
}

async function oopToggleLineItemPaid(supaOopId, newPaid, projCode) {
  /* Update Supabase oop_budget_entries paid + paid_date */
  var today = new Date().toISOString().slice(0, 10);
  var patchData = { paid: newPaid, paid_date: newPaid ? today : null };
  await sparkFetch('oop_budget_entries?id=eq.' + supaOopId, '', 'PATCH', patchData);
  /* Update local cache */
  if (SUPA_BUDGETS && SUPA_BUDGETS[projCode] && SUPA_BUDGETS[projCode]._oopEntries) {
    var entries = SUPA_BUDGETS[projCode]._oopEntries;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].id === supaOopId) { entries[i].paid = newPaid; entries[i].paid_date = newPaid ? today : null; break; }
    }
    /* Recalc oopSpent */
    var spent = 0;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].paid && entries[i].is_active !== false) {
        var eff;
        if (entries[i].actual_amount != null) eff = entries[i].actual_amount;
        else if (entries[i].adjusted_count != null || entries[i].adjusted_rate != null) {
          eff = (entries[i].adjusted_count != null ? entries[i].adjusted_count : (entries[i].count||0)) * (entries[i].adjusted_rate != null ? entries[i].adjusted_rate : (entries[i].rate||0)) * (entries[i].adjusted_days != null ? entries[i].adjusted_days : (entries[i].days||1)) * (entries[i].adjusted_head_count != null ? entries[i].adjusted_head_count : (entries[i].head_count||1));
        } else {
          eff = (entries[i].count||0) * (entries[i].rate||0) * (entries[i].days||1) * (entries[i].head_count||1);
        }
        spent += eff;
      }
    }
    SUPA_BUDGETS[projCode].oopSpent = spent;
  }
  renderOopProjList();
  renderOopGrid();
}

async function oopConfirmSchedule(projName, projCode, itemName, supaOopId) {
  var dateVal = document.getElementById('oopSchedDate').value;
  var amount = parseFloat(document.getElementById('oopSchedAmount').value) || 0;
  var notes = (document.getElementById('oopSchedNotes').value || '').trim();
  if (!dateVal || amount <= 0) { alert('Please pick a date and enter an amount.'); return; }

  /* If amount was adjusted, update the actual_amount in Supabase */
  var origEntries = oopGetProjectLineItems(projCode);
  var origEntry = null;
  for (var i = 0; i < origEntries.length; i++) {
    if (origEntries[i].id === supaOopId) { origEntry = origEntries[i]; break; }
  }
  if (origEntry) {
    var origEffective = (origEntry.count||0) * (origEntry.rate||0) * (origEntry.days||1) * (origEntry.head_count||1);
    if (origEntry.adjusted_count != null || origEntry.adjusted_rate != null) {
      origEffective = (origEntry.adjusted_count != null ? origEntry.adjusted_count : (origEntry.count||0)) * (origEntry.adjusted_rate != null ? origEntry.adjusted_rate : (origEntry.rate||0));
    }
    if (Math.abs(amount - origEffective) > 0.01) {
      /* Amount was adjusted — save as actual_amount in Supabase */
      await sparkFetch('oop_budget_entries?id=eq.' + supaOopId, '', 'PATCH', { actual_amount: amount });
      origEntry.actual_amount = amount;
    }
  }

  /* Add to OOP schedule */
  oopAddEntry(projName, projCode, itemName, amount, dateVal, notes, supaOopId);

  var overlay = document.getElementById('oopModalOverlay');
  if (overlay) overlay.remove();
  renderOopProjList();
  renderOopGrid();
}

function oopGetProjectLineItems(projCode) {
  /* Fetch OOP line items from SUPA_BUDGETS cache for this project */
  if (!SUPA_BUDGETS || !SUPA_BUDGETS[projCode]) return [];
  var sb = SUPA_BUDGETS[projCode];
  /* The oopEntries are stored during loadSupabaseData */
  return sb._oopEntries || [];
}

function renderOopProjList() {
  var el = document.getElementById('oopProjListInner');
  if (!el) return;
  var projects = getProjectList();
  var search = (oopProjSearch || '').toLowerCase();

  /* Build sets: projects with OOP schedule entries AND projects with OOP budget entries in Supabase */
  var hasSchedule = {};
  var entries = OOP_SCHEDULE.entries || [];
  for (var i = 0; i < entries.length; i++) hasSchedule[entries[i].projectName] = true;

  var hasOopBudget = {};
  if (SUPA_BUDGETS) {
    for (var code in SUPA_BUDGETS) {
      var sb = SUPA_BUDGETS[code];
      if ((sb.oopTotal || 0) > 0 || (sb.oopEffective || 0) > 0) {
        for (var pi = 0; pi < projects.length; pi++) {
          if (projects[pi].code === code) { hasOopBudget[projects[pi].name] = true; break; }
        }
      }
    }
  }

  var h = '';
  var lastClient = '';
  var shown = 0;
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    if (!search && !hasOopBudget[p.name] && !hasSchedule[p.name]) continue;
    if (search && p.name.toLowerCase().indexOf(search) < 0 && p.code.toLowerCase().indexOf(search) < 0 && p.client.toLowerCase().indexOf(search) < 0) continue;
    if (p.client !== lastClient) {
      h += '<div class="aps-client"><span style="color:' + p.clientColor + '">&#9679;</span> ' + p.clientCode + ' ' + p.client + '</div>';
      lastClient = p.client;
    }
    var isActive = oopSelectedProject === p.name;
    var schedCount = 0;
    for (var si = 0; si < entries.length; si++) { if (entries[si].projectName === p.name) schedCount++; }

    h += '<div class="aps-item' + (isActive ? ' active' : '') + '" onclick="oopSelectedProject=' + (isActive ? 'null' : '\'' + p.name.replace(/'/g, "\\'") + '\'') + ';renderOopProjList();renderOopGrid()">';
    h += '<span style="font-size:9px;margin-right:4px">' + (isActive ? '\u25BC' : '\u25B6') + '</span>';
    h += '<span class="aps-code">' + p.code + '</span> ' + p.name;
    if (schedCount > 0) h += '<span style="margin-left:auto;background:#F57F17;color:white;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600">' + schedCount + '</span>';
    h += '</div>';

    /* Expanded: show line items from snapshot */
    if (isActive) {
      var lineItems = oopGetProjectLineItems(p.code);
      var activeItems = [];
      for (var li = 0; li < lineItems.length; li++) {
        var oi = lineItems[li];
        if (oi.is_active === false) continue;
        /* Calculate effective value using cascade */
        var planned = (oi.count || 0) * (oi.rate || 0) * (oi.days || 1) * (oi.head_count || 1);
        var effective;
        if (oi.actual_amount != null) {
          effective = oi.actual_amount;
        } else if (oi.adjusted_count != null || oi.adjusted_rate != null) {
          effective = (oi.adjusted_count != null ? oi.adjusted_count : (oi.count||0)) * (oi.adjusted_rate != null ? oi.adjusted_rate : (oi.rate||0)) * (oi.adjusted_days != null ? oi.adjusted_days : (oi.days||1)) * (oi.adjusted_head_count != null ? oi.adjusted_head_count : (oi.head_count||1));
        } else {
          effective = planned;
        }
        if (effective > 0) activeItems.push({id: oi.id, name: oi.line_item_name || 'Unnamed', effective: effective, paid: oi.paid || false, supaId: oi.id});
      }

      if (activeItems.length > 0) {
        h += '<div style="background:rgba(0,0,0,.03);padding:6px 8px 8px 20px;border-bottom:1px solid var(--canvas)">';
        for (var ai = 0; ai < activeItems.length; ai++) {
          var item = activeItems[ai];
          /* Check if this item is already scheduled */
          var isScheduled = false;
          for (var si = 0; si < entries.length; si++) {
            if (entries[si].projectCode === p.code && entries[si].lineItemName === item.name && entries[si].supaOopId === item.supaId) {
              isScheduled = true; break;
            }
          }
          var paidBg = item.paid ? 'background:rgba(46,125,50,.1);' : '';
          h += '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;' + paidBg + 'border-radius:4px;padding:4px 6px;margin-bottom:2px">';
          /* Paid checkbox — syncs to Supabase */
          h += '<input type="checkbox" ' + (item.paid ? 'checked' : '') + ' onclick="event.stopPropagation();oopToggleLineItemPaid(\'' + item.supaId + '\',' + !item.paid + ',\'' + p.code + '\')" style="cursor:pointer" title="Mark as paid">';
          h += '<span style="flex:1;' + (item.paid ? 'text-decoration:line-through;opacity:.5' : '') + '">' + item.name + '</span>';
          h += '<span style="font-weight:600;font-variant-numeric:tabular-nums;' + (item.paid ? 'color:#2E7D32' : '') + '">$' + Math.round(item.effective).toLocaleString() + '</span>';
          /* Schedule button */
          if (!isScheduled && !item.paid) {
            h += '<button onclick="event.stopPropagation();oopScheduleLineItem(\'' + p.name.replace(/'/g, "\\'") + '\',\'' + p.code + '\',\'' + item.name.replace(/'/g, "\\'") + '\',' + item.effective + ',\'' + item.supaId + '\')" style="padding:2px 6px;border-radius:4px;border:1px solid var(--ocean);background:transparent;color:var(--ocean);cursor:pointer;font-size:9px;font-weight:600;white-space:nowrap" title="Schedule payment date">📅</button>';
          } else if (isScheduled) {
            h += '<span style="font-size:9px;color:#F57F17;font-weight:600" title="Already scheduled">\u2713 Sched</span>';
          }
          h += '</div>';
        }
        h += '</div>';
      } else {
        h += '<div style="padding:8px 20px;font-size:10px;color:var(--mid-gray)">No OOP line items with cost in snapshot</div>';
      }
    }
    shown++;
  }
  if (!shown && search) h = '<div style="padding:14px;font-size:11px;color:var(--mid-gray)">No projects match.</div>';
  if (!shown && !search) h = '<div style="padding:14px;font-size:11px;color:var(--mid-gray)">No projects with OOP data. Add OOP entries in a project\'s Budget Snapshot first.</div>';
  el.innerHTML = h;
}

function renderOopGrid() {
  var el = document.getElementById('oopGridScroll');
  var lbl = document.getElementById('oopWeekLabel');
  if (!el) return;

  /* Build entry lookup for modal editing */
  _oopEntryLookup = {};
  var allEnt = OOP_SCHEDULE.entries || [];
  for (var li = 0; li < allEnt.length; li++) _oopEntryLookup[allEnt[li].id] = allEnt[li];

  if (!oopSelectedProject) {
    if (lbl) lbl.innerHTML = '';
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mid-gray);font-size:14px">Select a project from the sidebar to schedule OOP payments</div>';
    renderOopFooter();
    return;
  }

  /* Find project code */
  var projCode = '';
  var projects = getProjectList();
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].name === oopSelectedProject) { projCode = projects[i].code; break; }
  }

  if (oopViewMode === 'month') {
    renderOopGridMonth(el, lbl, projCode);
  } else if (oopViewMode === 'day') {
    renderOopGridDay(el, lbl, projCode);
  } else {
    renderOopGridWeek(el, lbl, projCode);
  }
  renderOopFooter();
}

function renderOopGridWeek(el, lbl, projCode) {
  var days = getWeekDays(allocWeekOf);
  if (lbl) lbl.innerHTML = getAllocWeekLabel(allocWeekOf);
  var cols = days.length;
  var gridCols = '60px';
  for (var c = 0; c < cols; c++) gridCols += ' 1fr';
  gridCols += ' 80px';

  var h = '<div class="oop-grid" style="grid-template-columns:' + gridCols + '">';

  /* Header row */
  h += '<div class="oop-corner"></div>';
  for (var c = 0; c < days.length; c++) {
    var isToday = days[c] === new Date().toISOString().slice(0, 10);
    h += '<div class="oop-col-hdr" style="' + (isToday ? 'background:rgba(48,109,124,.08)' : '') + '">';
    h += '<span class="oop-day">' + fmtDayShort(days[c]) + '</span> ' + fmtMonShort(days[c]) + ' ' + fmtDayNum(days[c]);
    h += '</div>';
  }
  h += '<div class="oop-col-hdr" style="font-size:10px">Week Total</div>';

  /* Project row */
  h += '<div class="oop-row-hdr"><span class="oop-proj-code">' + projCode + '</span></div>';
  var weekTotal = 0;
  for (var c = 0; c < days.length; c++) {
    var dayEntries = oopGetDayEntries(oopSelectedProject, days[c]);
    var isToday = days[c] === new Date().toISOString().slice(0, 10);
    h += '<div class="oop-cell" style="' + (isToday ? 'background:rgba(48,109,124,.04)' : '') + '" onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + days[c] + '\',null)">';
    if (dayEntries.length === 0) {
      h += '<div class="oop-cell-empty"><span style="font-size:18px;color:var(--canvas)">+</span></div>';
    } else {
      for (var e = 0; e < dayEntries.length; e++) {
        var ent = dayEntries[e];
        weekTotal += ent.amount || 0;
        var chipClass = ent.paid ? 'paid' : 'scheduled';
        h += '<div class="oop-chip ' + chipClass + '" onclick="event.stopPropagation();oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + days[c] + '\',\'' + ent.id + '\')">';
        h += '<span class="oop-chip-name">' + (ent.lineItemName || '') + '</span>';
        h += '<span class="oop-chip-amt">$' + Math.round(ent.amount).toLocaleString() + '</span>';
        h += '</div>';
      }
      h += '<div style="text-align:center;margin-top:2px"><span style="font-size:14px;color:var(--canvas);cursor:pointer" title="Add another">+</span></div>';
    }
    h += '</div>';
  }
  h += '<div class="oop-total-cell">$' + Math.round(weekTotal).toLocaleString() + '</div>';

  /* Daily totals row */
  h += '<div class="oop-row-hdr" style="font-size:10px;color:var(--mid-gray)">All Projects</div>';
  var grandTotal = 0;
  for (var c = 0; c < days.length; c++) {
    var dayTotal = oopGetDayTotal(days[c]);
    grandTotal += dayTotal;
    h += '<div class="oop-grand-total" style="background:var(--abyss);color:var(--white);border-bottom:1px solid rgba(255,255,255,.1)">' + (dayTotal > 0 ? '$' + Math.round(dayTotal).toLocaleString() : '&mdash;') + '</div>';
  }
  h += '<div class="oop-grand-total">$' + Math.round(grandTotal).toLocaleString() + '</div>';
  h += '</div>';

  /* Entry list below */
  h += renderOopEntryList(projCode);
  el.innerHTML = h;
}

function renderOopGridDay(el, lbl, projCode) {
  var today = new Date();
  today.setDate(today.getDate() + (oopDayOffset || 0));
  var dayStr = today.toISOString().slice(0, 10);
  var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (lbl) lbl.innerHTML = dayNames[today.getDay()] + ', ' + monthNames[today.getMonth()] + ' ' + today.getDate() + ', ' + today.getFullYear();

  var dayEntries = oopGetDayEntries(oopSelectedProject, dayStr);
  var allDayEntries = (OOP_SCHEDULE.entries || []).filter(function(e) { return e.date === dayStr; });
  var dayTotal = 0;
  for (var i = 0; i < dayEntries.length; i++) dayTotal += dayEntries[i].amount || 0;
  var allTotal = 0;
  for (var i = 0; i < allDayEntries.length; i++) allTotal += allDayEntries[i].amount || 0;

  var h = '<div style="max-width:600px;margin:0 auto">';

  /* Day header */
  h += '<div style="background:var(--abyss);color:var(--white);padding:16px 20px;border-radius:10px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">';
  h += '<div><div style="font-size:14px;font-weight:700">' + oopSelectedProject + '</div><div style="font-size:11px;opacity:.5">' + projCode + '</div></div>';
  h += '<div style="text-align:right"><div style="font-size:10px;opacity:.5">Day Total</div><div style="font-size:22px;font-weight:700;color:var(--honey)">$' + Math.round(dayTotal).toLocaleString() + '</div></div>';
  h += '</div>';

  /* Entries for selected project */
  if (dayEntries.length === 0) {
    h += '<div style="text-align:center;padding:40px;color:var(--mid-gray)">';
    h += '<div style="font-size:32px;margin-bottom:8px">+</div>';
    h += '<div style="font-size:13px">No OOP scheduled for this day</div>';
    h += '<button onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + dayStr + '\',null)" style="margin-top:12px;padding:8px 20px;border-radius:6px;border:none;background:var(--ocean);color:var(--white);cursor:pointer;font-size:12px;font-weight:600">Add OOP Payment</button>';
    h += '</div>';
  } else {
    for (var i = 0; i < dayEntries.length; i++) {
      var ent = dayEntries[i];
      var borderColor = ent.paid ? '#81C784' : '#FFB74D';
      h += '<div style="background:var(--white);border-radius:8px;border-left:4px solid ' + borderColor + ';padding:14px 18px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + dayStr + '\',\'' + ent.id + '\')">';
      h += '<div>';
      h += '<div style="font-size:14px;font-weight:600">' + (ent.lineItemName || 'Unnamed') + '</div>';
      if (ent.notes) h += '<div style="font-size:11px;color:var(--mid-gray);margin-top:2px">' + ent.notes + '</div>';
      h += '</div>';
      h += '<div style="text-align:right">';
      h += '<div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums">$' + Math.round(ent.amount).toLocaleString() + '</div>';
      h += '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;' + (ent.paid ? 'background:rgba(46,125,50,.15);color:#2E7D32' : 'background:rgba(245,127,23,.15);color:#F57F17') + '">' + (ent.paid ? 'Paid' : 'Scheduled') + '</span>';
      h += '</div></div>';
    }
    h += '<button onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + dayStr + '\',null)" style="width:100%;padding:10px;border-radius:6px;border:1px dashed var(--canvas);background:transparent;color:var(--mid-gray);cursor:pointer;font-size:12px;margin-top:4px">+ Add Another</button>';
  }

  /* All projects summary for this day */
  if (allDayEntries.length > 0) {
    h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--canvas)">';
    h += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mid-gray);font-weight:600;margin-bottom:8px">All Projects on ' + dayStr + '</div>';
    var byProj = {};
    for (var i = 0; i < allDayEntries.length; i++) {
      var e = allDayEntries[i];
      if (!byProj[e.projectName]) byProj[e.projectName] = 0;
      byProj[e.projectName] += e.amount || 0;
    }
    for (var pn in byProj) {
      h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px">';
      h += '<span>' + pn + '</span>';
      h += '<span style="font-weight:600;font-variant-numeric:tabular-nums">$' + Math.round(byProj[pn]).toLocaleString() + '</span>';
      h += '</div>';
    }
    h += '<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:13px;font-weight:700;border-top:1px solid var(--canvas);margin-top:4px">';
    h += '<span>Grand Total</span><span>$' + Math.round(allTotal).toLocaleString() + '</span></div>';
    h += '</div>';
  }

  h += '</div>';
  el.innerHTML = h;
}

function renderOopGridMonth(el, lbl, projCode) {
  /* Get the first Monday of the month containing allocWeekOf */
  var baseDate = new Date(allocWeekOf + 'T00:00:00');
  var monthStart = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
  var monthEnd = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 0);
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (lbl) lbl.innerHTML = monthNames[baseDate.getMonth()] + ' ' + baseDate.getFullYear();

  /* Find the Monday on or before the 1st */
  var firstDay = new Date(monthStart);
  while (firstDay.getDay() !== 1) firstDay.setDate(firstDay.getDate() - 1);

  /* Build 5-6 weeks worth of dates */
  var weeks = [];
  var cursor = new Date(firstDay);
  while (cursor <= monthEnd || weeks.length < 5) {
    var week = [];
    for (var d = 0; d < 5; d++) { /* Mon-Fri */
      week.push(cursor.toISOString().slice(0, 10));
      cursor.setDate(cursor.getDate() + 1);
    }
    cursor.setDate(cursor.getDate() + 2); /* skip weekend */
    weeks.push(week);
    if (weeks.length >= 6) break;
  }

  var todayStr = new Date().toISOString().slice(0, 10);
  var curMonth = baseDate.getMonth();

  /* Grid: 6 columns (Mon-Fri + Week Total) */
  var h = '<div style="display:grid;grid-template-columns:repeat(5,1fr) 80px;gap:1px;background:var(--canvas);border-radius:8px;overflow:hidden">';

  /* Day headers */
  var dayNames = ['Mon','Tue','Wed','Thu','Fri'];
  for (var d = 0; d < 5; d++) {
    h += '<div style="padding:8px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mid-gray);font-weight:600;text-align:center;background:var(--white)">' + dayNames[d] + '</div>';
  }
  h += '<div style="padding:8px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mid-gray);font-weight:600;text-align:center;background:var(--white)">Total</div>';

  /* Week rows */
  for (var w = 0; w < weeks.length; w++) {
    var weekDays = weeks[w];
    var weekTotal = 0;

    for (var d = 0; d < 5; d++) {
      var day = weekDays[d];
      var dayDate = new Date(day + 'T00:00:00');
      var isThisMonth = dayDate.getMonth() === curMonth;
      var isToday = day === todayStr;
      var dayEntries = oopGetDayEntries(oopSelectedProject, day);
      var dayAmt = 0;
      for (var e = 0; e < dayEntries.length; e++) dayAmt += dayEntries[e].amount || 0;
      weekTotal += dayAmt;

      var bg = isToday ? 'rgba(48,109,124,.06)' : 'var(--white)';
      var opacity = isThisMonth ? '1' : '0.4';

      h += '<div style="background:' + bg + ';padding:6px 8px;min-height:70px;opacity:' + opacity + ';cursor:pointer;position:relative" onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + day + '\',null)">';
      h += '<div style="font-size:11px;font-weight:600;color:' + (isToday ? 'var(--ocean)' : 'var(--abyss)') + ';margin-bottom:4px">' + dayDate.getDate() + '</div>';

      for (var e = 0; e < dayEntries.length; e++) {
        var ent = dayEntries[e];
        var chipColor = ent.paid ? '#81C784' : '#FFB74D';
        h += '<div style="font-size:9px;padding:2px 5px;border-radius:3px;background:' + chipColor + '33;color:' + (ent.paid ? '#2E7D32' : '#F57F17') + ';margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="event.stopPropagation();oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + day + '\',\'' + ent.id + '\')">';
        h += (ent.lineItemName || '') + ' $' + Math.round(ent.amount).toLocaleString();
        h += '</div>';
      }
      if (dayEntries.length === 0 && isThisMonth) {
        h += '<div style="font-size:14px;color:var(--canvas);text-align:center;margin-top:8px">+</div>';
      }
      h += '</div>';
    }
    /* Week total */
    h += '<div style="background:var(--abyss);color:var(--white);padding:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">' + (weekTotal > 0 ? '$' + Math.round(weekTotal).toLocaleString() : '\u2014') + '</div>';
  }

  /* Month total row */
  var monthTotal = 0;
  var monthEntries = (OOP_SCHEDULE.entries || []).filter(function(e) {
    if (e.projectName !== oopSelectedProject) return false;
    var ed = new Date(e.date + 'T00:00:00');
    return ed.getMonth() === curMonth && ed.getFullYear() === baseDate.getFullYear();
  });
  for (var i = 0; i < monthEntries.length; i++) monthTotal += monthEntries[i].amount || 0;

  h += '<div style="grid-column:1/6;background:var(--abyss);color:var(--white);padding:10px 14px;font-size:11px;font-weight:600">Month Total</div>';
  h += '<div style="background:var(--abyss);color:var(--honey);padding:10px;font-size:14px;font-weight:700;text-align:center">$' + Math.round(monthTotal).toLocaleString() + '</div>';

  h += '</div>';

  /* Entry list below */
  h += renderOopEntryList(projCode);
  el.innerHTML = h;
}

/* (week view day cells rendered inline in renderOopGridWeek) */

function renderOopEntryList(projCode) {
  var allEntries = (OOP_SCHEDULE.entries || []).filter(function(e) { return e.projectName === oopSelectedProject; });
  if (allEntries.length === 0) return '';
  allEntries.sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  var h = '<div style="padding:16px 18px;background:var(--white);border-top:1px solid var(--canvas)">';
  h += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mid-gray);font-weight:600;margin-bottom:8px">All Scheduled OOP for ' + oopSelectedProject + '</div>';
  h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  h += '<tr style="border-bottom:1px solid var(--canvas);font-size:10px;color:var(--mid-gray);text-transform:uppercase;letter-spacing:.5px">';
  h += '<th style="text-align:left;padding:6px 8px">Date</th><th style="text-align:left;padding:6px 8px">Line Item</th><th style="text-align:right;padding:6px 8px">Amount</th><th style="text-align:center;padding:6px 8px">Status</th><th style="text-align:left;padding:6px 8px">Notes</th></tr>';
  var allTotal = 0;
  for (var i = 0; i < allEntries.length; i++) {
    var ent = allEntries[i];
    allTotal += ent.amount || 0;
    h += '<tr style="border-bottom:1px solid var(--light-gray);cursor:pointer" onclick="oopShowModal(\'' + oopSelectedProject.replace(/'/g, "\\'") + '\',\'' + projCode + '\',\'' + ent.date + '\',\'' + ent.id + '\')">';
    h += '<td style="padding:6px 8px;font-variant-numeric:tabular-nums">' + ent.date + '</td>';
    h += '<td style="padding:6px 8px">' + (ent.lineItemName || '') + '</td>';
    h += '<td style="padding:6px 8px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums">$' + Math.round(ent.amount).toLocaleString() + '</td>';
    h += '<td style="padding:6px 8px;text-align:center"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;' + (ent.paid ? 'background:rgba(46,125,50,.15);color:#2E7D32' : 'background:rgba(245,127,23,.15);color:#F57F17') + '">' + (ent.paid ? 'Paid' : 'Scheduled') + '</span></td>';
    h += '<td style="padding:6px 8px;color:var(--mid-gray);font-size:11px">' + (ent.notes || '') + '</td>';
    h += '</tr>';
  }
  h += '<tr style="font-weight:700"><td style="padding:6px 8px" colspan="2">Total</td><td style="padding:6px 8px;text-align:right;font-variant-numeric:tabular-nums">$' + Math.round(allTotal).toLocaleString() + '</td><td colspan="2"></td></tr>';
  h += '</table></div>';
  return h;
}

function renderOopFooter() {
  var el = document.getElementById('oopFooter');
  if (!el) return;
  var entries = OOP_SCHEDULE.entries || [];
  var totalScheduled = 0, totalPaid = 0, count = 0;
  for (var i = 0; i < entries.length; i++) {
    count++;
    if (entries[i].paid) totalPaid += entries[i].amount || 0;
    else totalScheduled += entries[i].amount || 0;
  }
  var h = '<div><span class="oop-stat-label">Total Entries</span> <span class="oop-stat">' + count + '</span></div>';
  h += '<div><span class="oop-stat-label">Scheduled</span> <span class="oop-stat" style="color:#F57F17">$' + Math.round(totalScheduled).toLocaleString() + '</span></div>';
  h += '<div><span class="oop-stat-label">Paid</span> <span class="oop-stat" style="color:#2E7D32">$' + Math.round(totalPaid).toLocaleString() + '</span></div>';
  h += '<div><span class="oop-stat-label">Grand Total</span> <span class="oop-stat">$' + Math.round(totalScheduled + totalPaid).toLocaleString() + '</span></div>';
  el.innerHTML = h;
}

function renderAllocProjList() {
  var el = document.getElementById('allocProjListInner');
  if (!el) return;
  var projects = getProjectList();
  var search = (allocProjSearch || '').toLowerCase();
  var h = '';
  var lastClient = '';
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    if (search && p.name.toLowerCase().indexOf(search) < 0 && p.code.toLowerCase().indexOf(search) < 0 && p.client.toLowerCase().indexOf(search) < 0) continue;
    if (p.client !== lastClient) {
      h += '<div class="aps-client"><span style="color:' + p.clientColor + '">&#9679;</span> ' + p.clientCode + ' ' + p.client + '</div>';
      lastClient = p.client;
    }
    var isActive = allocProject === p.name;
    h += '<div class="aps-item' + (isActive ? ' active' : '') + '" onclick="allocProject=\'' + p.name.replace(/'/g, "\\'") + '\';renderAllocProjList();renderAllocGrid()">';
    h += '<span class="aps-code">' + p.code + '</span> ' + p.name;
    h += '</div>';
  }
  if (!h) h = '<div style="padding:14px;font-size:11px;color:var(--mid-gray)">No projects match.</div>';
  el.innerHTML = h;
}

function renderAllocGrid() {
  var el = document.getElementById('allocGridScroll');
  var lbl = document.getElementById('allocWeekLabel');
  if (!el) return;
  if (lbl) lbl.innerHTML = getAllocWeekLabel(allocWeekOf);

  if (!allocProject) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mid-gray);font-size:14px">Select a project from the sidebar</div>';
    return;
  }

  var team = (ALLOCATIONS.team || []).slice().sort(function(a, b) { return a.localeCompare(b); });
  var people = team;

  var days, cols;
  if (allocViewMode === 'day') {
    days = getWeekDays(allocWeekOf);
    cols = days.length;
  } else {
    /* Week view: show 4 weeks (current + 3 ahead) */
    days = [];
    for (var w = 0; w < 4; w++) {
      days.push(shiftWeek(allocWeekOf, w));
    }
    cols = days.length;
  }

  var gridCols = '150px ' + ('1fr ').repeat(cols) + '60px'; /* extra col for row total */
  var h = '<div class="alloc-grid" style="grid-template-columns:' + gridCols + '">';

  /* Header row */
  h += '<div class="ag-corner">People</div>';
  if (allocViewMode === 'day') {
    for (var c = 0; c < days.length; c++) {
      var isToday = days[c] === new Date().toISOString().slice(0, 10);
      h += '<div class="ag-col-hdr" style="' + (isToday ? 'background:rgba(48,109,124,.08)' : '') + '">';
      h += '<span class="ag-day">' + fmtDayShort(days[c]) + '</span> ' + fmtDayNum(days[c]);
      h += '</div>';
    }
  } else {
    for (var c = 0; c < days.length; c++) {
      var wn = getISOWeek(days[c]);
      var fri = new Date(days[c] + 'T00:00:00'); fri.setDate(fri.getDate() + 4);
      h += '<div class="ag-col-hdr">';
      h += '<span class="ag-day">Week ' + wn + '</span>';
      h += fmtMonShort(days[c]) + ' ' + fmtDayNum(days[c]) + '–' + fmtDayNum(fri.toISOString().slice(0, 10));
      h += '</div>';
    }
  }
  h += '<div class="ag-col-hdr" style="font-size:10px">Total</div>';

  /* People rows */
  for (var r = 0; r < people.length; r++) {
    var person = people[r];
    var pc = PC[person] || '#9B9590';
    var rowTotal = 0;

    /* Row header */
    if (allocViewMode === 'day') {
      rowTotal = getAllocWeekTotal(allocProject, person, allocWeekOf);
    } else {
      for (var c = 0; c < days.length; c++) rowTotal += getAllocWeekTotal(allocProject, person, days[c]);
    }

    h += '<div class="ag-row-hdr"><span class="ag-person-dot" style="background:' + pc + '"></span>' + person;
    if (rowTotal > 0) h += '<span class="ag-person-total">' + rowTotal.toFixed(1) + 'h</span>';
    h += '</div>';

    /* In day view, show capacity indicator under each cell */

    /* Cells */
    for (var c = 0; c < days.length; c++) {
      var cellKey, cellVal;
      if (allocViewMode === 'day') {
        cellKey = days[c];
        cellVal = getAllocHours(allocProject, person, cellKey);
      } else {
        cellKey = days[c]; /* Monday of that week */
        cellVal = getAllocWeekTotal(allocProject, person, cellKey);
      }

      var isEditing = allocEditingCell && allocEditingCell.person === person && allocEditingCell.date === cellKey;

      h += '<div class="ag-cell' + (cellVal > 0 ? ' ag-cell-filled' : '') + '"';

function renderCapacityPanel() {
  var el = document.getElementById('allocCapPanel');
  if (!el) return;
  var maxCap = ALLOCATIONS.weeklyCapacity || 40;
  var team = ALLOCATIONS.team || [];

  /* Build capacity data for current week */
  var people = [];
  for (var i = 0; i < team.length; i++) {
    var total = getPersonWeekTotal(team[i], allocWeekOf);
    /* Get project breakdown */
    var projMap = {};
    var days = getWeekDays(allocWeekOf);
    var allocs = ALLOCATIONS.allocations;
    for (var j = 0; j < allocs.length; j++) {
      if (allocs[j].person === team[i] && days.indexOf(allocs[j].date) >= 0) {
        if (!projMap[allocs[j].project]) projMap[allocs[j].project] = 0;
        projMap[allocs[j].project] += allocs[j].hoursPerDay;
      }
    }
    people.push({ name: team[i], total: total, projects: projMap });
  }
  people.sort(function(a, b) { return b.total - a.total; });

  var totalAllocated = 0;
  var activeCount = 0;
  for (var i = 0; i < people.length; i++) {
    totalAllocated += people[i].total;
    if (people[i].total > 0) activeCount++;
  }

  var h = '';
  h += '<h3>Team Capacity</h3>';
  h += '<div class="cap-sub">' + totalAllocated.toFixed(1) + ' hrs &bull; ' + activeCount + ' people allocated</div>';

  for (var i = 0; i < people.length; i++) {
    var p = people[i];
    var pct = maxCap > 0 ? (p.total / maxCap) * 100 : 0;
    var colorClass = p.total >= 40 ? 'cap-red' : p.total >= 32 ? 'cap-yellow' : 'cap-green';
    var pc = PC[p.name] || '#9B9590';

    h += '<div class="cap-person">';
    h += '<div class="cap-person-header">';
    h += '<div class="cap-person-name"><span class="cp-dot" style="background:' + pc + '"></span>' + p.name + '</div>';
    h += '<div class="cap-person-hrs ' + colorClass + '">' + p.total.toFixed(1) + ' / ' + maxCap + '</div>';
    h += '</div>';
    h += '<div class="cap-bar">';
    var projKeys = Object.keys(p.projects).sort(function(a, b) { return p.projects[b] - p.projects[a]; });
    var segColors = ['var(--ocean)', 'var(--honey)', 'var(--ember)', '#7A8B6F', '#9B8EC2', '#6B9DAD', '#B8948A', '#5B7FAF'];
    for (var j = 0; j < projKeys.length; j++) {
      var segPct = maxCap > 0 ? (p.projects[projKeys[j]] / maxCap) * 100 : 0;
      h += '<div class="cap-bar-seg" style="width:' + Math.min(segPct, 100) + '%;background:' + segColors[j % segColors.length] + '" title="' + projKeys[j] + ': ' + p.projects[projKeys[j]].toFixed(1) + 'h"></div>';
    }
    h += '</div>';
    if (projKeys.length > 0) {
      h += '<div class="cap-projects">';
      var parts = [];
      for (var j = 0; j < projKeys.length; j++) parts.push(projKeys[j] + ' ' + p.projects[projKeys[j]].toFixed(1) + 'h');
      h += parts.join(' &bull; ');
      h += '</div>';
    }
    h += '</div>';
  }

  el.innerHTML = h;
}

function navigate(view) {
  currentView = view;
  try { localStorage.setItem('furnace_view', view); } catch(e) {}
  if (view.indexOf('client:') === 0) {
    openClients[view.split(':')[1]] = true;
  } else if (view.indexOf('project:') === 0) {
    var pid = view.split(':')[1];
    for (var i = 0; i < CLIENTS.length; i++) {
      for (var j = 0; j < CLIENTS[i].projects.length; j++) {
        if (CLIENTS[i].projects[j].id === pid) openClients[CLIENTS[i].id] = true;
      }
    }
  }
  renderSidebar();
  if (view === 'master') renderMaster();
  else if (view === 'flagged') renderFlagged();
  else if (view === 'importTime') renderImportTime();
  else if (view === 'completed') renderCompleted();
  else if (view === 'resource') renderResource();
  else if (view === 'allocations') renderAllocations();
  else if (view === 'spark') renderSpark();
  else if (view === 'settings') renderSettings();
  else if (view.indexOf('client:') === 0) renderClient(view.split(':')[1]);
  else if (view.indexOf('project:') === 0) renderProject(view.split(':')[1]);
}

function buildProjectBudgetLookup() {
  PROJECT_BUDGETS = {};
  PROJECT_CODES = {};
  /* Build lookup from portfolio client/project data */
  var portfolioBudgets = {};
  var portfolioCodes = {};
  for (var i = 0; i < CLIENTS.length; i++) {
    var projs = CLIENTS[i].projects || [];
    for (var j = 0; j < projs.length; j++) {
      var p = projs[j];
      portfolioCodes[p.name] = p.code || '';
      if (p.hasBudgetData) {
        var spent = 0;
        var phases = p.phases || [];
        for (var k = 0; k < phases.length; k++) spent += phases[k].spent || 0;
        portfolioBudgets[p.name] = { budget: p.totalBudget || 0, spent: spent, remaining: (p.totalBudget || 0) - spent };
      }
    }
  }
  /* Map RT project names to budget entries (exact + alias) */
  var allRTNames = {};
  for (var w = 0; w < RT_WEEKS.length; w++) {
    var ppl = RT_WEEKS[w].people || {};
    for (var pn in ppl) {
      var pr = ppl[pn].projects || {};
      for (var pk in pr) allRTNames[pk] = true;
    }
  }
  for (var rtName in allRTNames) {
    if (portfolioBudgets[rtName]) {
      PROJECT_BUDGETS[rtName] = portfolioBudgets[rtName];
    } else if (RT_BUDGET_ALIASES[rtName] && portfolioBudgets[RT_BUDGET_ALIASES[rtName]]) {
      PROJECT_BUDGETS[rtName] = portfolioBudgets[RT_BUDGET_ALIASES[rtName]];
    }
    if (portfolioCodes[rtName]) {
      PROJECT_CODES[rtName] = portfolioCodes[rtName];
    } else if (RT_BUDGET_ALIASES[rtName] && portfolioCodes[RT_BUDGET_ALIASES[rtName]]) {
      PROJECT_CODES[rtName] = portfolioCodes[RT_BUDGET_ALIASES[rtName]];
    }
  }
}

      };
    }
  }
  var token;
  if (window.furnaceAPI && window.furnaceAPI.sparkGetToken) {
    token = await window.furnaceAPI.sparkGetToken();
  } else {
    token = await sparkBrowserGetToken();
  }
  if (!token || !sparkConfig) return [];

  var all = [], page = 0, pageSize = 1000;

      all = all.concat(batch);
      if (batch.length < pageSize) break;
      page++;
    } catch (err) { console.error('sparkFetchAll page error', err); break; }
  }
  return all;
}

/* ── SUPABASE DATA LOADER ── */
async function loadSupabaseData() {
  if (!sparkAuth.connected) return;
  try {
    /* 0. Fetch active team members for rate lookups */
    FURNACE_TEAM_MEMBERS = await sparkFetchAll('team_members', 'select=id,name,department,employment_type,fully_burdened_rate,billable_rate,is_active&is_active=eq.true&order=department.asc,name.asc') || [];

    /* 1. Fetch all visible budgets with project info */
    var budgets = await sparkFetchAll('budgets', 'select=id,name,status,client_price,total_amount,has_discount,discount_percentage,reserve_percentage,oop_markup_percentage,no_oop,project_id,projects(id,project_code,name)&visibility=eq.visible');
    if (!budgets || !budgets.length) { console.warn('No Supabase budgets found'); return; }

    /* 2. Fetch labor_budget_entries and oop_budget_entries for all budgets */
    var budgetIds = budgets.map(function(b) { return b.id; });
    var laborEntries = await sparkFetchAll('labor_budget_entries', 'select=id,budget_id,department,employment_type,phase1,phase2,phase3_1,phase3_2,phase4,phase5,rate_override,team_member_id,team_member:team_members(id,name,fully_burdened_rate)&budget_id=in.(' + budgetIds.join(',') + ')');
    var oopEntries = await sparkFetchAll('oop_budget_entries', 'select=id,budget_id,line_item_name,count,rate,days,head_count,adjusted_count,adjusted_rate,adjusted_days,adjusted_head_count,actual_amount,paid,paid_date,is_active&budget_id=in.(' + budgetIds.join(',') + ')');

    /* 3. Group entries by budget_id */
    var laborByBudget = {}, oopByBudget = {};
    for (var i = 0; i < (laborEntries || []).length; i++) {
      var le = laborEntries[i];
      if (!laborByBudget[le.budget_id]) laborByBudget[le.budget_id] = [];
      laborByBudget[le.budget_id].push(le);
    }
    for (var i = 0; i < (oopEntries || []).length; i++) {
      var oe = oopEntries[i];
      if (!oopByBudget[oe.budget_id]) oopByBudget[oe.budget_id] = [];
      oopByBudget[oe.budget_id].push(oe);
    }

    /* 4. Build SUPA_BUDGETS keyed by project_code */
    SUPA_BUDGETS = {};
    for (var i = 0; i < budgets.length; i++) {
      var b = budgets[i];
      var projCode = b.projects ? b.projects.project_code : null;
      if (!projCode) continue;

      b.labor = laborByBudget[b.id] || [];
      b.oop = oopByBudget[b.id] || [];

      /* Compute labor totals — flat $200/hr agency rate for everything */
      var laborHours = 0;
      for (var k = 0; k < b.labor.length; k++) {
        var le = b.labor[k];
        var hrs = (le.phase1 || 0) + (le.phase2 || 0) + (le.phase3_1 || 0) + (le.phase3_2 || 0) + (le.phase4 || 0) + (le.phase5 || 0);
        laborHours += hrs;
      }
      var laborCost = laborHours * 200;

      /* Compute internal labor cost using team member fully_burdened_rate */
      var laborInternalCost = 0;
      for (var k2 = 0; k2 < b.labor.length; k2++) {
        var le2 = b.labor[k2];
        var leHrs = (le2.phase1||0) + (le2.phase2||0) + (le2.phase3_1||0) + (le2.phase3_2||0) + (le2.phase4||0) + (le2.phase5||0);
        var tmRate = 200; /* default */
        if (le2.team_member_id) {
          for (var ti = 0; ti < FURNACE_TEAM_MEMBERS.length; ti++) {
            if (FURNACE_TEAM_MEMBERS[ti].id === le2.team_member_id) {
              tmRate = FURNACE_TEAM_MEMBERS[ti].fully_burdened_rate || 200;
              break;
            }
          }
        } else if (le2.team_member && le2.team_member.fully_burdened_rate) {
          tmRate = le2.team_member.fully_burdened_rate;
        }
        laborInternalCost += leHrs * tmRate;
      }

      /* Compute OOP totals: planned, effective (cascade), and spent (paid only) */
      var oopPlanned = 0, oopEffective = 0, oopSpent = 0;
      for (var k = 0; k < b.oop.length; k++) {
        var oe = b.oop[k];
        if (oe.is_active === false) continue;
        /* Planned: always from planned fields */
        oopPlanned += (oe.count || 0) * (oe.rate || 0) * (oe.days || 1) * (oe.head_count || 1);
        /* Effective: cascade Actual → Adjusted → Planned */
        var effVal;
        if (oe.actual_amount != null) {
          effVal = oe.actual_amount;
        } else if (oe.adjusted_count != null || oe.adjusted_rate != null) {
          effVal = (oe.adjusted_count != null ? oe.adjusted_count : (oe.count||0)) * (oe.adjusted_rate != null ? oe.adjusted_rate : (oe.rate||0)) * (oe.adjusted_days != null ? oe.adjusted_days : (oe.days||1)) * (oe.adjusted_head_count != null ? oe.adjusted_head_count : (oe.head_count||1));
        } else {
          effVal = (oe.count || 0) * (oe.rate || 0) * (oe.days || 1) * (oe.head_count || 1);
        }
        oopEffective += effVal;
        /* Spent: only if Paid is checked */
        if (oe.paid) oopSpent += effVal;
      }

      b.laborHours = laborHours;
      b.laborTotal = laborCost;
      b.laborCostInternal = laborInternalCost;
      b.oopTotal = oopPlanned;
      b.oopEffective = oopEffective;
      b.oopSpent = oopSpent;
      b._oopEntries = b.oop; /* store raw OOP entries for planner sidebar */

      SUPA_BUDGETS[projCode] = b;
    }

    /* 5. Fetch labor_actuals — only 2025+ for fast initial load */
    /* Older data and finished project data loaded on-demand when needed */
    SUPA_ACTUALS_ALL = await sparkFetchAll('labor_actuals', 'select=id,hours,work_date,person_name,project_code,phase_key,is_billable,is_bizdev,is_timeoff,board_name&source=eq.timetracker&work_date=gte.2025-01-01&order=work_date.desc');

    /* 6. Build SUPA_ACTUALS keyed by project_code */
    /* Code aliases: map 7pace board codes to Furnace project codes */
    var CODE_ALIASES = {
      '386_10': '386_10_XXX',     /* Synchrony Small Projects */
      '320_10': '320_10_XXX',     /* CareCredit Small Projects */
      '321_13_01': '321_13_01_A012', /* Provider Testimonials AuDacity */
      '378_06_03': '378_06_05',   /* NEGU Gala Video */
      '322_07_01': '322_07_02',   /* CES4 Social Media → Post */
      '100_02': '100_00_00',      /* Post Depo → Non-Billable */
      '100_00': '100_00_00',      /* Time OFF → Non-Billable */
      '100_07_05': '100_00_00',   /* Stryke → Non-Billable */
      '100_07_03': '100_00_00',   /* os-crnt → Non-Billable */
      '100_05': '100_00_00',      /* Dept Small Tasks → Non-Billable */
      '100_01': '100_00_00',      /* Leadership Meetings → Non-Billable */
      '100_07_09': '100_00_00',   /* YT Companion → Non-Billable */
    };

    SUPA_ACTUALS = {};
    for (var i = 0; i < SUPA_ACTUALS_ALL.length; i++) {
      var a = SUPA_ACTUALS_ALL[i];
      var code = a.project_code;
      if (!code) code = '100_00_00'; /* unknown/private → Non-Billable */
      if (CODE_ALIASES[code]) code = CODE_ALIASES[code];
      a.project_code = code; /* update in place so downstream uses resolved code */
      if (!code) continue;
      if (!SUPA_ACTUALS[code]) SUPA_ACTUALS[code] = { totalHours: 0, phases: {}, people: {}, byDate: {} };
      var sa = SUPA_ACTUALS[code];
      sa.totalHours += a.hours || 0;
      if (a.phase_key) {
        if (!sa.phases[a.phase_key]) sa.phases[a.phase_key] = 0;
        sa.phases[a.phase_key] += a.hours || 0;
      }
      if (a.person_name) {
        if (!sa.people[a.person_name]) sa.people[a.person_name] = 0;
        sa.people[a.person_name] += a.hours || 0;
      }
      if (a.work_date) {
        if (!sa.byDate[a.work_date]) sa.byDate[a.work_date] = 0;
        sa.byDate[a.work_date] += a.hours || 0;
      }
    }

    /* 7. Fetch allocations from Supabase */
    var supaAllocs = await sparkFetchAll('allocations', 'select=id,person,project,date,hours_per_day,week_of&order=date.asc');
    if (supaAllocs && supaAllocs.length > 0) {
      ALLOCATIONS.allocations = supaAllocs.map(function(a) {
        return { id: a.id, person: a.person, project: a.project, date: a.date, hoursPerDay: a.hours_per_day, weekOf: a.week_of };
      });
      /* Build team list from allocations */
      var teamSet = {};
      for (var i = 0; i < ALLOCATIONS.allocations.length; i++) {
        teamSet[ALLOCATIONS.allocations[i].person] = true;
      }
      ALLOCATIONS.team = Object.keys(teamSet).sort();
      /* Build forecastProjects from allocations, merged with any existing local forecastProjects */
      var projSet = {};
      var existingForecast = (ALLOCATIONS.forecastProjects || []);
      for (var i = 0; i < existingForecast.length; i++) {
        projSet[existingForecast[i]] = true;
      }
      for (var i = 0; i < ALLOCATIONS.allocations.length; i++) {
        projSet[ALLOCATIONS.allocations[i].project] = true;
      }
      ALLOCATIONS.forecastProjects = Object.keys(projSet).sort();
      console.log('Supabase allocations loaded:', ALLOCATIONS.allocations.length, 'entries,', ALLOCATIONS.team.length, 'team members,', ALLOCATIONS.forecastProjects.length, 'forecast projects');
    }

    SUPA_LOADED = true;
    console.log('Supabase data loaded:', Object.keys(SUPA_BUDGETS).length, 'budgets,', SUPA_ACTUALS_ALL.length, 'actuals');
  } catch (err) {
    console.error('Failed to load Supabase data:', err);
  }
}

/* ── ENRICH PROJECTS WITH SUPABASE DATA ── */
function enrichProjectsWithSupabase() {
  if (!SUPA_LOADED) return;
  for (var i = 0; i < CLIENTS.length; i++) {
    for (var j = 0; j < CLIENTS[i].projects.length; j++) {
      var p = CLIENTS[i].projects[j];
      var sb = SUPA_BUDGETS[p.code];
      if (sb) {
        p._supabudget = sb;
        p.dataSource = 'supabase';
        p.dollarBudget = sb.client_price || 0;
        p.laborCost = sb.laborTotal || 0;
        p.oopCost = sb.oopEffective || sb.oopTotal || 0;
        /* Compute profit from live labor + OOP data, not stale total_amount */
        var computedTotal = (sb.laborTotal || 0) + (sb.oopEffective || sb.oopTotal || 0);
        p.profit = (sb.client_price || 0) - computedTotal;
        p.profitMargin = sb.client_price > 0 ? ((p.profit / sb.client_price) * 100) : 0;
        p.totalBudget = sb.laborHours || 0;
      } else {
        p._supabudget = null;
        /* Non-billable and internal projects don't need a budget */
        var isNonBillable = p.projectType === 'internal' || p.projectType === 'bizdev' || p.code.indexOf('100_') === 0 || p.code.indexOf('101_') === 0 || p.code.indexOf('359_') === 0;
        if (isNonBillable) {
          p.dataSource = p.dataSource || 'snapshot'; /* keep existing, don't flag */
        } else {
          p.dataSource = 'needs_review';
        }
      }

      /* Check Supabase budget status — nonbillable/bizdev/complete don't need attention */
      if (p._supabudget) {
        var bStatus = p._supabudget.status;
        if (bStatus === 'nonbillable' || bStatus === 'bizdev') {
          p.dataSource = 'supabase';
          if (bStatus === 'nonbillable') p.projectType = 'internal';
          if (bStatus === 'bizdev') p.projectType = 'bizdev';
        }
        if (bStatus === 'complete') {
          p.status = 'complete';
          p.dataSource = 'supabase';
        }
      }
      var sa = SUPA_ACTUALS[p.code];
      if (sa) {
        p._supaactuals = sa;
      }
    }
  }
}

/* ── DATA LOADER ── */
async function loadData() {
  try {
    var resp = await fetch('data/portfolio.json');
    var data = await resp.json();
    CLIENTS = data.clients || [];
    FLAGGED_NO_STRUCTURE = data.flaggedNoStructure || [];
    FLAGGED_DATA_MISMATCH = data.flaggedDataMismatch || [];
    PC = data.personColors || {};
    RES = data.resourceAllocations || {};
    RT_WEEKS = data.resourceTrackerWeeks || [];
    RT_LEADERSHIP = data.leadershipFilter || [];
    METADATA = data.metadata || {};
    var lu = document.getElementById('lastUpdated');
    if (lu && data.lastUpdated) {
      lu.textContent = 'Updated ' + new Date(data.lastUpdated).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
    }
    buildProjectBudgetLookup();

    /* Load allocation data — Electron via IPC, Web via static file fetch */
    if (window.furnaceAPI) {
      try {
        var allocData = await window.furnaceAPI.readAllocations();
        if (allocData) ALLOCATIONS = allocData;
        var actualsData = await window.furnaceAPI.readActuals();
        if (actualsData) ACTUALS = actualsData;
        var oopData = await window.furnaceAPI.readOopSchedule();
        if (oopData) OOP_SCHEDULE = oopData;
      } catch(ae) {
        console.warn('Could not load native allocations:', ae);
      }
    } else {
      /* Web/Vercel: fetch static JSON files */
      try {
        var resp = await fetch('data/allocations.json');
        if (resp.ok) ALLOCATIONS = await resp.json();
      } catch(e) {}
      try {
        var resp2 = await fetch('data/oop-schedule.json');
        if (resp2.ok) OOP_SCHEDULE = await resp2.json();
      } catch(e) {}
    }

    /* Check Spark connection status */
    await sparkCheckStatus();

    /* Load Supabase data if connected */
    if (sparkAuth.connected) {
      await loadSupabaseData();
      enrichProjectsWithSupabase();
    }

    /* Rebuild resource weeks AFTER both allocations AND Supabase actuals are loaded */
    if (ALLOCATIONS.allocations.length > 0 || SUPA_LOADED) {
      computeResourceWeeks();
    }

    var savedView = null;
    try { savedView = localStorage.getItem('furnace_view'); } catch(e) {}
    navigate(savedView || 'master');
  } catch(e) {
    console.error('loadData error:', e);
    /* Try to continue with empty data — Supabase may still work */
    if (!CLIENTS || CLIENTS.length === 0) {
      CLIENTS = [];
      /* On web without portfolio.json, build minimal client list from Supabase */
      await sparkCheckStatus();
      if (sparkAuth.connected) {
        try {
          await loadSupabaseData();
          /* Build CLIENTS from SUPA_BUDGETS */
          var clientMap = {};
          for (var code in SUPA_BUDGETS) {
            var sb = SUPA_BUDGETS[code];
            var proj = sb.projects || {};
            var cl = proj.clients || {};
            var cn = (cl.client_number || code.split('_')[0] || '???');
            if (!clientMap[cn]) clientMap[cn] = { id: cn, code: cn, name: cl.name || cn, color: '#306D7C', projects: [] };
            clientMap[cn].projects.push({
              id: code, code: code, name: sb.name || code,
              clientId: cn, clientName: clientMap[cn].name, clientCode: cn,
              status: sb.status || 'active', projectType: 'billable',
              dollarBudget: sb.client_price || 0, laborCost: sb.laborTotal || 0,
              oopCost: sb.oopTotal || 0, profit: (sb.client_price || 0) - (sb.total_amount || 0),
              totalBudget: sb.laborHours || 0, phases: [], hasBudgetData: true,
              dataSource: 'supabase', _supabudget: sb
            });
          }
          CLIENTS = Object.values(clientMap);
          enrichProjectsWithSupabase();
          var sv2 = null;
          try { sv2 = localStorage.getItem('furnace_view'); } catch(e) {}
          navigate(sv2 || 'master');
          return;
        } catch(se) { console.error('Supabase fallback failed:', se); }
      }
      document.getElementById('mainContent').innerHTML = '<div style="padding:60px 40px;text-align:center"><h2 style="color:var(--ember)">Unable to load data</h2><p style="color:var(--mid-gray);margin-top:12px">' + e.message + '</p><p style="color:var(--mid-gray);margin-top:16px;font-size:12px">Go to <a href="#" onclick="navigate(\'settings\');return false" style="color:var(--ocean)">Settings</a> and connect to Furnace.</p></div>';
    }
  }
}

/* ── INIT ── */
loadData();
</script>
