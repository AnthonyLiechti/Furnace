      /* Date filter */
      if (_dateRange) {
        var _ad = new Date(_a.work_date + 'T12:00:00');
        if (_ad < _dateRange.start || _ad > _dateRange.end) continue;
      }
      var _code = _a.project_code || 'unknown';
      if (_aliases[_code]) _code = _aliases[_code];

      /* Fold non-billable */
      if (_code === '_NB' || _nbCodes[_code] || (_code.indexOf('100_') === 0)) {
        _nonBill.hours += _a.hours;
        _nonBill.entries++;
        continue;
      }

      /* Check if bizdev */
      var _isBD = _a.is_bizdev;
      if (!_isBD) {
        /* Check portfolio for bizdev type */
        for (var _ci = 0; _ci < CLIENTS.length; _ci++) {
          for (var _pi = 0; _pi < CLIENTS[_ci].projects.length; _pi++) {
            if (CLIENTS[_ci].projects[_pi].code === _code && CLIENTS[_ci].projects[_pi].projectType === 'bizdev') _isBD = true;
          }
        }
      }
      if (_isBD) {
        _bizDev.hours += _a.hours;
        _bizDev.entries++;
        continue;
      }

      if (!_projData[_code]) {
        /* Find name + client from portfolio */
        var _pName = _code, _cName = '', _pId = null, _budget = 0, _oopSpent = 0;
        for (var _ci = 0; _ci < CLIENTS.length; _ci++) {
          for (var _pi = 0; _pi < CLIENTS[_ci].projects.length; _pi++) {
            var _pp = CLIENTS[_ci].projects[_pi];
            if (_pp.code === _code) {
              _pName = _pp.name; _cName = CLIENTS[_ci].name; _pId = _pp.id;
              _budget = _pp.totalBudget || 0;
              if (_pp._supabudget) _oopSpent = _pp._supabudget.oopSpent || 0;
              break;
            }
          }
        }
        /* Also check board_name for display */
        if (_pName === _code && _a.board_name) {
          _pName = _a.board_name.replace(/^\d+[\d_A-Za-z]*\s*-\s*/, '');
        }
        _projData[_code] = {name: _pName, client: _cName, hours: 0, billHrs: 0, oopSpent: _oopSpent, budget: _budget, projId: _pId, entries: 0, revenue: 0};
      }
      _projData[_code].hours += _a.hours;
      if (_a.is_billable) _projData[_code].billHrs += _a.hours;
      _projData[_code].entries++;
      _projData[_code].revenue = _projData[_code].billHrs * 200;
    }
  }

  /* Sort by hours descending */
  var _projList = Object.keys(_projData).map(function(c) { return Object.assign({code: c}, _projData[c]); });
  _projList.sort(function(a, b) { return b.hours - a.hours; });

  h += '<table class="phase-table"><thead><tr>';
  h += '<th onclick="masterSortProjects(\'name\')" style="cursor:pointer">Project &#x25BE;</th>';
  h += '<th onclick="masterSortProjects(\'client\')" style="cursor:pointer">Client &#x25BE;</th>';
  h += '<th onclick="masterSortProjects(\'category\')" style="cursor:pointer">Category &#x25BE;</th>';
  h += '<th onclick="masterSortProjects(\'hours\')" style="cursor:pointer" class="num">Hours Spent &#x25BE;</th>';
  h += '<th class="num">Revenue @$200</th>';
  h += '<th class="num">Employees</th>';
  h += '<th class="num">Entries</th>';
  h += '</tr></thead><tbody>';

  /* Non-Billable summary row */
  if (_nonBill.hours > 0) {
    h += '<tr style="background:rgba(0,0,0,.02)">';
    h += '<td><div style="font-weight:600;color:var(--mid-gray)">Non-Billable</div><div style="font-size:11px;color:var(--mid-gray)">Internal, meetings, time off, tools</div></td>';
    h += '<td style="color:var(--mid-gray)">Forge</td>';
    h += '<td><span class="badge" style="background:var(--mid-gray);color:white;font-size:9px;padding:2px 8px;border-radius:4px">Non-Billable</span></td>';
    h += '<td class="num" style="font-weight:600">' + _nonBill.hours.toFixed(1) + '</td>';
    h += '<td class="num" style="color:var(--mid-gray)">—</td>';
    h += '<td class="num">—</td>';
    h += '<td class="num">' + _nonBill.entries + '</td>';
    h += '</tr>';
  }

  /* Biz Dev summary row */
  if (_bizDev.hours > 0) {
    h += '<tr style="background:rgba(255,183,77,.04)">';
    h += '<td><div style="font-weight:600;color:#F57F17">Business Development</div><div style="font-size:11px;color:var(--mid-gray)">New business, pitches, proposals</div></td>';
    h += '<td style="color:var(--mid-gray)">Various</td>';
    h += '<td><span class="badge" style="background:#F57F17;color:white;font-size:9px;padding:2px 8px;border-radius:4px">Biz Dev</span></td>';
    h += '<td class="num" style="font-weight:600;color:#F57F17">' + _bizDev.hours.toFixed(1) + '</td>';
    h += '<td class="num" style="color:var(--mid-gray)">—</td>';
    h += '<td class="num">—</td>';
    h += '<td class="num">' + _bizDev.entries + '</td>';
    h += '</tr>';
  }

  /* Individual billable projects */
  for (var pi = 0; pi < _projList.length; pi++) {
    var _p = _projList[pi];
    var _isOver = _p.budget > 0 && _p.hours > _p.budget;
    var _prog = _p.budget > 0 ? Math.min(100, Math.round(_p.hours / _p.budget * 100)) : 0;

    h += '<tr' + (_p.projId ? ' onclick="navigate(\'project:' + _p.projId + '\')" style="cursor:pointer"' : '') + '>';
    h += '<td><div style="font-weight:600">' + _p.name + '</div><div style="font-size:11px;color:var(--mid-gray)">' + _p.code + '</div></td>';
    h += '<td style="font-size:12px">' + (_p.client || '—') + '</td>';
    h += '<td><span class="badge badge-billable" style="font-size:9px;padding:2px 8px">Billable</span></td>';
    h += '<td class="num" style="font-weight:600;' + (_isOver ? 'color:#C62828' : '') + '">' + _p.hours.toFixed(1) + '</td>';
    h += '<td class="num" style="font-weight:600;color:var(--ocean)">$' + Math.round(_p.revenue).toLocaleString() + '</td>';
    h += '<td class="num">' + _p.entries + '</td>';
    h += '<td class="num">' + _p.entries + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table>';

  /* ── UPCOMING RESOURCE ALLOCATION (this week + next week) ── */
  var todayStr = new Date().toISOString().slice(0,10);
  var curWeekSun = getWeekMon(todayStr);
  var curWeekSat = getSaturday(curWeekSun);
  var curWeekNum = getISOWeek(curWeekSun);
  var nwDate = new Date(curWeekSun + 'T00:00:00');
  nwDate.setDate(nwDate.getDate() + 7);
  var nextWeekSun = nwDate.toISOString().slice(0,10);
  var nextWeekSat = getSaturday(nextWeekSun);
  var nextWeekNum = getISOWeek(nextWeekSun);

  /* Show two weeks: current and next */
  var weekPairs = [
    { sun: curWeekSun, sat: curWeekSat, num: curWeekNum, label: 'This Week' },
    { sun: nextWeekSun, sat: nextWeekSat, num: nextWeekNum, label: 'Next Week' }
  ];

  for (var wpi = 0; wpi < weekPairs.length; wpi++) {
    var wp = weekPairs[wpi];
    h += '<div class="section-title" style="margin-top:' + (wpi === 0 ? '28' : '20') + 'px">' + wp.label + ' — Week ' + wp.num + ' <span style="font-size:11px;font-weight:400;color:var(--mid-gray)">(' + fmtDateShort(wp.sun) + ' – ' + fmtDateShort(wp.sat) + ')</span></div>';

    var anyAlloc = false;
    for (var i = 0; i < visibleList.length; i++) {
      var p = visibleList[i];
      if (isProjectCompleted(p)) continue;
      var weeks = buildWeeks(p.id);
      var wk = null;
      for (var wi = 0; wi < weeks.length; wi++) {
        if (weeks[wi].sunday === wp.sun) { wk = weeks[wi]; break; }
      }
      if (!wk) continue;
      anyAlloc = true;

      var ppl = [];
      for (var pk in wk.people) ppl.push([pk, wk.people[pk]]);
      ppl.sort(function(a,b){ return b[1] - a[1]; });

      h += '<div style="margin-bottom:16px;padding:14px 16px;background:var(--cloud);border-radius:10px;border-left:3px solid ' + c.color + '">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h += '<div><span style="font-weight:700;font-size:13px;color:var(--abyss)">' + p.name + '</span> <span style="font-size:11px;color:var(--mid-gray)">' + p.code + '</span></div>';
      h += '<div style="font-weight:700;font-size:14px;color:var(--ocean)">' + wk.total.toFixed(1) + ' hrs</div>';
      h += '</div>';

      h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      for (var si = 0; si < ppl.length; si++) {
        if (ppl[si][0] === 'Unknown') continue;
        var fn = ppl[si][0].split(' ')[0];
        h += '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(255,255,255,.7);border-radius:12px;font-size:11px;color:var(--abyss)"><span style="width:6px;height:6px;border-radius:50%;background:' + (PC[ppl[si][0]] || '#9B9590') + '"></span>' + fn + ' ' + ppl[si][1].toFixed(1) + 'h</span>';
      }
      h += '</div></div>';
    }

    if (!anyAlloc) {
      h += '<div style="font-size:13px;color:var(--mid-gray);padding:16px;background:var(--cloud);border-radius:8px">No allocations for ' + wp.label.toLowerCase() + ' <span style="font-weight:600">(' + fmtDateShort(wp.sun) + ' – ' + fmtDateShort(wp.sat) + ')</span></div>';
    }
  }

  /* Hour Type Breakdown for this client */
  var clientHt = computeHourTypes(visibleList);
  if (clientHt.bizdev.count > 0 || clientHt.ops.count > 0) {
    h += renderHourTypeSection(clientHt, c.id);
  }

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: PROJECT ── */
function renderProject(projectId) {
  var p = projectById(projectId);
  if (!p) return;
  /* Lazy-load actuals for this project if not already in cache */
  ensureProjectActuals(p.code);
  var cascaded = computeCascade(p);
  var spent = filteredProjectSpent(p);
  var prog = pct(spent, p.totalBudget);
  var rate = getRate(p.clientId);

  var h = '<p class="page-subtitle" style="margin-bottom:2px;font-family:monospace;font-size:12px;letter-spacing:.5px;color:var(--mid-gray)">' + p.code + '</p>';
  h += '<h1 class="page-title">' + p.name + '</h1>';
  h += '<p class="page-subtitle">' + p.clientCode + ' ' + p.clientName + ' &middot; Rate: ' + (rate > 0 ? '$' + rate + '/hr' : 'Not set') + '</p>';

  if (!p.hasBudgetData && p.dataSource !== 'snapshot' && p.dataSource !== 'supabase') {
    h += '<div class="flagged-card" style="margin-bottom:16px"><div class="flag-title">&#9888; No Budget Data</div><div class="flag-reason">This project has no planned effort or snapshot. Time tracked against it will still appear below.</div></div>';
  }
  if (p.dataSource === 'needs_review') {
    h += '<div style="background:#FFF8E1;border-left:4px solid var(--honey);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#F57F17;font-weight:600">&#9888; Needs Review &mdash; No Supabase budget found for this project</div>';
  }

  /* ── SUPABASE SUMMARY CARD (always visible at top) ── */
  if (p._supabudget) {
    var sb = p._supabudget;
    var saHrs = SUPA_ACTUALS[p.code] ? SUPA_ACTUALS[p.code].totalHours : 0;

    /* Hours Predicted from Furnace allocations (Manage Resources) */
    var allocHrs = 0;
    var nativeAllocs = getAllocationsForProject(p.id);
    for (var ai = 0; ai < nativeAllocs.length; ai++) {
      allocHrs += nativeAllocs[ai].hoursPerDay || 0;
    }

    var hrsRemaining = (sb.laborHours || 0) - saHrs;

    /* Apply discount to client price */
    var rawPrice = sb.client_price || 0;
    var hasDisc = sb.has_discount || false;
    var discAmt = hasDisc ? rawPrice * 0.035 : 0;
    var tcvPrice = rawPrice - discAmt;
    var computedCosts = (sb.laborTotal || 0) + (sb.oopEffective || sb.oopTotal || 0);
    var profitVal = tcvPrice - computedCosts;
    var profitPctVal = tcvPrice > 0 ? ((profitVal / tcvPrice) * 100).toFixed(1) : 0;

    /* OOP metrics */
    var oopBudget = sb.oopEffective || sb.oopTotal || 0;
    var oopSpent = sb.oopSpent || 0;
    var oopPredicted = oopGetPredictedForProject(p.code);
    var oopRemaining = oopBudget - oopSpent;

    /* Convert to dollars for the progress bar — flat $200/hr */
    var agencyRate = 200;
    var laborSpent$ = saHrs * agencyRate;
    var laborRemaining$ = Math.max(0, hrsRemaining) * agencyRate;
    var barTotal = tcvPrice > 0 ? tcvPrice : 1;
    var profitBar$ = Math.max(0, tcvPrice - laborSpent$ - laborRemaining$ - oopSpent - Math.max(0, oopRemaining));

    /* Margin % = (TCV - Internal Labor Cost - OOP Effective) / TCV */
    var internalLaborCost = sb.laborCostInternal || sb.laborTotal || 0;
    var oopInternal = sb.oopEffective || sb.oopTotal || 0;
    var marginPctVal = tcvPrice > 0 ? ((tcvPrice - internalLaborCost - oopInternal) / tcvPrice * 100).toFixed(1) : 0;
    var marginColor = parseFloat(marginPctVal) > 30 ? '#81C784' : parseFloat(marginPctVal) >= 15 ? 'var(--honey)' : '#C62828';

    /* Effective Rate = TCV / Actual Hours Spent */
    var effRate = saHrs > 0 ? (tcvPrice / saHrs) : 0;
    var effRateDisplay = saHrs > 0 ? '$' + Math.round(effRate).toLocaleString() + '/hr' : '\u2014';
    var effRateColor = effRate >= 200 ? '#81C784' : effRate > 0 ? 'var(--ember)' : 'var(--white)';

    h += '<div class="snapshot-banner" style="margin-bottom:16px">';
    h += '<div class="snap-header"><div class="snap-title">Project Financials</div><div class="snap-version">Live from Furnace &#128293;</div></div>';
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Client Price</div><div class="sf-value sf-gold">$' + Math.round(tcvPrice).toLocaleString() + '</div>';
    if (hasDisc) h += '<div class="sf-sub">Before discount: $' + Math.round(rawPrice).toLocaleString() + '</div>';
    h += '</div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Cost</div><div class="sf-value">$' + Math.round(sb.laborTotal || 0).toLocaleString() + '</div><div class="sf-sub">' + (sb.laborHours || 0).toFixed(0) + ' hrs @ $200/hr</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">OOP Cost</div><div class="sf-value">$' + Math.round(sb.oopTotal || 0).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Reserve</div><div class="sf-value ' + (profitVal >= 0 ? 'sf-green' : '') + '">$' + Math.round(profitVal).toLocaleString() + '</div><div class="sf-sub">' + profitPctVal + '%</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Margin</div><div class="sf-value" style="color:' + marginColor + '">' + marginPctVal + '%</div><div class="sf-sub">Internal cost: $' + Math.round(internalLaborCost).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Eff. Rate</div><div class="sf-value" style="color:' + effRateColor + '">' + effRateDisplay + '</div>' + (saHrs > 0 ? '<div class="sf-sub">vs $200 target</div>' : '<div class="sf-sub">No hours tracked</div>') + '</div>';
    h += '</div>';

    /* ── Progress Bar ── */
    var pLaborSpent = Math.min(100, laborSpent$ / barTotal * 100);
    var pLaborRem = Math.min(100 - pLaborSpent, laborRemaining$ / barTotal * 100);
    var pOopSpent = Math.min(100 - pLaborSpent - pLaborRem, oopSpent / barTotal * 100);
    var pOopRem = Math.min(100 - pLaborSpent - pLaborRem - pOopSpent, Math.max(0, oopRemaining) / barTotal * 100);
    var pProfit = Math.max(0, 100 - pLaborSpent - pLaborRem - pOopSpent - pOopRem);
    h += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="lob-bar">';
    if (pLaborSpent > 0) h += '<div class="lob-seg" style="width:' + pLaborSpent.toFixed(1) + '%;background:var(--ember)">' + (pLaborSpent >= 8 ? '$' + Math.round(laborSpent$).toLocaleString() : '') + '</div>';
    if (pLaborRem > 0.5) h += '<div class="lob-seg" style="width:' + pLaborRem.toFixed(1) + '%;background:var(--ocean)">' + (pLaborRem >= 8 ? '$' + Math.round(laborRemaining$).toLocaleString() : '') + '</div>';
    if (pOopSpent > 0) h += '<div class="lob-seg" style="width:' + pOopSpent.toFixed(1) + '%;background:#F57F17">' + (pOopSpent >= 8 ? '$' + Math.round(oopSpent).toLocaleString() : '') + '</div>';
    if (pOopRem > 0.5) h += '<div class="lob-seg" style="width:' + pOopRem.toFixed(1) + '%;background:#FFE0B2;color:var(--abyss)">' + (pOopRem >= 8 ? '$' + Math.round(Math.max(0, oopRemaining)).toLocaleString() : '') + '</div>';
    if (pProfit > 0.5) h += '<div class="lob-seg" style="width:' + pProfit.toFixed(1) + '%;background:#81C784">' + (pProfit >= 8 ? '$' + Math.round(profitBar$).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#F57F17"></div>OOP Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#FFE0B2"></div>OOP Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Reserve</div>';
    h += '</div></div>';

    /* ── Hours Row ── */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Budget</div><div class="sf-value">' + (sb.laborHours || 0).toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + saHrs.toFixed(1) + '</div><div class="sf-sub">' + pct(saHrs, sb.laborHours || 0) + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Predicted</div><div class="sf-value">' + allocHrs.toFixed(1) + '</div><div class="sf-sub">From allocations</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value" style="color:' + (hrsRemaining < 0 ? 'var(--ember)' : 'var(--white)') + '">' + hrsRemaining.toFixed(1) + '</div></div>';
    h += '</div>';

    /* ── OOP Row ── */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">OOP Budget</div><div class="sf-value">$' + Math.round(oopBudget).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">OOP Spent</div><div class="sf-value" style="color:#F57F17">$' + Math.round(oopSpent).toLocaleString() + '</div><div class="sf-sub">' + pct(oopSpent, oopBudget) + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">OOP Predicted</div><div class="sf-value">' + (oopPredicted > 0 ? '$' + Math.round(oopPredicted).toLocaleString() : '\u2014') + '</div><div class="sf-sub">From OOP planner</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">OOP Remaining</div><div class="sf-value" style="color:' + (oopRemaining < 0 ? 'var(--ember)' : 'var(--white)') + '">$' + Math.round(oopRemaining).toLocaleString() + '</div></div>';
    h += '</div></div>';
  }

  var isBizDev = p.projectType === 'bizdev';
  var isSmallProj = p.projectType === 'small_projects';

  /* Project Overview (always visible) — rendered by Spark async */
  if (sparkAuth.connected) {
    h += '<div id="sparkProjectOverview"></div>';
  }

  /* Budget Snapshot toggle — COLLAPSED by default, click to expand */
  if (p._supabudget || (sparkAuth.connected && p.dataSource !== 'no_snapshot')) {
    h += '<button id="snapshotToggleBtn" onclick="toggleSnapshotSection()" style="background:none;border:1px solid var(--canvas);border-radius:6px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mid-gray);margin-bottom:16px;display:flex;align-items:center;gap:8px;width:100%;justify-content:flex-start">&#128202; Budget Snapshot <span class="arrow" id="snapshotArrow">&#9656;</span></button>';
    h += '<div id="snapshotSection" style="display:none">';
    /* Spark budget editor will render inside here */
    if (sparkAuth.connected) {
      h += '<div id="sparkProjectBudget"><div style="padding:20px;color:var(--mid-gray)">Loading budget data...</div></div>';
    }
  } else {
    h += '<div id="snapshotSection">';
  }

  if (isSmallProj && p.subSnapshots && p.subSnapshots.length > 0) {
    /* ── SMALL PROJECTS: Aggregated header + individual sub-snapshots ── */
    var subs = p.subSnapshots;
    var aggBudget = 0, aggLabor = 0, aggOop = 0, aggProfit = 0, aggHrsBudget = 0, aggHrsSpent = 0;
    for (var si = 0; si < subs.length; si++) {
      aggBudget += subs[si].dollarBudget || 0;
      aggLabor += subs[si].laborCost || 0;
      aggOop += subs[si].oopCost || 0;
      aggProfit += subs[si].profit || 0;
      aggHrsBudget += subs[si].totalBudget || 0;
      aggHrsSpent += subs[si].timesheetHours || 0;
    }
    var aggMargin = aggBudget > 0 ? ((aggProfit / aggBudget) * 100).toFixed(1) : 0;
    var unallocHrs = Math.max(0, spent - aggHrsSpent);

    /* Aggregated top-level financials */
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Portfolio Financials (Aggregated)</div><div class="snap-version">' + subs.length + ' Sub-Project' + (subs.length !== 1 ? 's' : '') + '</div></div>';
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Client Budget</div><div class="sf-value sf-gold">$' + aggBudget.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total FMG Labor</div><div class="sf-value">$' + aggLabor.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total OOP</div><div class="sf-value">$' + aggOop.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Reserve</div><div class="sf-value ' + (aggProfit >= 0 ? 'sf-green' : '') + '">$' + aggProfit.toLocaleString() + '</div><div class="sf-sub">' + aggMargin + '%</div></div>';
    h += '</div>';
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Budgeted</div><div class="sf-value">' + aggHrsBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Tracked (Timesheet)</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Allocated to Sub-Projects</div><div class="sf-value">' + aggHrsSpent.toFixed(1) + '</div></div>';
    if (unallocHrs > 0) {
      h += '<div class="snap-fin-item"><div class="sf-label">Unallocated Hours</div><div class="sf-value" style="color:var(--sand)">' + unallocHrs.toFixed(1) + '</div></div>';
    }
    h += '</div></div>';

    /* Individual sub-snapshot cards */
    h += '<div class="section-title" style="margin-top:24px">Sub-Project Breakdown</div>';
    for (var si = 0; si < subs.length; si++) {
      var ss = subs[si];
      var ssMargin = ss.dollarBudget > 0 ? ((ss.profit / ss.dollarBudget) * 100).toFixed(1) : 0;
      var ssHrsSpent = ss.timesheetHours || 0;
      var ssHrsBudget = ss.totalBudget || 0;
      var ssHrsProg = ssHrsBudget > 0 ? Math.round((ssHrsSpent / ssHrsBudget) * 100) : 0;
      h += '<div class="snapshot-banner" style="margin-bottom:12px;padding:16px 20px">';
      h += '<div class="snap-header"><div class="snap-title" style="font-size:14px">' + (ss.code ? ss.code + ' — ' : '') + ss.name + '</div></div>';
      h += '<div class="snap-financials" style="margin-top:10px">';
      h += '<div class="snap-fin-item"><div class="sf-label">Budget</div><div class="sf-value sf-gold" style="font-size:18px">$' + (ss.dollarBudget || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value" style="font-size:18px">$' + (ss.laborCost || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">OOP</div><div class="sf-value" style="font-size:18px">$' + (ss.oopCost || 0).toLocaleString() + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Reserve</div><div class="sf-value ' + ((ss.profit || 0) >= 0 ? 'sf-green' : '') + '" style="font-size:18px">$' + (ss.profit || 0).toLocaleString() + '</div><div class="sf-sub">' + ssMargin + '%</div></div>';
      h += '</div>';
      h += '<div class="snap-financials" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)">';
      h += '<div class="snap-fin-item"><div class="sf-label">Hrs Budgeted</div><div class="sf-value" style="font-size:16px">' + ssHrsBudget.toFixed(1) + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Hrs Spent</div><div class="sf-value" style="font-size:16px;color:var(--ember)">' + ssHrsSpent.toFixed(1) + '</div><div class="sf-sub">' + ssHrsProg + '% of budget</div></div>';
      h += '</div></div>';
    }

    /* Unallocated bucket if applicable */
    if (unallocHrs > 0) {
      h += '<div class="snapshot-banner" style="margin-bottom:12px;padding:16px 20px;border-left:3px solid var(--sand)">';
      h += '<div class="snap-header"><div class="snap-title" style="font-size:14px">Unallocated Hours</div><div class="snap-version">No snapshot linked</div></div>';
      h += '<div class="snap-financials" style="margin-top:10px">';
      h += '<div class="snap-fin-item"><div class="sf-label">Hours Tracked</div><div class="sf-value" style="font-size:18px;color:var(--sand)">' + unallocHrs.toFixed(1) + '</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Budget</div><div class="sf-value" style="font-size:18px">—</div></div>';
      h += '<div class="snap-fin-item"><div class="sf-label">Reserve</div><div class="sf-value" style="font-size:18px">—</div></div>';
      h += '</div></div>';
    }

  } else if (p.dataSource === 'snapshot' && isBizDev) {
    /* ── BIZ DEV HEADER — $200/hr labor tracking, no budget ── */
    var bdLabor = spent * 200;
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Business Development</div><div class="snap-version">Labor @ $200/hr</div></div>';
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Hours</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Investment</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(bdLabor).toLocaleString() + '</div><div class="sf-sub">@ $200/hr</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Team Members</div><div class="sf-value">' + (p.people ? p.people.length : 0) + '</div></div>';
    h += '</div>';
    h += '</div>';

  } else if (p.dataSource === 'snapshot') {
    /* ── SNAPSHOT-BASED HEADER ── */
    var db = p.dollarBudget || 0;
    var lm = p.laborCost || 0;
    var lc = lm * 0.833;
    var oop = p.oopCost || 0;
    var tp = p.totalPrice || 0;
    var proft = p.profit || 0;
    var pm = p.profitMargin || 0;
    var costPerHr = p.totalBudget > 0 ? lc / p.totalBudget : 0;
    var spentDollar = spent * costPerHr;
    var remainingHrs = Math.max(0, p.totalBudget - spent);
    var estRemainDollar = remainingHrs * costPerHr;
    var profitDollar = db - tp;

    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Project Financials</div><div class="snap-version">From Snapshot</div></div>';

    /* Row 1: Dollar financials */
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Client Budget</div><div class="sf-value sf-gold">$' + db.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value">$' + lm.toLocaleString() + '</div><div class="sf-sub">Cost: $' + Math.round(lc).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Out-of-Pocket</div><div class="sf-value">$' + oop.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Est. Reserve</div><div class="sf-value ' + (proft >= 0 ? 'sf-green' : '') + '">$' + proft.toLocaleString() + '</div><div class="sf-sub">' + pm + '%</div></div>';
    h += '</div>';

    /* Row 2: Hours tracking */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor Hours Budget</div><div class="sf-value">' + p.totalBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + spent.toFixed(1) + '</div><div class="sf-sub">' + prog + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value">' + remainingHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Spent</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(spentDollar).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Remaining</div><div class="sf-value">$' + Math.round(estRemainDollar).toLocaleString() + '</div></div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + Math.max(0, profitDollar) + oop;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((oop / barTotal) * 100);
    var profPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 10 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 10 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 10 ? '$' + oop.toLocaleString() : '') + '</div>';
    if (profPct > 0) h += '<div class="lob-seg" style="width:' + profPct + '%;background:#81C784">' + (profPct >= 10 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent $' + Math.round(spentDollar).toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining $' + Math.round(estRemainDollar).toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP $' + oop.toLocaleString() + '</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Reserve $' + Math.round(profitDollar).toLocaleString() + '</div>';
    h += '</div></div>';
    h += '</div>';
  } else {
    /* ── FALLBACK: Standard stats for projects without snapshots ── */
    h += '<div class="stats-row">';
    h += '<div class="stat-card"><div class="label">Total Budget</div><div class="value">' + fmt(p.totalBudget, p.clientId) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Spent</div><div class="value">' + fmt(spent, p.clientId) + '</div><div class="sub">' + prog + '%</div></div>';
    h += '<div class="stat-card"><div class="label">Remaining</div><div class="value">' + fmt(p.totalBudget - spent, p.clientId) + '</div></div>';
    if (rate > 0) {
      h += '<div class="stat-card"><div class="label">Revenue (Spent)</div><div class="value">$' + Math.round(spent * rate).toLocaleString() + '</div></div>';
    }
    h += '</div>';
  }
  h += '</div>'; /* close #snapshotSection */

  if (isBizDev) {
    /* ── BIZ DEV: Per-Person Hours Breakdown ── */
    var bdPeople = p.people || [];
    if (bdPeople.length > 0) {
      var maxPersonHrs = 0;
      for (var i = 0; i < bdPeople.length; i++) { if (bdPeople[i].spent > maxPersonHrs) maxPersonHrs = bdPeople[i].spent; }
      if (maxPersonHrs === 0) maxPersonHrs = 1;
      h += '<div class="section-title" style="margin-top:24px">Team Investment</div>';
      h += '<table class="phase-table"><thead><tr>';
      h += '<th>Team Member</th><th style="text-align:right">Hours</th><th style="text-align:right">Labor Cost</th><th style="text-align:right">% of Total</th><th>Distribution</th>';
      h += '</tr></thead><tbody>';
      for (var i = 0; i < bdPeople.length; i++) {
        var bp = bdPeople[i];
        var bpCost = bp.spent * 200;
        var bpPct = spent > 0 ? Math.round(bp.spent / spent * 100) : 0;
        var barW = Math.round(bp.spent / maxPersonHrs * 100);
        var pc = PC[bp.name] || 'var(--ocean)';
        h += '<tr>';
        h += '<td style="font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + pc + ';margin-right:8px"></span>' + bp.name + '</td>';
        h += '<td style="text-align:right">' + bp.spent.toFixed(1) + '</td>';
        h += '<td style="text-align:right">$' + Math.round(bpCost).toLocaleString() + '</td>';
        h += '<td style="text-align:right;color:var(--mid-gray)">' + bpPct + '%</td>';
        h += '<td><div class="progress-bar-wrap" style="height:8px;width:140px;display:inline-block;vertical-align:middle"><div class="progress-bar-fill" style="width:' + barW + '%;background:' + pc + '"></div></div></td>';
        h += '</tr>';
      }
      h += '</tbody></table>';
    }
  } else {
    /* ── STANDARD: Progress bar + Phase table ── */
    h += '<div class="progress-bar-wrap" style="height:14px;margin-bottom:20px"><div class="progress-bar-fill" style="width:' + prog + '%;background:' + barColor(prog) + '"></div></div>';

    /* Phase table */
    h += '<table class="phase-table"><thead><tr>';
    h += '<th>Phase</th><th>Status</th><th>Planned</th><th>Adjusted</th><th>Spent</th><th>Variance</th><th>Progress</th>';
    h += '</tr></thead><tbody>';
    for (var i = 0; i < cascaded.length; i++) {
      var ph = cascaded[i];
      if (ph.status === 'na') continue;
      var base = ph.adjusted > 0 ? ph.adjusted : ph.planned;
      var phPct = pct(ph.spent, base);
      var isOver = ph.spent > ph.adjusted && ph.adjusted > 0;
      h += '<tr>';
      h += '<td style="font-weight:600">' + ph.name + '</td>';
      h += '<td>' + badgeHTML(ph.status) + '</td>';
      h += '<td>' + fmt(ph.planned, p.clientId) + '</td>';
      h += '<td>' + fmt(ph.adjusted, p.clientId) + '</td>';
      h += '<td>' + (isOver ? '<span class="badge badge-over">' : '') + fmt(ph.spent, p.clientId) + (isOver ? '</span>' : '') + '</td>';
      h += '<td style="color:' + (ph.variance >= 0 ? '#2E7D32' : '#C62828') + '">' + (ph.variance >= 0 ? '+' : '') + fmt(ph.variance, p.clientId) + '</td>';
      h += '<td><div class="progress-bar-wrap" style="height:8px;width:120px;display:inline-block;vertical-align:middle"><div class="progress-bar-fill" style="width:' + Math.min(phPct, 100) + '%;background:' + (isOver ? '#C62828' : barColor(phPct)) + '"></div></div> <span style="font-size:11px;color:var(--mid-gray)">' + phPct + '%</span></td>';
      h += '</tr>';
    }
    h += '</tbody></table>';

    /* Cascade explanation */
    var activePhase = null;
    for (var i = 0; i < cascaded.length; i++) { if (cascaded[i].status === 'active') { activePhase = cascaded[i]; break; } }
    if (activePhase && activePhase.cascadeNote) {
      h += '<div class="cascade-detail"><strong>Cascade Budget:</strong> ' + activePhase.cascadeNote + '. Completed phases lock at actual spend; net variance flows to the active phase.</div>';
    }
  }

  /* Per-Person Phase Breakdown (from detailed Snapshot data, if available) */
  var _sn = p.snapshot || null;
  if (_sn && _sn.phases) {
    var deptColors = {'Executive/Admin':'var(--ember)','Account':'var(--ocean)','Creative':'var(--sand)','Post':'var(--honey)'};
    var deptOrder = ['Executive/Admin','Account','Creative','Post'];
    var snPhases = _sn.phases;
    var phaseKeys = Object.keys(snPhases);

    /* Map snapshot phase keys to portfolio phase spent via phase number prefix */
    var snapshotPhasePrefix = {
      'Phase 1 - Initiation':'P1','Phase 2 - Ideation':'P2','Phase 2 - Research and strategy':'P2',
      'Phase 3.1 - Execution (Pre Pro)':'P3.1','Phase 3.1 Web Design - (user experience development)':'P3.1',
      'Phase 3.2 - Execution (Production)':'P3.2','Phase 3.2 -  (User Interface & Content development)':'P3.2',
      'Phase 4 - Compilation (Post)':'P4','Phase 4 - Development (QC testing & launch)':'P4',
      'Phase 5 - Resolution':'P5'
    };
    /* Build map from prefix to portfolio phase spent */
    var prefixSpentMap = {};
    for (var pi2 = 0; pi2 < p.phases.length; pi2++) {
      var pName = p.phases[pi2].name;
      var prefix = pName.match(/^P[\d.]+/);
      if (prefix) prefixSpentMap[prefix[0]] = p.phases[pi2].spent;
    }

    h += '<div class="person-phase-section">';
    h += '<div class="section-title">Team Allocation by Phase <span style="font-size:11px;font-weight:400;color:var(--mid-gray);margin-left:8px">Estimates from Snapshot ' + (_sn.snapshotVersion || '') + ' &middot; Spent from Timesheets</span></div>';

    /* Department legend */
    h += '<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">';
    for (var di = 0; di < deptOrder.length; di++) {
      h += '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid-gray)"><div style="width:10px;height:10px;border-radius:50%;background:' + deptColors[deptOrder[di]] + '"></div>' + deptOrder[di] + '</div>';
    }
    h += '</div>';

    for (var phi = 0; phi < phaseKeys.length; phi++) {
      var phKey = phaseKeys[phi];
      var phData = snPhases[phKey];
      if (!phData.people || !phData.people.length) continue;

      /* Get actual spent from portfolio (most current) via phase number prefix */
      var phPrefix = snapshotPhasePrefix[phKey] || phKey.match(/Phase (\d[\d.]*)/);
      if (phPrefix && typeof phPrefix === 'object') phPrefix = 'P' + phPrefix[1];
      var portfolioPhaseSpent = (phPrefix && prefixSpentMap[phPrefix]) || 0;

      var shortName = phKey.replace('Phase ','P').replace(' - ',': ').replace(' (Pre Pro)','').replace(' (Post)','').replace('Compilation','Post');
      var phaseOverall = phData.estimated > 0 ? Math.round((portfolioPhaseSpent / phData.estimated) * 100) : 0;
      h += '<div class="pp-phase-block">';
      h += '<div class="pp-phase-header"><div class="pp-phase-title">' + shortName + '</div>';
      h += '<div class="pp-phase-totals">Est: ' + phData.estimated.toFixed(1) + ' &middot; Spent: ' + portfolioPhaseSpent.toFixed(1) + ' hrs <span style="font-size:11px;color:' + (phaseOverall > 100 ? '#C62828' : phaseOverall > 75 ? 'var(--ocean)' : 'var(--mid-gray)') + '">(' + phaseOverall + '%)</span></div></div>';

      /* Group estimated people by department */
      var byDept = {};
      for (var pi = 0; pi < phData.people.length; pi++) {
        var per = phData.people[pi];
        var dept = per.dept || 'Other';
        if (!byDept[dept]) byDept[dept] = [];
        byDept[dept].push({ name: per.name, estimated: per.estimated, isUnplanned: false });
      }

      /* Always distribute portfolio phase spent by estimate share (snapshot actuals are always stale) */
      h += '<div class="pp-row pp-hdr" style="grid-template-columns:24px 1fr 70px 70px 120px"><div></div><div>Name</div><div style="text-align:right">Est.</div><div style="text-align:right">Spent</div><div>Progress</div></div>';

      for (var di = 0; di < deptOrder.length; di++) {
        var deptName = deptOrder[di];
        var deptPeople = byDept[deptName];
        if (!deptPeople || !deptPeople.length) continue;

        var deptEst = 0;
        for (var dpi = 0; dpi < deptPeople.length; dpi++) { deptEst += deptPeople[dpi].estimated; }
        /* Dept spent = proportional share of portfolio phase spent */
        var deptSpent = phData.estimated > 0 ? Math.round((deptEst / phData.estimated) * portfolioPhaseSpent * 100) / 100 : 0;
        var dc = deptColors[deptName] || 'var(--mid-gray)';
        var deptPct = deptEst > 0 ? Math.round((deptSpent / deptEst) * 100) : (deptSpent > 0 ? 100 : 0);
        var deptOver = deptSpent > deptEst && deptEst > 0;

        /* Department sub-header with progress bar */
        h += '<div style="display:grid;grid-template-columns:24px 1fr 70px 70px 120px;gap:8px;align-items:center;padding:8px 0 4px;border-bottom:2px solid ' + dc + '">';
        h += '<div><div style="width:10px;height:10px;border-radius:50%;background:' + dc + '"></div></div>';
        h += '<div style="font-size:12px;font-weight:700;color:var(--abyss)">' + deptName + '</div>';
        h += '<div class="pp-num" style="font-weight:700">' + deptEst.toFixed(1) + '</div>';
        h += '<div class="pp-num" style="font-weight:700;' + (deptOver ? 'color:#C62828' : '') + '">' + deptSpent.toFixed(1) + '</div>';
        h += '<div style="display:flex;align-items:center;gap:6px"><div class="pp-bar-wrap" style="flex:1"><div class="pp-bar-fill" style="width:' + Math.min(deptPct, 100) + '%;background:' + (deptOver ? '#C62828' : dc) + '"></div></div><span style="font-size:10px;color:' + (deptOver ? '#C62828' : 'var(--mid-gray)') + ';min-width:30px">' + deptPct + '%</span></div>';
        h += '</div>';

        /* People within department */
        for (var dpi = 0; dpi < deptPeople.length; dpi++) {
          var per2 = deptPeople[dpi];
          /* Distribute portfolio spent by estimate share — snapshot actuals ignored */
          var scaledSpent = (portfolioPhaseSpent > 0 && phData.estimated > 0 && per2.estimated > 0)
            ? Math.round((per2.estimated / phData.estimated) * portfolioPhaseSpent * 100) / 100
            : 0;
          var perPct = per2.estimated > 0 ? Math.round((scaledSpent / per2.estimated) * 100) : (scaledSpent > 0 ? 100 : 0);
          var perOver = scaledSpent > per2.estimated && per2.estimated > 0;
          h += '<div class="pp-row" style="grid-template-columns:24px 1fr 70px 70px 120px">';
          h += '<div></div>';
          h += '<div class="pp-name">' + per2.name + (per2.isUnplanned ? ' <span style="font-size:9px;color:var(--ember);font-weight:400">unplanned</span>' : '') + '</div>';
          h += '<div class="pp-num">' + (per2.estimated > 0 ? per2.estimated.toFixed(1) : '<span style="color:var(--mid-gray)">—</span>') + '</div>';
          h += '<div class="pp-num" style="' + (perOver ? 'color:#C62828;font-weight:700' : '') + '">' + (scaledSpent > 0 ? scaledSpent.toFixed(1) : '<span style="color:var(--mid-gray)">—</span>') + '</div>';
          h += '<div style="display:flex;align-items:center;gap:6px"><div class="pp-bar-wrap" style="flex:1"><div class="pp-bar-fill" style="width:' + Math.min(perPct, 100) + '%;background:' + (perOver ? '#C62828' : per2.isUnplanned ? 'var(--mid-gray)' : dc) + '"></div></div><span style="font-size:10px;color:' + (perOver ? '#C62828' : 'var(--mid-gray)') + ';min-width:30px">' + (per2.estimated > 0 || scaledSpent > 0 ? perPct + '%' : '') + '</span></div>';
          h += '</div>';
        }
      }
      h += '</div>';
    }
    h += '</div>';
  }

  /* Resource Allocation Section — from Manage Resources allocations.json only */
  var todayStr = new Date().toISOString().slice(0,10);
  var curMon = getWeekMon(todayStr);

  /* Build weekly allocation data from ALLOCATIONS (not Monday RES) */
  var allocWeeks = {};
  if (ALLOCATIONS && ALLOCATIONS.allocations) {
    var pName = p.name;
    var pForecast = p.forecastName || '';
    var sbName = (p._supabudget && p._supabudget.name) || '';
    for (var ai = 0; ai < ALLOCATIONS.allocations.length; ai++) {
      var a = ALLOCATIONS.allocations[ai];
      var aProj = a.project || '';
      /* Match allocation to this project by name */
      if (aProj !== pName && aProj !== pForecast && aProj !== sbName) {
        if (pName.indexOf(aProj) < 0 && aProj.indexOf(pName) < 0) continue;
      }
      var wk = a.weekOf || getWeekMon(a.date);
      if (wk < curMon) continue;
      if (!allocWeeks[wk]) allocWeeks[wk] = { sunday: wk, total: 0, people: {} };
      var person = a.person || 'Unknown';
      if (!allocWeeks[wk].people[person]) allocWeeks[wk].people[person] = 0;
      allocWeeks[wk].people[person] += a.hoursPerDay || 0;
      allocWeeks[wk].total += a.hoursPerDay || 0;
    }
  }
  var upcoming = [];
  for (var wk in allocWeeks) upcoming.push(allocWeeks[wk]);
  upcoming.sort(function(a,b) { return a.sunday < b.sunday ? -1 : 1; });

  h += '<div class="section-title" style="margin-top:32px">Upcoming Resource Allocation</div>';

  if (upcoming.length > 0) {
    var upcomingTotal = 0;
    for (var i = 0; i < upcoming.length; i++) upcomingTotal += upcoming[i].total;
    var maxWkHrs = 1;
    for (var i = 0; i < upcoming.length; i++) { if (upcoming[i].total > maxWkHrs) maxWkHrs = upcoming[i].total; }

    h += '<div style="font-size:12px;color:var(--mid-gray);margin-bottom:14px">' + upcoming.length + ' week' + (upcoming.length !== 1 ? 's' : '') + ' &middot; ' + upcomingTotal.toFixed(1) + ' hrs allocated &middot; From Manage Resources</div>';

    h += '<div class="week-timeline">';
    for (var wi = 0; wi < upcoming.length; wi++) {
      var w = upcoming[wi];
      var isCur = w.sunday === curMon;
      var ppl = [];
      for (var pk in w.people) ppl.push([pk, w.people[pk]]);
      ppl.sort(function(a,b){return b[1]-a[1];});
      var segs = '';
      for (var si = 0; si < ppl.length; si++) {
        var sw = (ppl[si][1] / w.total) * (w.total / maxWkHrs) * 100;
        var sc = PC[ppl[si][0]] || '#9B9590';
        segs += '<div class="wb-seg" style="width:' + sw + '%;background:' + sc + '" title="' + ppl[si][0] + ': ' + ppl[si][1].toFixed(1) + 'h"></div>';
      }
      var ptags = '';
      for (var si = 0; si < ppl.length; si++) {
        if (ppl[si][0] === 'Unknown') continue;
        var fn = ppl[si][0].split(' ')[0];
        ptags += '<span class="week-person"><span class="pd" style="background:' + (PC[ppl[si][0]]||'#9B9590') + '"></span>' + fn + ' ' + ppl[si][1].toFixed(1) + 'h</span>';
      }
      h += '<div class="week-row' + (isCur ? ' current-week' : '') + '">';
      h += '<div class="week-label">' + (isCur ? '&#9654; ' : '') + 'Week ' + getISOWeek(w.sunday) + '<span class="wd">' + fmtDateShort(w.sunday) + ' – ' + fmtDateShort(getSaturday(w.sunday)) + '</span></div>';
      h += '<div class="week-hrs">' + w.total.toFixed(1) + '<span class="wu"> hrs</span></div>';
      h += '<div class="week-bar-wrap"><div class="week-bar">' + segs + '</div><div class="week-people">' + ptags + '</div></div>';
      h += '</div>';
    }
    h += '</div>';
  } else {
    var curSatDate = getSaturday(curMon);
    h += '<div style="font-size:13px;color:var(--mid-gray);margin-top:8px;padding:16px;background:var(--cloud);border-radius:8px">No allocations from Manage Resources for this project <span style="font-weight:600">(' + fmtDateShort(curMon) + ' – ' + fmtDateShort(curSatDate) + ')</span></div>';
  }

  document.getElementById('mainContent').innerHTML = h;

  /* Async: load Spark budget data into the project page */
  if (sparkAuth.connected) {
    sparkLoadBudgetForProject(p.code);
  }
}

/* ── RENDER: FLAGGED ── */
function renderFlagged() {
  var h = '<h1 class="page-title">Needs Attention</h1>';
  h += '<p class="page-subtitle">Projects missing data or requiring team input</p>';

  var all = allProjects();

  /* Categorize ALL projects by data completeness using Supabase data */
  var noBudget = [];      /* No Supabase budget at all */
  var budgetNoLabor = []; /* Has budget $ but no labor entries */
  var needsOop = [];      /* Has labor but no OOP data */
  var fullyLoaded = [];   /* Has budget + labor + OOP */
  var possiblyDone = [];  /* 95%+ hours consumed */

  for (var i = 0; i < all.length; i++) {
    var p = all[i];
    if (isProjectCompleted(p)) continue;
    var sb = p._supabudget;

    /* Skip non-billable, bizdev, and internal projects from Needs Attention entirely */
    var isNonBill = p.projectType === 'internal' || p.projectType === 'bizdev' || p.code.indexOf('100_') === 0 || p.code.indexOf('101_') === 0 || p.code.indexOf('359_') === 0;
    if (sb && (sb.status === 'nonbillable' || sb.status === 'bizdev')) isNonBill = true;

    if (!sb) {
      if (!isNonBill && (p.dataSource === 'no_snapshot' || p.dataSource === 'needs_review')) {
        noBudget.push(p);
      }
      continue;
    }

    if (isNonBill) { fullyLoaded.push(p); continue; }

    /* Has Supabase budget — check what data exists */
    var hasPrice = (sb.clientPrice || sb.client_price || 0) > 0;
    var hasLabor = (sb.laborHours || 0) > 0;
    var hasOop = (sb.oopEffective || sb.oopTotal || 0) > 0;

    var noOopNeeded = sb.no_oop === true;

    /* Small projects: budget + hours = fully loaded (no OOP needed) */
    var isSmallProj = (p.code.indexOf('_10_') >= 0 && p.code.indexOf('XXX') >= 0) || p.code === '334_20_01' || (sb.name && sb.name.toLowerCase().indexOf('small project') >= 0);
    if (isSmallProj) noOopNeeded = true;

    if (hasPrice && hasLabor && (hasOop || noOopNeeded)) {
      fullyLoaded.push(p);
    } else if (hasPrice && hasLabor && !hasOop && !noOopNeeded) {
      needsOop.push(p);
    } else if (hasPrice && !hasLabor) {
      budgetNoLabor.push(p);
    } else if (!hasPrice) {
      noBudget.push(p);
    }

    /* Check if possibly finished */
    var budgetHrs = sb.laborHours || 0;
    var spentHrs = 0;
    if (SUPA_ACTUALS && SUPA_ACTUALS[p.code]) spentHrs = SUPA_ACTUALS[p.code].totalHours || 0;
    if (budgetHrs > 0 && spentHrs >= budgetHrs * 0.95) {
      possiblyDone.push({p:p, spent:Math.round(spentHrs), planned:Math.round(budgetHrs), pct:Math.round(spentHrs/budgetHrs*100)});
    }
  }

  /* Pre-compute OOP scheduling count for summary card */
  var _oopSchedEntries = (OOP_SCHEDULE && OOP_SCHEDULE.entries) ? OOP_SCHEDULE.entries : [];
  var _scheduledIds = {};
  for (var si = 0; si < _oopSchedEntries.length; si++) {
    if (_oopSchedEntries[si].oopEntryId) _scheduledIds[_oopSchedEntries[si].oopEntryId] = true;
  }
  var _oopUnschedCount = 0;
  var _allForOopPre = all.filter(function(p) { return p._supabudget && !isProjectCompleted(p); });
  for (var i = 0; i < _allForOopPre.length; i++) {
    var _sb = _allForOopPre[i]._supabudget;
    var _oopItems = _sb._oopEntries || _sb.oopEntries || [];
    for (var j = 0; j < _oopItems.length; j++) {
      var _it = _oopItems[j];
      if (_it.is_active === false) continue;
      var _ec = _it.adjusted_count != null ? _it.adjusted_count : (_it.count || 0);
      var _er = _it.adjusted_rate != null ? _it.adjusted_rate : (_it.rate || 0);
      var _ed = _it.adjusted_days != null ? _it.adjusted_days : (_it.days || 1);
      var _eh = _it.adjusted_head_count != null ? _it.adjusted_head_count : (_it.head_count || 1);
      var _et = _it.actual_amount != null ? _it.actual_amount : (_ec * _er * _ed * _eh);
      if (_et > 0 && !_it.paid && !_scheduledIds[_it.id]) _oopUnschedCount++;
    }
  }

  /* Summary counts at top */
  var totalIssues = noBudget.length + budgetNoLabor.length + needsOop.length + possiblyDone.length + _oopUnschedCount;
  h += '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px">';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid #E53935"><div style="font-size:28px;font-weight:700;color:#E53935">' + noBudget.length + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">No Budget</div></div>';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid var(--honey)"><div style="font-size:28px;font-weight:700;color:var(--honey)">' + budgetNoLabor.length + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">Needs Labor</div></div>';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid #FF9800"><div style="font-size:28px;font-weight:700;color:#FF9800">' + needsOop.length + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">Needs OOP</div></div>';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid #CE93D8"><div style="font-size:28px;font-weight:700;color:#CE93D8">' + _oopUnschedCount + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">OOP Unscheduled</div></div>';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid #1565C0"><div style="font-size:28px;font-weight:700;color:#1565C0">' + possiblyDone.length + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">Possibly Done</div></div>';
  h += '<div class="oop-checklist-card" style="border-radius:8px;padding:14px;text-align:center;border-left:4px solid #81C784"><div style="font-size:28px;font-weight:700;color:#81C784">' + fullyLoaded.length + '</div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray);margin-top:4px">Fully Loaded</div></div>';
  h += '</div>';

  /* Helper to render a flagged card */
  function flagCard(p, color, reason, detail) {
    var price = p._supabudget ? (p._supabudget.clientPrice || p._supabudget.client_price || 0) : (p.dollarBudget || 0);
    var priceStr = price > 0 ? '$' + Math.round(price).toLocaleString() : 'No budget set';
    var card = '<div class="flagged-card" style="border-left-color:' + color + ';margin-bottom:8px;cursor:pointer;padding:12px 16px" onclick="navigate(\'project:' + p.id + '\')">';
    card += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    card += '<div><div class="flag-title" style="margin-bottom:4px">' + p.name + '</div>';
    card += '<div class="flag-reason" style="color:' + color + ';margin-bottom:4px">' + reason + '</div>';
    if (detail) card += '<div style="font-size:11px;color:var(--mid-gray)">' + detail + '</div>';
    card += '</div>';
    card += '<div style="text-align:right"><div style="font-size:14px;font-weight:600;color:var(--abyss)">' + priceStr + '</div>';
    card += '<div style="font-size:10px;color:var(--mid-gray)">' + p.code + '</div></div>';
    card += '</div></div>';
    return card;
  }

  /* ── 1. NO BUDGET ── */
  if (noBudget.length) {
    h += '<div class="section-title" style="color:#E53935">No Furnace Budget (' + noBudget.length + ')</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">These projects have no budget data in Furnace. Click into any project to create a new budget, or port data from an existing Google Sheets snapshot.</p>';
    for (var i = 0; i < noBudget.length; i++) {
      var p = noBudget[i];
      var hasOldSnapshot = p.dollarBudget > 0;
      var detail = hasOldSnapshot ? 'Has old snapshot data ($' + Math.round(p.dollarBudget).toLocaleString() + ') that can be ported' : 'No existing data — start fresh';
      h += flagCard(p, '#E53935', 'No Furnace budget created', detail);
    }
  }

  /* ── 2. BUDGET ONLY — NO LABOR ── */
  if (budgetNoLabor.length) {
    h += '<div class="section-title" style="color:var(--honey)">Has Budget — Needs Labor Hours (' + budgetNoLabor.length + ')</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">These projects have a budget amount set but no labor hour estimates per person. Open the Budget Snapshot and add team members to the Labor Fee section.</p>';
    for (var i = 0; i < budgetNoLabor.length; i++) {
      h += flagCard(budgetNoLabor[i], 'var(--honey)', 'Budget set but no labor hours entered', 'Open Budget Snapshot \u2192 Labor Fee section to add team hour estimates');
    }
  }

  /* ── 3. NEEDS OOP DATA ── */
  if (needsOop.length) {
    h += '<div class="section-title" style="color:#FF9800">Needs OOP Data (' + needsOop.length + ')</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">These projects have labor estimates but no out-of-pocket costs entered. Toggle "No OOP" on the project if this project has no out-of-pocket expenses, or fill in the OOP sections.</p>';
    for (var i = 0; i < needsOop.length; i++) {
      var p = needsOop[i];
      var hrs = p._supabudget ? (p._supabudget.laborHours || 0) : 0;
      h += flagCard(p, '#FF9800', 'Labor hours set (' + hrs.toFixed(0) + 'h) but no OOP entries', 'Open Budget Snapshot \u2192 toggle "No OOP" or add out-of-pocket costs');
    }
  }

  /* ── 3b. NEEDS OOP SCHEDULING — Finance Officer Checklist ── */
  /* Find ALL OOP line items across ALL projects that have costs but aren't paid and aren't scheduled */
  var unscheduledOop = [];
  var oopScheduleEntries = (OOP_SCHEDULE && OOP_SCHEDULE.entries) ? OOP_SCHEDULE.entries : [];
  var scheduledItemIds = {};
  for (var si = 0; si < oopScheduleEntries.length; si++) {
    if (oopScheduleEntries[si].oopEntryId) scheduledItemIds[oopScheduleEntries[si].oopEntryId] = true;
  }

  /* Check ALL projects (not just fullyLoaded) for unscheduled OOP items */
  var allForOop = all.filter(function(p) { return p._supabudget && !isProjectCompleted(p); });
  var totalUnschedItems = 0;
  var totalUnschedAmount = 0;
  for (var i = 0; i < allForOop.length; i++) {
    var p = allForOop[i];
    var sb = p._supabudget;
    var oopItems = sb._oopEntries || sb.oopEntries || [];
    var unschedItems = [];
    for (var j = 0; j < oopItems.length; j++) {
      var item = oopItems[j];
      if (item.is_active === false) continue;
      var effectiveCount = item.adjusted_count != null ? item.adjusted_count : (item.count || 0);
      var effectiveRate = item.adjusted_rate != null ? item.adjusted_rate : (item.rate || 0);
      var effectiveDays = item.adjusted_days != null ? item.adjusted_days : (item.days || 1);
      var effectiveHead = item.adjusted_head_count != null ? item.adjusted_head_count : (item.head_count || 1);
      var effectiveTotal = item.actual_amount != null ? item.actual_amount : (effectiveCount * effectiveRate * effectiveDays * effectiveHead);
      if (effectiveTotal > 0 && !item.paid && !scheduledItemIds[item.id]) {
        unschedItems.push({ item: item, total: effectiveTotal });
        totalUnschedItems++;
        totalUnschedAmount += effectiveTotal;
      }
    }
    if (unschedItems.length > 0) {
      unscheduledOop.push({ project: p, items: unschedItems });
    }
  }

  if (unscheduledOop.length) {
    h += '<div class="section-title" style="color:#CE93D8">OOP Finance Checklist (' + totalUnschedItems + ' items across ' + unscheduledOop.length + ' projects)</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">Line items with costs that haven\'t been paid or scheduled for payment. Total outstanding: <strong style="color:#CE93D8">$' + Math.round(totalUnschedAmount).toLocaleString() + '</strong>. Schedule payments in Manage Resources \u2192 Out-of-Pocket, or mark as paid on the project page.</p>';

    for (var ui = 0; ui < unscheduledOop.length; ui++) {
      var uo = unscheduledOop[ui];
      var projTotal = 0;
      for (var j = 0; j < uo.items.length; j++) projTotal += uo.items[j].total;

      h += '<div class="oop-checklist-card" style="border-radius:8px;border-left:4px solid #CE93D8;padding:14px 16px;margin-bottom:12px;cursor:pointer" onclick="navigate(\'project:' + uo.project.id + '\')">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h += '<div style="font-weight:600">' + uo.project.code + ' — ' + uo.project.name + '</div>';
      h += '<div style="font-weight:700;color:#CE93D8">' + uo.items.length + ' item' + (uo.items.length > 1 ? 's' : '') + ' · $' + Math.round(projTotal).toLocaleString() + '</div>';
      h += '</div>';

      /* Individual line items */
      h += '<div style="display:grid;grid-template-columns:1fr 100px 100px;gap:4px;font-size:12px;color:var(--mid-gray);padding:4px 0;border-bottom:1px solid rgba(128,128,128,.2)">';
      h += '<div style="font-weight:600">Line Item</div><div style="text-align:right;font-weight:600">Amount</div><div style="text-align:right;font-weight:600">Status</div>';
      h += '</div>';

      for (var j = 0; j < uo.items.length; j++) {
        var li = uo.items[j];
        var itemName = li.item.line_item_name || 'Unnamed';
        h += '<div style="display:grid;grid-template-columns:1fr 100px 100px;gap:4px;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(128,128,128,.1)">';
        h += '<div>' + itemName + '</div>';
        h += '<div style="text-align:right;font-weight:600">$' + Math.round(li.total).toLocaleString() + '</div>';
        h += '<div style="text-align:right"><span style="background:rgba(245,127,23,.15);color:#FFB74D;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">Unscheduled</span></div>';
        h += '</div>';
      }

      h += '</div>';
    }
  }

  /* ── 4. POSSIBLY FINISHED ── */
  if (possiblyDone.length) {
    h += '<div class="section-title" style="color:#1565C0">Possibly Finished — Confirm Status (' + possiblyDone.length + ')</div>';
    h += '<p style="font-size:12px;color:var(--mid-gray);margin-bottom:12px">These projects have consumed 95%+ of their budgeted hours. If finished, mark them as "Finished" in the Project Overview to move them to Completed.</p>';
    for (var i = 0; i < possiblyDone.length; i++) {
      var f = possiblyDone[i];
      h += flagCard(f.p, '#1565C0', 'Budget ' + f.pct + '% consumed (' + f.spent + '/' + f.planned + ' hrs)', 'If complete, click into project and set status to "Finished"');
    }
  }

  /* ── ALL CLEAR ── */
  if (totalIssues === 0) {
    h += '<div style="text-align:center;color:var(--mid-gray);padding:60px 0"><p style="font-size:40px;margin-bottom:12px">&#10003;</p><p>All projects have complete data</p></div>';
  }

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: IMPORT TIME ── */

function importHandleDrop(event) {
  var files = event.dataTransfer.files;
  if (files.length > 0) importHandleFile(files[0]);
}

async function importHandleFile(file) {
  if (!file) return;
  var statusEl = document.getElementById('importStatus');
  var logEl = document.getElementById('importLog');
  if (!statusEl) return;

  statusEl.innerHTML = '<div style="background:#E3F2FD;border-radius:8px;padding:16px;margin-bottom:12px"><div style="font-weight:600;color:#1565C0;margin-bottom:4px">&#9203; Processing: ' + file.name + '</div><div style="font-size:12px;color:#1565C0" id="importProgress">Reading file...</div></div>';

  /* Load SheetJS from CDN if not already loaded */
  if (typeof XLSX === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    document.head.appendChild(script);
    await new Promise(function(resolve) { script.onload = resolve; });
  }

  var prog = document.getElementById('importProgress');
  prog.textContent = 'Parsing XLSX...';

  /* Read file */
  var data = await file.arrayBuffer();
  var wb = XLSX.read(data, { type: 'array', cellDates: true });
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws);

  prog.textContent = 'Parsed ' + rows.length + ' rows. Checking for duplicates...';

  /* Map columns — handle both column name variants */
  function col(row, names) {
    for (var i = 0; i < names.length; i++) { if (row[names[i]] !== undefined) return row[names[i]]; }
    return null;
  }

  /* Build entries */
  var entries = [];
  var skipped = 0;
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var hours = parseFloat(col(r, ['Logged Time', 'Hours', 'Duration']) || 0);
    if (!hours || hours === 0) { skipped++; continue; }

    var person = col(r, ['Person', 'User', 'Member']) || '';
    var board = col(r, ['Board', 'Project']) || '';
    var dateRaw = col(r, ['Date Logged', 'Date', 'Start']);
    var group = col(r, ['Group', 'Phase']) || '';
    var item = col(r, ['Item Name', 'Task', 'Item']) || '';
    var nb = String(col(r, ['Non Billable', 'NonBillable']) || '').toUpperCase() === 'TRUE';
    var bd = String(col(r, ['Biz Dev', 'BizDev']) || '').toUpperCase() === 'TRUE';
    var to = String(col(r, ['Time Off', 'TimeOff']) || '').toUpperCase() === 'TRUE';

    /* Parse date */
    var workDate;
    if (dateRaw instanceof Date) {
      workDate = dateRaw.toISOString().slice(0, 10);
    } else if (typeof dateRaw === 'string') {
      workDate = dateRaw.slice(0, 10);
    } else if (typeof dateRaw === 'number') {
      /* Excel serial date */
      var d = new Date((dateRaw - 25569) * 86400 * 1000);
      workDate = d.toISOString().slice(0, 10);
    } else {
      workDate = null;
    }
    if (!workDate) { skipped++; continue; }

    /* Extract project code from board name */
    var codeMatch = board.match(/^(\d+_\d+_\d+)/);
    var projCode = codeMatch ? codeMatch[1] : (board.match(/^(\d+_\d+)/) || [null, null])[1];

    /* Phase mapping */
    var phaseKey = null;
    var gl = group.toLowerCase();
    if (gl.indexOf('phase 1') >= 0) phaseKey = 'phase1';
    else if (gl.indexOf('phase 2') >= 0) phaseKey = 'phase2';
    else if (gl.indexOf('phase 3.1') >= 0 || gl.indexOf('(pre)') >= 0) phaseKey = 'phase3_1';
    else if (gl.indexOf('phase 3.2') >= 0 || gl.indexOf('(pro)') >= 0 || gl.indexOf('(working)') >= 0) phaseKey = 'phase3_2';
    else if (gl.indexOf('phase 4') >= 0) phaseKey = 'phase4';
    else if (gl.indexOf('phase 5') >= 0) phaseKey = 'phase5';

    /* Dedup hash: person + board + date + start time + hours */
    var startRaw = col(r, ['Start', 'Start Time']) || '';
    var startStr = startRaw instanceof Date ? startRaw.toISOString() : String(startRaw);
    var hash = person + '|' + board + '|' + workDate + '|' + startStr + '|' + hours;

    entries.push({
      hours: hours, work_date: workDate, person_name: person,
      project_code: projCode, board_name: board.substring(0, 200),
      phase_group: group.substring(0, 200), phase_key: phaseKey,
      item_name: (item || '').substring(0, 200),
      is_billable: !nb, is_bizdev: bd, is_timeoff: to,
      source: 'timetracker', _hash: hash
    });
  }

  prog.textContent = 'Parsed ' + entries.length + ' valid entries (skipped ' + skipped + ' empty). Checking for duplicates in Supabase...';

  /* Find date range in the file to query only relevant existing entries */
  var fileDates = entries.map(function(e) { return e.work_date; }).filter(Boolean).sort();
  var minDate = fileDates[0] || '2020-01-01';
  var maxDate = fileDates[fileDates.length - 1] || '2030-12-31';

  /* Fetch existing entries from Supabase for this date range — direct query, not cache */
  prog.textContent = 'Fetching existing entries for ' + minDate + ' to ' + maxDate + '...';
  var existing = await sparkFetchAll('labor_actuals',
    'select=person_name,board_name,work_date,hours&source=eq.timetracker' +
    '&work_date=gte.' + minDate + '&work_date=lte.' + maxDate +
    '&order=work_date.asc');

  prog.textContent = 'Found ' + existing.length + ' existing entries in date range. Deduplicating...';

  /* Build hash set from Supabase data */
  var simpleHashes = {};
  for (var i = 0; i < existing.length; i++) {
    var a = existing[i];
    var sh = (a.person_name || '') + '|' + (a.board_name || '') + '|' + (a.work_date || '') + '|' + (a.hours || 0);
    simpleHashes[sh] = true;
  }

  /* Filter out duplicates */
  var newEntries = [];
  var dupes = 0;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var simpleHash = e.person_name + '|' + e.board_name + '|' + e.work_date + '|' + e.hours;
    if (simpleHashes[simpleHash]) {
      dupes++;
    } else {
      newEntries.push(e);
      simpleHashes[simpleHash] = true; /* prevent self-duplication within file */
    }
  }

  prog.textContent = 'Found ' + newEntries.length + ' new entries (' + dupes + ' duplicates skipped). Importing...';

  if (newEntries.length === 0) {
    statusEl.innerHTML = '<div style="background:#E8F5E9;border-radius:8px;padding:16px;margin-bottom:12px"><div style="font-weight:600;color:#2E7D32;margin-bottom:4px">&#10003; All caught up!</div><div style="font-size:12px;color:#2E7D32">All ' + entries.length + ' entries already exist in Supabase. No new data to import.</div></div>';
    return;
  }

  /* Preview what we're about to import */
  var byPerson = {};
  var dateMin = '9999', dateMax = '0000';
  var totalHrs = 0;
  for (var i = 0; i < newEntries.length; i++) {
    var e = newEntries[i];
    byPerson[e.person_name] = (byPerson[e.person_name] || 0) + e.hours;
    if (e.work_date < dateMin) dateMin = e.work_date;
    if (e.work_date > dateMax) dateMax = e.work_date;
    totalHrs += e.hours;
  }

  var preview = '<div style="background:var(--white);border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid var(--canvas)">';
  preview += '<div style="font-weight:600;color:var(--abyss);margin-bottom:8px">Preview: ' + newEntries.length + ' new entries to import</div>';
  preview += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">';
  preview += '<div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray)">Date Range</div><div style="font-weight:600">' + dateMin + ' to ' + dateMax + '</div></div>';
  preview += '<div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray)">Total Hours</div><div style="font-weight:600">' + totalHrs.toFixed(1) + 'h</div></div>';
  preview += '<div><div style="font-size:10px;text-transform:uppercase;color:var(--mid-gray)">People</div><div style="font-weight:600">' + Object.keys(byPerson).length + '</div></div>';
  preview += '</div>';

  /* Person breakdown */
  preview += '<div style="max-height:200px;overflow-y:auto;font-size:12px">';
  var sortedPeople = Object.keys(byPerson).sort(function(a,b) { return byPerson[b] - byPerson[a]; });
  for (var i = 0; i < sortedPeople.length; i++) {
    var pn = sortedPeople[i];
    preview += '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--light-gray)"><span>' + pn + '</span><span style="font-weight:600;font-variant-numeric:tabular-nums">' + byPerson[pn].toFixed(1) + 'h</span></div>';
  }
  preview += '</div>';

  preview += '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">';
  preview += '<button onclick="importExecute(false)" style="padding:8px 24px;border-radius:6px;border:none;background:var(--ocean);color:white;cursor:pointer;font-size:13px;font-weight:600">Import ' + newEntries.length + ' New Entries</button>';
  preview += '<button onclick="importExecute(true)" style="padding:8px 24px;border-radius:6px;border:none;background:#F57F17;color:white;cursor:pointer;font-size:13px;font-weight:600" title="Deletes ALL existing timetracker data and replaces with this file">&#x1F504; Replace All Data</button>';
  preview += '<button onclick="importTimeState.status=\'idle\';renderImportTime()" style="padding:8px 16px;border-radius:6px;border:1px solid var(--canvas);background:transparent;color:var(--mid-gray);cursor:pointer;font-size:13px">Cancel</button>';
  preview += '</div>';
  preview += '<div style="font-size:10px;color:var(--mid-gray);margin-top:6px">&#x1F504; <b>Replace All</b> wipes all existing timetracker entries and imports this file as the single source of truth.</div>';
  preview += '</div>';

  statusEl.innerHTML = preview;

  /* Store parsed entries for the import button */
  importTimeState.parsed = newEntries;
  importTimeState.allParsed = entries; /* Full set (pre-dedup) for Replace All */
  importTimeState.status = 'preview';
}

async function importExecute(replaceAll) {
  var entries = importTimeState.parsed;
  if (!entries || entries.length === 0) return;

  if (replaceAll) {
    if (!confirm('This will DELETE ALL existing timetracker entries and replace with the ' + entries.length + ' entries from this file.\n\nThis cannot be undone. Continue?')) return;
    /* Use the full parsed file (not just new entries) — reimport everything */
    entries = importTimeState.allParsed || entries;
  }

  var statusEl = document.getElementById('importStatus');
  var actionLabel = replaceAll ? 'Replacing all data' : 'Importing';
  statusEl.innerHTML = '<div style="background:#E3F2FD;border-radius:8px;padding:16px;margin-bottom:12px"><div style="font-weight:600;color:#1565C0;margin-bottom:4px">&#9203; ' + actionLabel + '...</div><div style="font-size:12px;color:#1565C0" id="importProgress">0 / ' + entries.length + '</div><div style="background:var(--canvas);border-radius:4px;height:6px;margin-top:8px"><div id="importBar" style="background:' + (replaceAll ? '#F57F17' : 'var(--ocean)') + ';height:100%;border-radius:4px;width:0%;transition:width .3s"></div></div></div>';

  /* If replaceAll, delete all existing timetracker entries first */
  if (replaceAll) {
    var prog = document.getElementById('importProgress');
    if (prog) prog.textContent = 'Deleting old entries...';
    try {
      await sparkFetch('labor_actuals?source=eq.timetracker', '', 'DELETE');
    } catch(e) { console.warn('Delete error (may be fine):', e); }
    /* Clear local cache */
    SUPA_ACTUALS_ALL = [];
    SUPA_ACTUALS = {};
  }

  var prog = document.getElementById('importProgress');
  var bar = document.getElementById('importBar');
  var batchSize = 500;
  var imported = 0;
  var errors = 0;

  /* Resolve team_member_id and budget_id for entries */
  /* Build lookups from Supabase data already loaded */
  var tmByName = {};
  if (SUPA_BUDGETS) {
    /* We don't have team member lookup readily available in browser — skip for now, set to null */
  }

  for (var i = 0; i < entries.length; i += batchSize) {
    var batch = entries.slice(i, i + batchSize);
    /* Remove _hash field before sending */
    var cleanBatch = batch.map(function(e) {
      var c = {};
      for (var k in e) { if (k !== '_hash') c[k] = e[k]; }
      return c;
    });

    try {
      var result = await sparkFetch('labor_actuals', '', 'POST', cleanBatch);
      if (result && !result.error) {
        imported += batch.length;
      } else {
        errors += batch.length;
        console.error('Import batch error:', result);
      }
    } catch (ex) {
      errors += batch.length;
      console.error('Import exception:', ex);
    }

    var pct = Math.round((i + batch.length) / entries.length * 100);
    if (prog) prog.textContent = (i + batch.length) + ' / ' + entries.length + (errors > 0 ? ' (' + errors + ' errors)' : '');
    if (bar) bar.style.width = pct + '%';
  }

  /* Done */
  var icon = errors === 0 ? '&#10003;' : '&#9888;';
  var bg = errors === 0 ? '#E8F5E9' : '#FFF8E1';
  var color = errors === 0 ? '#2E7D32' : '#F57F17';
  statusEl.innerHTML = '<div style="background:' + bg + ';border-radius:8px;padding:16px;margin-bottom:12px"><div style="font-weight:600;color:' + color + ';margin-bottom:4px">' + icon + ' Import Complete</div><div style="font-size:12px;color:' + color + '">' + imported + ' entries imported' + (errors > 0 ? ', ' + errors + ' errors' : '') + '.</div></div>';

  importTimeState.status = 'done';
  importTimeState.parsed = null;

  /* Add the imported entries to the local cache so dedup works on next upload without full reload */
  if (SUPA_ACTUALS_ALL && entries) {
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      SUPA_ACTUALS_ALL.push({
        person_name: e.person_name, board_name: e.board_name,
        work_date: e.work_date, hours: e.hours,
        project_code: e.project_code, is_billable: e.is_billable
      });
    }
  }
}

async function sparkFetch(table, query, method, body) {
  /* Load config — Electron IPC or browser localStorage fallback */
  if (!sparkConfig) {
    if (window.furnaceAPI && window.furnaceAPI.sparkReadConfig) {
      sparkConfig = await window.furnaceAPI.sparkReadConfig();
    } else {
      /* Browser fallback — use hardcoded config + localStorage token */
      sparkConfig = {
        supabaseUrl: 'https://jnwdscddyqujjikesdpb.supabase.co',
        supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2RzY2RkeXF1amppa2VzZHBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODgxOTEsImV4cCI6MjA4OTg2NDE5MX0.EQueTlfX30ULmpLDF7ijSv0xR0_baAT2kPjYoK_RnpA'
      };
    }
  }
  if (!sparkConfig) return null;
  var token;
  if (window.furnaceAPI && window.furnaceAPI.sparkGetToken) {
    token = await window.furnaceAPI.sparkGetToken();
  } else {
    /* Browser fallback — get token from localStorage, refresh if expired */
    token = await sparkBrowserGetToken();
  }
  if (!token) return null;
  var url = sparkConfig.supabaseUrl + '/rest/v1/' + table + (query ? '?' + query : '');
  var opts = {
    method: method || 'GET',
    headers: {
      'apikey': sparkConfig.supabaseAnonKey,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': method === 'PATCH' || method === 'POST' ? 'return=representation' : 'return=minimal',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    var resp = await fetch(url, opts);
    if (!resp.ok) { console.error('Spark fetch error', resp.status, await resp.text()); return null; }
    var text = await resp.text();
    return text ? JSON.parse(text) : true;
  } catch (err) { console.error('Spark fetch exception', err); return null; }
}

async function sparkFindBudgetForProject(projectCode) {
  if (!sparkAuth.connected) return null;
  if (!projectCode) return null;

  /* Always fetch the full budget map (it's fast and avoids stale cache issues) */
  var rows = await sparkFetch('budgets', 'select=id,name,status,projects(project_code)&visibility=eq.visible&order=updated_at.desc');
  if (rows && rows.length) {
    sparkBudgetMap = {}; /* clear and rebuild */
    for (var i = 0; i < rows.length; i++) {
      var b = rows[i];
      var code = b.projects && b.projects.project_code ? b.projects.project_code : null;
      if (code) {
        sparkBudgetMap[code] = b.id;
      }
    }
  }
  sparkBudgetMapFetched = true;

  /* Direct match on full code */
  if (sparkBudgetMap[projectCode]) return sparkBudgetMap[projectCode];

  /* Try prefix matching for codes like 320_10_XXX */
  var codeParts = projectCode.split('_');
  if (codeParts.length >= 3) {
    var prefix = codeParts[0] + '_' + codeParts[1];
    for (var key in sparkBudgetMap) {
      if (key && key.indexOf(prefix) === 0) {
        if (key.split('_')[2] === codeParts[2]) return sparkBudgetMap[key];
      }
    }
  }

  return null;
}
