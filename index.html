<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furnace — Forge Portfolio Tracker</title>
<style>
:root {
  --black: #000000; --canvas: #D6D1CA; --abyss: #184047;
  --ocean: #306D7C; --sand: #DAC38E; --honey: #E3A65E;
  --ember: #CE7338; --white: #FFFFFF; --light-gray: #F5F3F0;
  --mid-gray: #8A8580; --dark-canvas: #B8B3AC;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, 'TT Hoves Pro', sans-serif; background: var(--light-gray); color: var(--black); display:flex; min-height:100vh; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: var(--abyss); color: var(--white); position:fixed; top:0; left:0; bottom:0; overflow-y:auto; z-index:10; display:flex; flex-direction:column; }
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid rgba(255,255,255,.15); }
.sidebar-header h2 { font-size:16px; letter-spacing:1px; text-transform:uppercase; color:var(--sand); }
.sidebar-header p { font-size:11px; color:rgba(255,255,255,.5); margin-top:4px; }
.sidebar-nav { flex:1; padding:8px 0; }
.nav-item { padding:10px 16px; cursor:pointer; font-size:13px; transition:background .15s; display:flex; align-items:center; gap:8px; }
.nav-item:hover { background:rgba(255,255,255,.08); }
.nav-item.active { background:rgba(255,255,255,.12); border-left:3px solid var(--sand); }
.nav-item .icon { width:18px; text-align:center; flex-shrink:0; }
.client-group { margin:4px 0; }
.client-header { padding:8px 16px; cursor:pointer; font-size:13px; font-weight:700; color:var(--sand); display:flex; align-items:center; gap:8px; user-select:none; }
.client-header:hover { background:rgba(255,255,255,.05); }
.client-header .arrow { transition:transform .2s; font-size:10px; }
.client-header .arrow.open { transform:rotate(90deg); }
.client-projects { display:none; }
.client-projects.open { display:block; }
.client-projects .nav-item { padding-left:36px; font-size:12px; color:rgba(255,255,255,.75); line-height:1.3; }
.client-projects .nav-item.active { color:var(--white); }
.client-projects .nav-item .proj-code { font-size:9px; color:rgba(255,255,255,.35); display:block; margin-bottom:1px; font-family:monospace; letter-spacing:.3px; }
.client-projects .nav-item.active .proj-code { color:rgba(255,255,255,.55); }
.nav-divider { height:1px; background:rgba(255,255,255,.1); margin:8px 16px; }

/* Toggle */
.toggle-bar { padding:10px 16px; border-top:1px solid rgba(255,255,255,.15); }
.toggle-wrap { display:flex; background:rgba(0,0,0,.3); border-radius:6px; overflow:hidden; }
.toggle-btn { flex:1; padding:6px 0; text-align:center; font-size:11px; cursor:pointer; transition:background .15s, color .15s; color:rgba(255,255,255,.5); }
.toggle-btn.active { background:var(--ocean); color:var(--white); }

/* Main */
.main { margin-left: var(--sidebar-w); flex:1; padding:28px 32px; }
.page-title { font-size:22px; font-weight:700; color:var(--abyss); margin-bottom:4px; }
.page-subtitle { font-size:13px; color:var(--mid-gray); margin-bottom:24px; }

/* Stats Row */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px,1fr)); gap:14px; margin-bottom:28px; }
.stat-card { background:var(--white); border-radius:10px; padding:16px 18px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.stat-card .label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); margin-bottom:6px; }
.stat-card .value { font-size:22px; font-weight:700; color:var(--abyss); }
.stat-card .sub { font-size:11px; color:var(--mid-gray); margin-top:2px; }

/* Project Cards */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px; margin-bottom:28px; }
.project-card { background:var(--white); border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; transition:box-shadow .15s, transform .1s; border-left:4px solid var(--ocean); }
.project-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); transform:translateY(-1px); }
.project-card .card-client { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); margin-bottom:4px; }
.project-card .card-title { font-size:15px; font-weight:700; color:var(--abyss); margin-bottom:10px; }
.project-card .card-code { font-size:11px; color:var(--mid-gray); }
.progress-bar-wrap { background:var(--canvas); border-radius:6px; height:10px; overflow:hidden; margin:8px 0 6px; }
.progress-bar-fill { height:100%; border-radius:6px; transition:width .4s; }
.progress-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--mid-gray); }

/* Phase Table */
.phase-table { width:100%; border-collapse:collapse; margin:16px 0; }
.phase-table th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); padding:8px 12px; border-bottom:2px solid var(--canvas); }
.phase-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid var(--light-gray); }
.phase-table tr:last-child td { border-bottom:none; }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
.badge-completed { background:#E8F5E9; color:#2E7D32; }
.badge-active { background:#E3F2FD; color:#1565C0; }
.badge-future { background:#FFF3E0; color:#E65100; }
.badge-na { background:#F5F5F5; color:#9E9E9E; }
.badge-attention { background:#FFF0F0; color:#C62828; }
.badge-over { background:#FFEBEE; color:#B71C1C; }

/* Flagged */
.flagged-card { background:var(--white); border-radius:10px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:4px solid var(--ember); margin-bottom:12px; }
.flagged-card .flag-title { font-size:15px; font-weight:700; color:var(--abyss); }
.flagged-card .flag-reason { font-size:12px; color:var(--ember); margin-top:4px; }
.flagged-card .flag-client { font-size:11px; color:var(--mid-gray); margin-top:2px; }

/* Settings */
.settings-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }
.settings-card { background:var(--white); border-radius:10px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.settings-card h3 { font-size:14px; color:var(--abyss); margin-bottom:12px; }
.rate-input-wrap { display:flex; align-items:center; gap:8px; margin-top:8px; }
.rate-input-wrap label { font-size:12px; color:var(--mid-gray); min-width:40px; }
.rate-input { width:100px; padding:6px 10px; border:1px solid var(--canvas); border-radius:6px; font-size:14px; text-align:right; }
.rate-input:focus { outline:none; border-color:var(--ocean); }

/* Section headers */
.section-title { font-size:16px; font-weight:700; color:var(--abyss); margin:24px 0 12px; }

/* View toggle pill */
.view-toggle { display:inline-flex; background:var(--canvas); border-radius:20px; overflow:hidden; margin-left:12px; vertical-align:middle; }
.view-toggle-btn { padding:5px 14px; font-size:11px; cursor:pointer; transition:background .15s, color .15s; color:var(--mid-gray); font-weight:500; border:none; background:none; }
.view-toggle-btn.active { background:var(--ocean); color:var(--white); border-radius:20px; }

/* Cascade detail */
.cascade-detail { background:var(--light-gray); border-radius:8px; padding:14px; margin:12px 0; font-size:12px; color:var(--mid-gray); }
.cascade-detail strong { color:var(--abyss); }

/* Resource Allocation */
.res-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
.res-stat { background:var(--white); border:1px solid var(--canvas); border-radius:10px; padding:18px 20px; }
.res-stat .rs-label { font-size:10px; text-transform:uppercase; letter-spacing:1.2px; color:var(--mid-gray); margin-bottom:4px; }
.res-stat .rs-value { font-size:28px; font-weight:700; letter-spacing:-.5px; color:var(--abyss); }
.res-stat .rs-unit { font-size:12px; font-weight:400; color:var(--mid-gray); margin-left:2px; }
.res-stat .rs-detail { font-size:11px; color:var(--mid-gray); margin-top:3px; }
.week-timeline { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
.week-row { background:var(--white); border:1px solid var(--canvas); border-radius:6px; padding:12px 18px; display:grid; grid-template-columns:140px 70px 1fr; gap:16px; align-items:center; }
.week-row.current-week { border-color:var(--ocean); border-width:2px; }
.week-label { font-size:12px; font-weight:500; }
.week-label .wd { display:block; font-size:10px; color:var(--mid-gray); font-weight:400; margin-top:1px; }
.week-hrs { font-size:16px; font-weight:700; color:var(--abyss); text-align:right; font-variant-numeric:tabular-nums; }
.week-hrs .wu { font-size:10px; font-weight:400; color:var(--mid-gray); }
.week-bar-wrap { display:flex; flex-direction:column; }
.week-bar { height:10px; background:var(--light-gray); border-radius:5px; overflow:hidden; display:flex; }
.week-bar .wb-seg { height:100%; }
.week-bar .wb-seg:first-child { border-radius:5px 0 0 5px; }
.week-bar .wb-seg:last-child { border-radius:0 5px 5px 0; }
.week-bar .wb-seg:only-child { border-radius:5px; }
.week-people { display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
.week-person { font-size:10px; color:var(--mid-gray); display:flex; align-items:center; gap:3px; }
.week-person .pd { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.team-table { background:var(--white); border:1px solid var(--canvas); border-radius:10px; overflow:hidden; margin-bottom:20px; }
.team-row { display:grid; grid-template-columns:160px 80px 80px 1fr; padding:10px 18px; border-bottom:1px solid var(--light-gray); align-items:center; font-size:12px; }
.team-row:last-child { border-bottom:none; }
.team-row.team-hdr { background:var(--light-gray); font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--mid-gray); font-weight:500; }
.team-name { font-weight:500; display:flex; align-items:center; gap:6px; }
.team-total { font-weight:700; color:var(--abyss); text-align:right; font-variant-numeric:tabular-nums; }
.team-recent { color:var(--mid-gray); text-align:right; font-variant-numeric:tabular-nums; }
.tmb { height:5px; background:var(--light-gray); border-radius:3px; overflow:hidden; }
.tmb-fill { height:100%; border-radius:3px; }
.proj-callout { background:var(--abyss); color:var(--white); border-radius:10px; padding:22px 26px; margin-top:16px; }
.proj-callout .pc-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; opacity:.55; margin-bottom:8px; }
.proj-callout .pc-main { font-size:16px; font-weight:500; line-height:1.5; }
.proj-callout .pc-hl { color:var(--sand); font-weight:700; }
.proj-callout .pc-detail { font-size:12px; opacity:.55; margin-top:6px; line-height:1.5; }
/* Resource Analytics */
.rt-card { background:var(--white); border:1px solid var(--canvas); border-radius:10px; padding:20px 24px; margin-bottom:16px; }
.rt-card h3 { font-size:14px; color:var(--abyss); margin-bottom:14px; }
.rt-row { display:grid; grid-template-columns:150px 80px 80px 80px 1fr 60px; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--light-gray); font-size:13px; }
.rt-row.rt-proj { grid-template-columns:150px 90px 80px 80px 80px 1fr 60px; }
.rt-row:last-child { border-bottom:none; }
.rt-row.rt-hdr { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--mid-gray); font-weight:500; padding-bottom:10px; }
.rt-name { font-weight:600; color:var(--abyss); }
.rt-num { text-align:right; font-variant-numeric:tabular-nums; }
.rt-bar-wrap { height:14px; background:var(--light-gray); border-radius:7px; overflow:hidden; position:relative; }
.rt-bar-pred { height:100%; background:var(--canvas); border-radius:7px; position:absolute; top:0; left:0; opacity:.5; }
.rt-bar-act { height:100%; border-radius:7px; position:absolute; top:0; left:0; }
.rt-acc { font-weight:700; text-align:right; font-variant-numeric:tabular-nums; font-size:12px; }
.rt-acc.high { color:#2E7D32; }
.rt-acc.mid { color:var(--honey); }
.rt-acc.low { color:var(--ember); }
.rt-summary { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:24px; }
.rt-scard { background:var(--white); border:1px solid var(--canvas); border-radius:10px; padding:18px 22px; text-align:center; }
.rt-scard .rs-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--mid-gray); margin-bottom:6px; }
.rt-scard .rs-val { font-size:28px; font-weight:700; color:var(--abyss); }
.rt-scard .rs-sub { font-size:11px; color:var(--mid-gray); margin-top:4px; }
.rt-week-label { font-size:12px; color:var(--mid-gray); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
.rt-tabs { display:flex; gap:8px; margin-bottom:20px; }
.rt-tab { padding:6px 16px; border-radius:16px; border:1px solid var(--canvas); background:var(--white); cursor:pointer; font-size:12px; font-weight:500; }
.rt-tab.active { background:var(--abyss); color:var(--white); border-color:var(--abyss); }

/* Hour Type Breakdown */
.hour-type-section { margin-bottom:28px; }
.hour-type-cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:16px; }
.ht-card { background:var(--white); border-radius:10px; padding:16px 18px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-top:3px solid var(--mid-gray); }
.ht-card.ht-billable { border-top-color:#2E7D32; }
.ht-card.ht-bizdev { border-top-color:var(--ocean); }
.ht-card.ht-ops { border-top-color:var(--honey); }
.ht-card .ht-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); margin-bottom:6px; }
.ht-card .ht-value { font-size:22px; font-weight:700; color:var(--abyss); }
.ht-card .ht-sub { font-size:11px; color:var(--mid-gray); margin-top:2px; }
.ht-card .ht-count { font-size:11px; color:var(--mid-gray); margin-top:4px; }
.stacked-bar-container { background:var(--white); border-radius:10px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.stacked-bar-title { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); margin-bottom:10px; }
.stacked-bar { height:28px; border-radius:8px; overflow:hidden; display:flex; background:var(--light-gray); }
.sb-seg { height:100%; transition:width .4s; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; min-width:0; overflow:hidden; }
.sb-seg.sb-billable { background:#2E7D32; }
.sb-seg.sb-bizdev { background:var(--ocean); }
.sb-seg.sb-ops { background:var(--honey); }
.stacked-bar-legend { display:flex; gap:20px; margin-top:10px; }
.sb-legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--mid-gray); }
.sb-legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.sb-legend-dot.sb-billable { background:#2E7D32; }
.sb-legend-dot.sb-bizdev { background:var(--ocean); }
.sb-legend-dot.sb-ops { background:var(--honey); }
.badge-billable { background:#E8F5E9; color:#2E7D32; }
.badge-bizdev { background:#E3F2FD; color:var(--ocean); }
.badge-ops { background:#FFF3E0; color:var(--honey); }

/* Snapshot Financials */
.snapshot-banner { background:var(--abyss); color:var(--white); border-radius:10px; padding:18px 22px; margin-bottom:20px; }
.snapshot-banner .snap-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.snapshot-banner .snap-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; opacity:.55; }
.snapshot-banner .snap-version { font-size:10px; opacity:.45; }
.snap-financials { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; }
.snap-fin-item { text-align:center; }
.snap-fin-item .sf-label { font-size:9px; text-transform:uppercase; letter-spacing:.8px; opacity:.5; margin-bottom:4px; }
.snap-fin-item .sf-value { font-size:20px; font-weight:700; }
.snap-fin-item .sf-sub { font-size:10px; opacity:.45; margin-top:2px; }
.snap-fin-item .sf-green { color:#81C784; }
.snap-fin-item .sf-gold { color:var(--sand); }

/* Labor vs OOP bar */
.labor-oop-bar { margin-top:14px; }
.labor-oop-bar .lob-title { font-size:9px; text-transform:uppercase; letter-spacing:.8px; opacity:.5; margin-bottom:6px; }
.lob-bar { height:20px; border-radius:6px; overflow:hidden; display:flex; background:rgba(255,255,255,.1); }
.lob-seg { height:100%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
.lob-seg.lob-labor { background:var(--ocean); }
.lob-seg.lob-oop { background:var(--sand); color:var(--abyss); }
.lob-legend { display:flex; gap:16px; margin-top:6px; }
.lob-legend-item { font-size:10px; opacity:.6; display:flex; align-items:center; gap:4px; }
.lob-legend-dot { width:8px; height:8px; border-radius:2px; }

/* Per-person phase table */
.person-phase-section { margin-top:24px; }
.pp-phase-block { background:var(--white); border:1px solid var(--canvas); border-radius:10px; padding:16px 20px; margin-bottom:12px; }
.pp-phase-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; cursor:pointer; }
.pp-phase-title { font-size:14px; font-weight:700; color:var(--abyss); }
.pp-phase-totals { font-size:12px; color:var(--mid-gray); }
.pp-row { display:grid; grid-template-columns:24px 1fr 70px 70px 70px 100px; gap:8px; align-items:center; padding:5px 0; border-bottom:1px solid var(--light-gray); font-size:12px; }
.pp-row:last-child { border-bottom:none; }
.pp-row.pp-hdr { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--mid-gray); font-weight:500; border-bottom:2px solid var(--canvas); padding-bottom:8px; }
.pp-dept-dot { width:8px; height:8px; border-radius:50%; }
.pp-name { font-weight:500; color:var(--abyss); }
.pp-num { text-align:right; font-variant-numeric:tabular-nums; }
.pp-bar-wrap { height:6px; background:var(--light-gray); border-radius:3px; overflow:hidden; }
.pp-bar-fill { height:100%; border-radius:3px; }

/* ── Spark Budget Editor ── */
.spark-select { width:100%; max-width:480px; padding:10px 14px; border:1px solid var(--canvas); border-radius:8px; font-size:14px; font-family:inherit; background:var(--white); color:var(--abyss); cursor:pointer; appearance:none; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%238A8580'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 14px center; }
.spark-select:focus { outline:none; border-color:var(--ocean); }
.spark-phase-tabs { display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
.spark-phase-tab { padding:6px 16px; border-radius:16px; border:1px solid var(--canvas); background:var(--white); cursor:pointer; font-size:12px; font-weight:500; color:var(--mid-gray); transition:background .15s, color .15s; }
.spark-phase-tab.active { background:var(--abyss); color:var(--white); border-color:var(--abyss); }
.spark-phase-tab:hover:not(.active) { background:var(--light-gray); }
.spark-labor-table { width:100%; border-collapse:collapse; }
.spark-labor-table th { text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--mid-gray); padding:8px 10px; border-bottom:2px solid var(--canvas); font-weight:500; }
.spark-labor-table th.num { text-align:right; }
.spark-dept-row td { padding:10px 10px; font-size:13px; font-weight:700; border-bottom:1px solid var(--canvas); }
.spark-dept-row .spark-dept-label { display:flex; align-items:center; gap:8px; }
.spark-dept-bar { width:4px; height:18px; border-radius:2px; flex-shrink:0; }
.spark-person-row td { padding:7px 10px; font-size:13px; border-bottom:1px solid var(--light-gray); }
.spark-person-row td.num { text-align:right; font-variant-numeric:tabular-nums; }
.spark-person-row:last-child td { border-bottom:none; }
.spark-input { width:72px; padding:5px 8px; border:1px solid var(--canvas); border-radius:5px; font-size:13px; text-align:right; font-family:inherit; font-variant-numeric:tabular-nums; background:var(--white); color:var(--abyss); }
.spark-input:focus { outline:none; border-color:var(--ocean); box-shadow:0 0 0 2px rgba(48,109,124,.15); }
.spark-oop-wrap { margin-bottom:14px; }
.spark-oop-dept-header { background:var(--abyss); color:var(--white); border-radius:8px 8px 0 0; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; }
.spark-oop-dept-header:hover { opacity:.9; }
.spark-oop-dept-header .dept-title { font-size:14px; font-weight:700; }
.spark-oop-dept-header .dept-meta { font-size:11px; opacity:.55; margin-left:8px; font-weight:400; }
.spark-oop-dept-header .dept-total { font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
.spark-oop-dept-body { background:var(--white); border:1px solid var(--canvas); border-top:none; border-radius:0 0 8px 8px; padding:0 16px 12px; }

.spark-oop-cat-row .cat-total { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--abyss); }
.spark-oop-line-item { display:grid; gap:8px; align-items:center; padding:6px 4px 6px 24px; border-bottom:1px solid var(--light-gray); font-size:13px; }

.spark-oop-line-item .num { text-align:right; font-variant-numeric:tabular-nums; }
.spark-oop-subtotal { display:flex; justify-content:space-between; align-items:center; padding:10px 4px 4px; border-top:2px solid var(--canvas); margin-top:8px; font-size:13px; color:var(--mid-gray); }
.spark-oop-markup-row { display:flex; justify-content:space-between; align-items:center; padding:4px 4px; font-size:12px; color:var(--mid-gray); }

.spark-oop-dept-total { display:flex; justify-content:space-between; align-items:center; padding:6px 4px 2px; font-size:14px; font-weight:700; color:var(--abyss); }
.spark-oop-grand-total { background:var(--abyss); color:var(--white); border-radius:8px; padding:14px 20px; margin-top:16px; display:flex; justify-content:space-between; align-items:center; font-size:16px; font-weight:700; }
/* grid column templates per section type */

/* 3-tier OOP grid — all columns in ONE horizontal row */

.spark-oop-col-hdr-3tier { display:flex; gap:2px; align-items:center; padding:4px 4px 6px 24px; border-bottom:2px solid var(--canvas); font-size:9px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); font-weight:600; }
.spark-oop-col-hdr-3tier > div { flex:0 0 56px; text-align:center; }

.spark-oop-col-hdr-3tier > div:last-child { flex:1; text-align:left; }
.spark-oop-col-hdr-3tier .adj { color:#F57F17; }

.spark-oop-line-item-3tier { display:flex; gap:2px; align-items:center; padding:4px 4px 4px 24px; border-bottom:1px solid var(--light-gray); font-size:12px; }
.spark-oop-line-item-3tier > div { flex:0 0 56px; text-align:center; }
.spark-oop-line-item-3tier > div:first-child { flex:1.4; text-align:left; }
.spark-oop-line-item-3tier > div:last-child { flex:1; text-align:left; }

.spark-oop-line-item-3tier .act-input { background:rgba(129,199,132,.08); border-color:rgba(129,199,132,.25); }
.spark-oop-line-item-3tier .act-input:focus { border-color:#2E7D32; }
.spark-summary { background:var(--abyss); color:var(--white); border-radius:10px; padding:18px 24px; margin-top:24px; display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:16px; }

.spark-summary-item .ss-value { font-size:20px; font-weight:700; }
.spark-summary-item .ss-sub { font-size:10px; opacity:.45; margin-top:2px; }
.spark-saving { display:inline-block; font-size:11px; color:var(--ocean); font-style:italic; margin-left:12px; opacity:0; transition:opacity .2s; }
.spark-saving.visible { opacity:1; }
.spark-overview-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; margin-top:12px; }

.spark-status-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
.spark-status-badge.active { background:rgba(129,199,132,.2); color:#81C784; }
.spark-status-badge.proposed { background:rgba(218,195,142,.2); color:var(--sand); }
.spark-status-badge.closeout { background:rgba(206,115,56,.2); color:var(--ember); }

/* Manage Allocations Page */
.alloc-layout { display:grid; grid-template-columns:220px 1fr 340px; gap:0; height:calc(100vh - 120px); }

.alloc-proj-sidebar .aps-search { width:calc(100% - 20px); margin:8px 10px; padding:7px 10px; border:1px solid var(--canvas); border-radius:6px; font-size:12px; font-family:inherit; outline:none; background:var(--light-gray); }
.alloc-proj-sidebar .aps-search:focus { border-color:var(--ocean); background:var(--white); }
.aps-client { padding:6px 14px 2px; font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:var(--mid-gray); font-weight:600; margin-top:4px; }
.aps-item { padding:7px 14px; font-size:12px; cursor:pointer; transition:background .1s; display:flex; align-items:center; gap:6px; border-left:3px solid transparent; }
.aps-item:hover { background:var(--light-gray); }
.aps-item.active { background:rgba(48,109,124,.08); border-left-color:var(--ocean); font-weight:600; }
.aps-item .aps-code { font-size:9px; color:var(--mid-gray); font-family:monospace; }
.aps-item .aps-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* Calendar Grid */
.alloc-grid-area { display:flex; flex-direction:column; overflow:hidden; }
.alloc-toolbar { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--canvas); background:var(--white); flex-shrink:0; }
.alloc-toolbar button { background:var(--white); border:1px solid var(--canvas); border-radius:6px; padding:5px 12px; cursor:pointer; font-size:12px; color:var(--abyss); font-family:inherit; }
.alloc-toolbar button:hover { background:var(--light-gray); }
.alloc-toolbar .at-label { font-size:14px; font-weight:700; color:var(--abyss); min-width:200px; text-align:center; }
.alloc-view-toggle { display:inline-flex; background:var(--canvas); border-radius:14px; overflow:hidden; margin-left:auto; }
.alloc-view-toggle button { border:none; padding:5px 14px; font-size:11px; cursor:pointer; background:none; color:var(--mid-gray); font-weight:500; font-family:inherit; }
.alloc-view-toggle button.active { background:var(--ocean); color:var(--white); border-radius:14px; }
.alloc-save-status { font-size:11px; color:var(--mid-gray); font-style:italic; }

.alloc-grid-scroll { flex:1; overflow:auto; background:var(--light-gray); }
.alloc-grid { display:grid; min-width:100%; }
.ag-corner { background:var(--white); border-bottom:2px solid var(--canvas); border-right:1px solid var(--canvas); padding:8px 12px; position:sticky; left:0; top:0; z-index:3; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); }
.ag-col-hdr { background:var(--white); border-bottom:2px solid var(--canvas); padding:8px 6px; text-align:center; font-size:11px; font-weight:600; color:var(--abyss); position:sticky; top:0; z-index:2; }
.ag-col-hdr .ag-day { font-size:9px; color:var(--mid-gray); font-weight:400; display:block; }
.ag-row-hdr { background:var(--white); border-right:1px solid var(--canvas); border-bottom:1px solid var(--light-gray); padding:6px 12px; position:sticky; left:0; z-index:1; font-size:12px; font-weight:500; color:var(--abyss); display:flex; align-items:center; gap:6px; min-width:150px; }
.ag-row-hdr .ag-person-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ag-row-hdr .ag-person-total { font-size:10px; color:var(--mid-gray); margin-left:auto; font-weight:400; font-variant-numeric:tabular-nums; }
.ag-cell { border-bottom:1px solid var(--light-gray); border-right:1px solid rgba(0,0,0,.04); padding:4px; min-height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .1s; }
.ag-cell:hover { background:rgba(48,109,124,.06); }
.ag-cell-filled { background:rgba(48,109,124,.1); }
.ag-cell-val { background:var(--ocean); color:var(--white); border-radius:4px; padding:2px 8px; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; min-width:32px; text-align:center; cursor:pointer; }
.ag-cell-val:hover { background:var(--abyss); }
.ag-cell-empty { width:100%; height:100%; border-radius:4px; border:1px dashed transparent; }

.ag-cell-input { width:50px; padding:3px 6px; border:2px solid var(--ocean); border-radius:4px; font-size:12px; font-weight:700; text-align:center; outline:none; font-family:inherit; }

/* Capacity Panel */
.cap-panel { overflow-y:auto; background:var(--white); border-left:1px solid var(--canvas); padding:16px; }
.cap-panel h3 { font-size:13px; color:var(--abyss); margin-bottom:4px; }
.cap-panel .cap-sub { font-size:10px; color:var(--mid-gray); margin-bottom:14px; }

.cap-person-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.cap-person-name { font-size:11px; font-weight:600; color:var(--abyss); display:flex; align-items:center; gap:5px; }
.cap-person-name .cp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cap-person-hrs { font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; }
.cap-bar { height:14px; background:var(--light-gray); border-radius:3px; overflow:hidden; display:flex; }

/* ── Resource Sub-Tab Toggle ── */
.alloc-tab-bar { display:flex; gap:0; margin-bottom:0; background:var(--white); border-bottom:2px solid var(--canvas); padding:0 18px; flex-shrink:0; }
.alloc-tab-btn { padding:10px 20px; font-size:13px; font-weight:600; color:var(--mid-gray); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-2px; font-family:inherit; transition:color .15s, border-color .15s; }
.alloc-tab-btn:hover { color:var(--abyss); }
.alloc-tab-btn.active { color:var(--ocean); border-bottom-color:var(--ocean); }

/* ── OOP Resource Planner ── */
.oop-planner-layout { display:grid; grid-template-columns:220px 1fr; gap:0; height:calc(100vh - 160px); }
.oop-planner-grid-area { display:flex; flex-direction:column; overflow:hidden; }
.oop-planner-toolbar { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--canvas); background:var(--white); flex-shrink:0; }
.oop-planner-toolbar button { background:var(--white); border:1px solid var(--canvas); border-radius:6px; padding:5px 12px; cursor:pointer; font-size:12px; color:var(--abyss); font-family:inherit; }
.oop-planner-toolbar button:hover { background:var(--light-gray); }
.oop-planner-toolbar .at-label { font-size:14px; font-weight:700; color:var(--abyss); min-width:200px; text-align:center; }
.oop-planner-scroll { flex:1; overflow:auto; background:var(--light-gray); }
.oop-grid { display:grid; min-width:100%; }
.oop-corner { background:var(--white); border-bottom:2px solid var(--canvas); border-right:1px solid var(--canvas); padding:8px 12px; position:sticky; left:0; top:0; z-index:3; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--mid-gray); }
.oop-col-hdr { background:var(--white); border-bottom:2px solid var(--canvas); padding:8px 6px; text-align:center; font-size:11px; font-weight:600; color:var(--abyss); position:sticky; top:0; z-index:2; }
.oop-col-hdr .oop-day { font-size:9px; color:var(--mid-gray); font-weight:400; display:block; }
.oop-row-hdr { background:var(--white); border-right:1px solid var(--canvas); border-bottom:1px solid var(--light-gray); padding:6px 12px; position:sticky; left:0; z-index:1; font-size:11px; font-weight:500; color:var(--abyss); display:flex; align-items:center; gap:6px; min-width:150px; }
.oop-row-hdr .oop-proj-code { font-size:9px; color:var(--mid-gray); font-family:monospace; }
.oop-row-hdr .oop-row-total { font-size:10px; color:var(--mid-gray); margin-left:auto; font-weight:400; font-variant-numeric:tabular-nums; }
.oop-cell { border-bottom:1px solid var(--light-gray); border-right:1px solid rgba(0,0,0,.04); padding:4px; min-height:44px; cursor:pointer; transition:background .1s; position:relative; }
.oop-cell:hover { background:rgba(48,109,124,.06); }
.oop-cell-empty { width:100%; height:100%; min-height:36px; border-radius:4px; border:1px dashed transparent; display:flex; align-items:center; justify-content:center; }
.oop-cell:hover .oop-cell-empty { border-color:var(--canvas); }
.oop-chip { border-radius:5px; padding:3px 8px; font-size:11px; font-weight:600; margin:2px 0; display:flex; justify-content:space-between; align-items:center; gap:4px; cursor:pointer; }
.oop-chip.scheduled { background:rgba(245,127,23,.15); color:#F57F17; }
.oop-chip.paid { background:rgba(46,125,50,.15); color:#2E7D32; }
.oop-chip .oop-chip-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100px; font-size:10px; }
.oop-chip .oop-chip-amt { font-variant-numeric:tabular-nums; font-size:11px; }
.oop-total-cell { background:var(--white); border-bottom:1px solid var(--light-gray); padding:6px 8px; text-align:right; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--abyss); }
.oop-grand-total { background:var(--abyss); color:var(--white); padding:6px 8px; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; text-align:right; }
.oop-footer { display:flex; justify-content:space-between; padding:12px 18px; background:var(--white); border-top:1px solid var(--canvas); font-size:12px; color:var(--abyss); }
.oop-footer .oop-stat { font-weight:600; }
.oop-footer .oop-stat-label { font-size:10px; color:var(--mid-gray); text-transform:uppercase; letter-spacing:.5px; }

/* OOP Modal */
.oop-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:9999; display:flex; align-items:center; justify-content:center; }
.oop-modal { background:var(--white); border-radius:12px; padding:24px; width:380px; box-shadow:0 8px 32px rgba(0,0,0,.2); }
.oop-modal h3 { font-size:15px; margin:0 0 16px; color:var(--abyss); }
.oop-modal label { display:block; font-size:11px; font-weight:600; color:var(--mid-gray); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; margin-top:12px; }
.oop-modal input, .oop-modal select, .oop-modal textarea { width:100%; padding:8px 10px; border:1px solid var(--canvas); border-radius:6px; font-size:13px; font-family:inherit; outline:none; box-sizing:border-box; }
.oop-modal input:focus, .oop-modal select:focus, .oop-modal textarea:focus { border-color:var(--ocean); }
.oop-modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
.oop-modal-actions button { padding:8px 18px; border-radius:6px; border:1px solid var(--canvas); background:var(--white); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.oop-modal-actions button.primary { background:var(--ocean); color:var(--white); border-color:var(--ocean); }
.oop-modal-actions button.primary:hover { background:var(--abyss); }
.oop-modal-actions button.danger { color:var(--ember); border-color:var(--ember); }
.oop-modal-actions button.danger:hover { background:var(--ember); color:var(--white); }

/* ── DARK MODE TOGGLE ── */
.dark-toggle { display:flex; align-items:center; gap:8px; padding:10px 16px; cursor:pointer; font-size:12px; color:rgba(255,255,255,.6); transition:color .15s; user-select:none; }
.dark-toggle:hover { color:rgba(255,255,255,.9); }
.dark-toggle .dt-switch { width:36px; height:20px; border-radius:10px; background:rgba(255,255,255,.2); position:relative; transition:background .2s; }
.dark-toggle .dt-knob { width:16px; height:16px; border-radius:50%; background:var(--white); position:absolute; top:2px; left:2px; transition:left .2s; }
html.dark .dark-toggle .dt-switch { background:var(--ocean); }
html.dark .dark-toggle .dt-knob { left:18px; }

/* ── DARK MODE ── */
html.dark { --dm-bg: #1a1a1a; --dm-surface: #242424; --dm-surface2: #2e2e2e; --dm-border: #3a3a3a; --dm-text: #e0e0e0; --dm-text-muted: #888; }

html.dark .sidebar { background:#0f2a30; }

html.dark .flagged-card { background:var(--dm-surface); box-shadow:0 1px 4px rgba(0,0,0,.3); }
.oop-checklist-card { background:var(--white); }
html.dark .oop-checklist-card { background:var(--dm-surface); box-shadow:0 1px 4px rgba(0,0,0,.3); color:var(--dm-text); }
html.dark .page-title { color:var(--dm-text); }
html.dark .page-subtitle { color:var(--dm-text-muted); }
html.dark .section-title { color:var(--dm-text); }
html.dark .toggle-btn { background:var(--dm-surface2); color:var(--dm-text-muted); border-color:var(--dm-border); }
html.dark .toggle-btn.active { background:var(--ocean); color:var(--white); }
html.dark .view-toggle-btn { color:var(--dm-text-muted); }

html.dark .cascade-detail { background:var(--dm-surface2); color:var(--dm-text-muted); }
html.dark .progress-bar { background:var(--dm-surface2); }
html.dark .progress-meta { color:var(--dm-text-muted); }

<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>FURNACE</h2>
    <p>Forge Portfolio Tracker</p>
    <p style="font-size:9px;color:rgba(255,255,255,.45);margin-top:3px">v0.21.0 · <span style="color:rgba(255,255,255,.6);font-weight:600">Anchor</span> · Mar 27, 2026</p>
    <p id="lastUpdated" style="font-size:9px;color:rgba(255,255,255,.35);margin-top:2px"></p>
  </div>
  <div class="sidebar-nav" id="sidebarNav"></div>
  <div class="dark-toggle" onclick="toggleDarkMode()">
    <div class="dt-switch"><div class="dt-knob"></div></div>
    <span>Dark Mode</span>
  </div>
</div>

<div class="main">
  <div id="globalToolbar" style="display:flex;align-items:center;gap:12px;margin-bottom:0px;padding:10px 0 14px;border-bottom:1px solid var(--light-gray)">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:11px;font-weight:600;color:var(--mid-gray);text-transform:uppercase;letter-spacing:.5px">Date Range</label>
      <select id="dateFilterSelect" onchange="onDateFilterChange(this.value)" style="font-size:12px;padding:5px 10px;border:1px solid var(--canvas);border-radius:6px;background:var(--white);color:var(--abyss);cursor:pointer;font-family:inherit">
        <option value="all">All Time</option>
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="current_week">Current Week</option>
        <option value="last_week">Last Week</option>
        <option value="current_month">Current Month</option>
        <option value="last_month">Last Month</option>
        <option value="current_year">Current Year</option>
        <option value="last_year">Last Year</option>
        <option value="custom">Custom Range...</option>
      </select>
    </div>
    <div id="customDateRange" style="display:none;align-items:center;gap:6px">
      <input type="date" id="dateFilterStart" onchange="applyCustomDateRange()" style="font-size:12px;padding:4px 8px;border:1px solid var(--canvas);border-radius:6px;font-family:inherit">
      <span style="font-size:11px;color:var(--mid-gray)">to</span>
      <input type="date" id="dateFilterEnd" onchange="applyCustomDateRange()" style="font-size:12px;padding:4px 8px;border:1px solid var(--canvas);border-radius:6px;font-family:inherit">
    </div>
    <div id="dateFilterLabel" style="font-size:11px;color:var(--mid-gray);font-style:italic"></div>
  </div>
  <div id="mainContent"></div>
</div>

<script>
/* ── STATE ── */
let currentView = 'master';
let displayUnit = 'hours';
let openClients = {};
let showFinalized = false;
let showInactiveClients = false;

/* ── GLOBAL DATE FILTER ── */
var globalDateFilter = 'all'; /* all | today | yesterday | current_week | last_week | current_month | last_month | current_year | last_year | custom */
var globalDateStart = null; /* Date object or null */
var globalDateEnd = null;   /* Date object or null */
var masterSortCol = 'name'; /* name | client | budget | labor | oop | profit | margin */
var masterSortDir = 'asc';  /* asc | desc */
function toggleMasterSort(col) {
  if (masterSortCol === col) { masterSortDir = masterSortDir === 'asc' ? 'desc' : 'asc'; }
  else { masterSortCol = col; masterSortDir = col === 'name' || col === 'client' ? 'asc' : 'desc'; }
  navigate(currentView);
}

function getToday() {
  var d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function getDateRange(filter) {
  /* Returns {start: Date, end: Date} or null for 'all' */
  if (filter === 'all') return null;
  var today = getToday();
  var y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
  var dow = today.getDay(); /* 0=Sun */
  switch(filter) {
    case 'today':
      return {start: today, end: today};
    case 'yesterday':
      var yd = new Date(y, m, d - 1);
      return {start: yd, end: yd};
    case 'current_week':
      var sun = new Date(y, m, d - dow);
      var sat = new Date(y, m, d - dow + 6);
      return {start: sun, end: sat};
    case 'last_week':
      var lsun = new Date(y, m, d - dow - 7);
      var lsat = new Date(y, m, d - dow - 1);
      return {start: lsun, end: lsat};
    case 'current_month':
      return {start: new Date(y, m, 1), end: new Date(y, m + 1, 0)};
    case 'last_month':
      return {start: new Date(y, m - 1, 1), end: new Date(y, m, 0)};
    case 'current_year':
      return {start: new Date(y, 0, 1), end: new Date(y, 11, 31)};
    case 'last_year':
      return {start: new Date(y - 1, 0, 1), end: new Date(y - 1, 11, 31)};
    case 'custom':
      if (globalDateStart && globalDateEnd) return {start: globalDateStart, end: globalDateEnd};
      return null;
    default:
      return null;
  }
}

function weekOverlapsRange(weekSunday, range) {
  /* Check if a week (Sun-Sat) overlaps with the date range */
  if (!range) return true;
  var wStart = new Date(weekSunday + 'T00:00:00');
  var wEnd = new Date(wStart);
  wEnd.setDate(wEnd.getDate() + 6);
  return wStart <= range.end && wEnd >= range.start;
}

function getFilteredWeekIndices() {
  /* Returns indices of RT_WEEKS within the current date filter */
  var range = getDateRange(globalDateFilter);
  if (!range) {
    var all = [];
    for (var i = 0; i < RT_WEEKS.length; i++) all.push(i);
    return all;
  }
  var indices = [];
  for (var i = 0; i < RT_WEEKS.length; i++) {
    if (weekOverlapsRange(RT_WEEKS[i].sunday, range)) indices.push(i);
  }
  return indices;
}

function getFilteredRTData() {
  /* Returns a single aggregated week object for the current date filter */
  var indices = getFilteredWeekIndices();
  if (indices.length === 0) return {label: 'No data', sunday: '', people: {}};
  if (indices.length === 1) {
    var wk = RT_WEEKS[indices[0]];
    return {label: wk.label, sunday: wk.sunday, people: wk.people};
  }
  return rtAggregateWeeks(indices);
}

function getFilteredProjectHours(projectName) {
  /* Sum actual hours for a project across filtered weeks, respecting aliases */
  var range = getDateRange(globalDateFilter);
  if (!range) return null; /* null means "use default phase data" */
  var total = 0;
  var indices = getFilteredWeekIndices();
  var aliasTarget = RT_BUDGET_ALIASES[projectName] || projectName;
  for (var w = 0; w < indices.length; w++) {
    var wk = RT_WEEKS[indices[w]];
    for (var pn in wk.people) {
      var projs = wk.people[pn].projects || {};
      for (var pk in projs) {
        var resolved = RT_BUDGET_ALIASES[pk] || pk;
        if (resolved === projectName || resolved === aliasTarget || pk === projectName) {
          total += projs[pk].a || 0;
        }
      }
    }
  }
  return total;
}

function filteredProjectSpent(proj) {
  /* Returns spent hours: filtered from RT if date filter active, otherwise from phases */
  if (globalDateFilter === 'all') return projectSpent(proj);

  /* If Supabase data loaded, filter actuals by date range */
  if (SUPA_LOADED && SUPA_ACTUALS_ALL.length > 0) {
    var range = getDateRange(globalDateFilter);
    if (!range) return projectSpent(proj);
    var start = range.start.toISOString().slice(0, 10);
    var end = range.end.toISOString().slice(0, 10);
    var code = proj.code;
    var total = 0;
    for (var i = 0; i < SUPA_ACTUALS_ALL.length; i++) {
      var a = SUPA_ACTUALS_ALL[i];
      if (a.project_code === code && a.work_date >= start && a.work_date <= end) {
        total += a.hours || 0;
      }
    }
    return total;
  }

  /* Fallback to RT data */
  var rtHours = getFilteredProjectHours(proj.name);
  return rtHours !== null ? rtHours : 0;
}

function onDateFilterChange(val) {
  globalDateFilter = val;
  var customEl = document.getElementById('customDateRange');
  if (val === 'custom') {
    customEl.style.display = 'flex';
    /* Set defaults to current month if not set */
    var startInput = document.getElementById('dateFilterStart');
    var endInput = document.getElementById('dateFilterEnd');
    if (!startInput.value) {
      var today = getToday();
      startInput.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-01';
      endInput.value = today.toISOString().split('T')[0];
      globalDateStart = new Date(startInput.value + 'T00:00:00');
      globalDateEnd = new Date(endInput.value + 'T00:00:00');
    }
  } else {
    customEl.style.display = 'none';
  }
  updateDateFilterLabel();
  navigate(currentView);
}

function applyCustomDateRange() {
  var startVal = document.getElementById('dateFilterStart').value;
  var endVal = document.getElementById('dateFilterEnd').value;
  if (startVal && endVal) {
    globalDateStart = new Date(startVal + 'T00:00:00');
    globalDateEnd = new Date(endVal + 'T00:00:00');
    updateDateFilterLabel();
    navigate(currentView);
  }
}

function updateDateFilterLabel() {
  var label = document.getElementById('dateFilterLabel');
  if (!label) return;
  var range = getDateRange(globalDateFilter);
  if (!range) { label.textContent = ''; return; }
  var indices = getFilteredWeekIndices();
  var opts = {month:'short', day:'numeric', year:'numeric'};
  label.textContent = range.start.toLocaleDateString('en-US', opts) + ' – ' + range.end.toLocaleDateString('en-US', opts) + ' (' + indices.length + ' week' + (indices.length !== 1 ? 's' : '') + ')';
}

/* ── SETTINGS (localStorage) ── */
let clientRates = {};
try { clientRates = JSON.parse(localStorage.getItem('forgeRates') || '{}'); } catch(e) {}
function getRate(clientId) { return clientRates[clientId] || 0; }
function saveRates() { try { localStorage.setItem('forgeRates', JSON.stringify(clientRates)); } catch(e) {} }

/* ── DATA (loaded from data/portfolio.json) ── */
var CLIENTS = [];
var FLAGGED_NO_STRUCTURE = [];
var FLAGGED_DATA_MISMATCH = [];
var PC = {};
var RES = {};
var METADATA = {};

/* ── SUPABASE DATA (3 sources of truth) ── */
var SUPA_BUDGETS = {};   // project_code -> {budget object with labor entries, oop entries}
var SUPA_ACTUALS = {};   // project_code -> {totalHours, phases: {phase_key: hours}, people: {name: hours}, byDate: {date: hours}}
var SUPA_ACTUALS_ALL = []; // raw labor_actuals array
var SUPA_LOADED = false;
var FURNACE_TEAM_MEMBERS = [];

/* ── NATIVE ALLOCATION DATA ── */
var ALLOCATIONS = { version: 1, allocations: [], team: [], weeklyCapacity: 40 };
var ACTUALS = { version: 1, weeks: [], lastImport: null };
var allocWeekOf = null; /* currently selected week (Monday ISO string) */
var allocProject = ''; /* currently selected project for entry */
var allocPendingRows = []; /* in-progress person rows before save */
var allocSaveTimer = null;
var allocResourceTab = 'hours';
var oopViewMode = 'week';
var oopDayOffset = 0; /* 'hours' or 'oop' */

/* ── OOP SCHEDULE DATA ── */
var OOP_SCHEDULE = { version: 1, entries: [] };
var oopProjSearch = '';
var oopSelectedProject = '';
var oopSaveTimer = null;
var _oopEntryLookup = {}; /* temp lookup for modal editing */

/* ── RESOURCE HELPERS ── */
function getWeekMon(ds) {
  /* Now returns Sunday of the week (Sun-Sat boundaries) */
  var d = new Date(ds+'T00:00:00'); var day = d.getDay();
  d.setDate(d.getDate() - day); return d.toISOString().slice(0,10);
}
function getWeekFri(sun) { /* Returns Saturday from Sunday */ var d = new Date(sun+'T00:00:00'); d.setDate(d.getDate()+6); return d.toISOString().slice(0,10); }
function getSaturday(sun) { var d = new Date(sun+'T00:00:00'); d.setDate(d.getDate()+6); return d.toISOString().slice(0,10); }
function fmtDateShort(ds) { var d = new Date(ds+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function getISOWeek(ds) { var d = new Date(ds+'T00:00:00'); var thu = new Date(d); thu.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7)); var jan4 = new Date(thu.getFullYear(), 0, 4); return 1 + Math.round(((thu - jan4) / 86400000 - 3 + ((jan4.getDay() + 6) % 7)) / 7); }

function expandAlloc(a) {
  var days = [];
  var s = new Date(a.s+'T00:00:00'), e = new Date(a.e+'T00:00:00');
  for (var d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    var dow = d.getDay();
    if (dow >= 1 && dow <= 5) days.push({person:a.p, date:d.toISOString().slice(0,10), hours:a.h});
  }
  return days;
}

function findProjectName(projId) {
  for (var i = 0; i < CLIENTS.length; i++) {
    for (var j = 0; j < CLIENTS[i].projects.length; j++) {
      if (CLIENTS[i].projects[j].id === projId) return CLIENTS[i].projects[j];
    }
  }
  return null;
}

function getAllocationsForProject(projId) {
  if (!ALLOCATIONS || !ALLOCATIONS.allocations || !ALLOCATIONS.allocations.length) return [];
  var proj = findProjectName(projId);
  if (!proj) return [];
  var projName = proj.name || '';
  var forecastName = proj.forecastName || '';
  var supaName = (proj._supabudget && proj._supabudget.name) ? proj._supabudget.name : '';
  var allAllocs = ALLOCATIONS.allocations;
  var matched = [];
  for (var i = 0; i < allAllocs.length; i++) {
    var a = allAllocs[i];
    var ap = a.project || '';
    if (!ap) continue;
    /* Exact match on project name, forecastName, or supabudget name */
    if (ap === projName || (forecastName && ap === forecastName) || (supaName && ap === supaName)) {
      matched.push(a);
    } else if (projName && (ap.indexOf(projName) >= 0 || projName.indexOf(ap) >= 0)) {
      /* Partial / contains match */
      matched.push(a);
    }
  }
  return matched;
}

function buildWeeks(projId) {
  var allocs = RES[projId] || [];
  var daily = [];
  for (var i = 0; i < allocs.length; i++) { daily = daily.concat(expandAlloc(allocs[i])); }

  /* Also merge from ALLOCATIONS (per-day format) */
  var nativeAllocs = getAllocationsForProject(projId);
  for (var i = 0; i < nativeAllocs.length; i++) {
    var a = nativeAllocs[i];
    if (a.date && a.hoursPerDay) {
      daily.push({person: a.person || 'Unknown', date: a.date, hours: a.hoursPerDay});
    }
  }

  if (!daily.length) return [];
  var wm = {};
  for (var i = 0; i < daily.length; i++) {
    var wk = getWeekMon(daily[i].date);
    if (!wm[wk]) wm[wk] = {total:0, people:{}};
    wm[wk].total += daily[i].hours;
    if (!wm[wk].people[daily[i].person]) wm[wk].people[daily[i].person] = 0;
    wm[wk].people[daily[i].person] += daily[i].hours;
  }
  var keys = Object.keys(wm).sort();
  var out = [];
  for (var i = 0; i < keys.length; i++) out.push({sunday:keys[i], saturday:getWeekFri(keys[i]), total:wm[keys[i]].total, people:wm[keys[i]].people});
  return out;
}

function buildTeam(projId) {
  var allocs = RES[projId] || [];
  var t = {};
  var fourAgo = new Date(); fourAgo.setDate(fourAgo.getDate()-28);
  for (var i = 0; i < allocs.length; i++) {
    var a = allocs[i];
    var daily = expandAlloc(a);
    var tot = 0; for (var j = 0; j < daily.length; j++) tot += daily[j].hours;
    if (!t[a.p]) t[a.p] = {total:0, recent:0};
    t[a.p].total += tot;
    var sd = new Date(a.s+'T00:00:00');
    if (sd >= fourAgo) t[a.p].recent += tot;
  }
  /* Also merge from ALLOCATIONS (per-day format) */
  var nativeAllocs = getAllocationsForProject(projId);
  for (var i = 0; i < nativeAllocs.length; i++) {
    var a = nativeAllocs[i];
    if (a.date && a.hoursPerDay) {
      var person = a.person || 'Unknown';
      if (!t[person]) t[person] = {total:0, recent:0};
      t[person].total += a.hoursPerDay;
      var ad = new Date(a.date+'T00:00:00');
      if (ad >= fourAgo) t[person].recent += a.hoursPerDay;
    }
  }
  var arr = [];
  for (var k in t) { if (k !== 'Unknown') arr.push({name:k, total:t[k].total, recent:t[k].recent}); }
  arr.sort(function(a,b){return b.total - a.total;});
  return arr;
}

/* ── CASCADE ── */
function computeCascade(project) {
  if (!project.hasBudgetData) return project.phases.map(function(p) { return Object.assign({}, p, {adjusted:p.planned, variance:0, cascadeNote:''}); });
  var total = project.totalBudget;
  var completedActual = 0;
  var phases = project.phases;
  var activeIdx = -1;
  for (var i = 0; i < phases.length; i++) {
    if (phases[i].status === 'na') continue;
    if (phases[i].status === 'completed') completedActual += phases[i].spent;
    else if (phases[i].status === 'active' && activeIdx === -1) activeIdx = i;
  }
  var futureReserved = 0;
  for (var i = 0; i < phases.length; i++) {
    if (phases[i].status === 'future') futureReserved += phases[i].planned;
  }
  var result = [];
  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    if (p.status === 'na') {
      result.push(Object.assign({}, p, {adjusted:0, variance:0, cascadeNote:'Phase not applicable'}));
    } else if (p.status === 'completed') {
      var v = p.planned - p.spent;
      result.push(Object.assign({}, p, {adjusted:p.spent, variance:v, cascadeNote: v >= 0 ? 'Saved ' + v.toFixed(1) + ' hrs' : 'Over by ' + Math.abs(v).toFixed(1) + ' hrs'}));
    } else if (i === activeIdx) {
      var adj = total - completedActual - futureReserved;
      var v = adj - p.planned;
      result.push(Object.assign({}, p, {adjusted:adj, variance:v, cascadeNote:'Adjusted from ' + p.planned + ' to ' + adj.toFixed(1) + ' hrs'}));
    } else {
      result.push(Object.assign({}, p, {adjusted:p.planned, variance:0, cascadeNote:''}));
    }
  }
  return result;
}

/* Lazy-load actuals for a specific project if not in cache (covers pre-2025 data) */
var _lazyLoadedProjects = {};
async function ensureProjectActuals(projCode) {
  if (!SUPA_LOADED || !sparkAuth.connected) return;
  if (SUPA_ACTUALS[projCode] || _lazyLoadedProjects[projCode]) return;
  _lazyLoadedProjects[projCode] = true;
  /* Fetch ALL actuals for this project (no date filter) */
  var entries = await sparkFetchAll('labor_actuals',
    'select=id,hours,work_date,person_name,project_code,phase_key,is_billable,is_bizdev,is_timeoff,board_name&source=eq.timetracker&project_code=eq.' + projCode + '&order=work_date.desc');
  if (entries && entries.length > 0) {
    if (!SUPA_ACTUALS[projCode]) SUPA_ACTUALS[projCode] = { totalHours: 0, phases: {}, people: {}, byDate: {} };
    var sa = SUPA_ACTUALS[projCode];
    for (var i = 0; i < entries.length; i++) {
      var a = entries[i];
      sa.totalHours += a.hours || 0;
      if (a.phase_key) sa.phases[a.phase_key] = (sa.phases[a.phase_key] || 0) + (a.hours || 0);
      if (a.person_name) sa.people[a.person_name] = (sa.people[a.person_name] || 0) + (a.hours || 0);
    }
    SUPA_ACTUALS_ALL = (SUPA_ACTUALS_ALL || []).concat(entries);
  }
}

function projectSpent(proj) {
  /* Prefer Supabase actuals if loaded */
  if (SUPA_LOADED && SUPA_ACTUALS[proj.code]) {
    return SUPA_ACTUALS[proj.code].totalHours || 0;
  }
  /* Fallback to phases */
  var s = 0;
  for (var i = 0; i < proj.phases.length; i++) {
    if (proj.phases[i].status !== 'na') s += proj.phases[i].spent;
  }
  return s;
}
function isProjectCompleted(p) {
  if (p.status === 'finished' || p.status === 'complete') return true;
  /* Check if Supabase budget is marked complete */
  if (p._supabudget && p._supabudget.status === 'complete') return true;
  var nonNa = [];
  for (var i = 0; i < p.phases.length; i++) { if (p.phases[i].status !== 'na') nonNa.push(p.phases[i]); }
  if (nonNa.length === 0) return false;
  for (var i = 0; i < nonNa.length; i++) { if (nonNa[i].status !== 'completed' && nonNa[i].status !== 'complete') return false; }
  return true;
}
function allProjects() {
  var out = [];
  for (var i = 0; i < CLIENTS.length; i++) {
    var c = CLIENTS[i];
    for (var j = 0; j < c.projects.length; j++) {
      var p = c.projects[j];
      out.push(Object.assign({}, p, {clientId:c.id, clientName:c.name, clientCode:c.code, clientColor:c.color}));
    }
  }
  return out;
}
function activeProjects() {
  var all = allProjects();
  var forecast = (ALLOCATIONS && ALLOCATIONS.forecastProjects) || [];
  var out = [];
  for (var i = 0; i < all.length; i++) {
    if (isProjectCompleted(all[i])) continue;
    /* Include if it has a Supabase budget */
    if (all[i]._supabudget) { out.push(all[i]); continue; }
    if (forecast.length > 0 && forecast.indexOf(all[i].name) < 0) continue;
    out.push(all[i]);
  }
  return out;
}
function completedProjects() {
  var all = allProjects();
  var out = [];
  for (var i = 0; i < all.length; i++) { if (isProjectCompleted(all[i])) out.push(all[i]); }
  return out;
}
function clientById(id) {
  for (var i = 0; i < CLIENTS.length; i++) { if (CLIENTS[i].id === id) return CLIENTS[i]; }
  return null;
}
function projectById(id) {
  for (var i = 0; i < CLIENTS.length; i++) {
    var c = CLIENTS[i];
    for (var j = 0; j < c.projects.length; j++) {
      if (c.projects[j].id === id) return Object.assign({}, c.projects[j], {clientId:c.id, clientName:c.name, clientCode:c.code, clientColor:c.color});
    }
  }
  return null;
}

function computeHourTypes(projects) {
  var ht = {billable:{budget:0,spent:0,count:0}, bizdev:{budget:0,spent:0,count:0}, ops:{budget:0,spent:0,count:0}};
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    var type = p.hourType || 'billable';
    var sp = filteredProjectSpent(p);
    if (!ht[type]) ht[type] = {budget:0,spent:0,count:0};
    ht[type].budget += (p.totalBudget || 0);
    ht[type].spent += sp;
    ht[type].count++;
  }
  ht.total = {budget: ht.billable.budget + ht.bizdev.budget + ht.ops.budget, spent: ht.billable.spent + ht.bizdev.spent + ht.ops.spent};
  return ht;
}

  if (needsReviewCount > 0) {
    h += '<div style="background:#FFF8E1;border-left:4px solid var(--honey);border-radius:8px;padding:14px 16px;margin-bottom:20px">';
    h += '<div style="font-weight:600;color:#F57F17;margin-bottom:6px">&#9888; Needs Review: ' + needsReviewCount + ' project' + (needsReviewCount !== 1 ? 's' : '') + ' missing budget data</div>';
    h += '<div style="font-size:12px;color:#F57F17">Projects need a Supabase budget or snapshot for accurate financials. <a href="#" onclick="navigate(\'flagged\');return false" style="color:#F57F17;text-decoration:underline;font-weight:600;cursor:pointer">View flagged projects &rarr;</a></div>';
    h += '</div>';
  }

  /* ── PORTFOLIO FINANCIALS BANNER ── */
  if (snapshotCount > 0) {
    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Portfolio Financials</div><div class="snap-version">' + snapshotCount + ' project' + (snapshotCount !== 1 ? 's' : '') + ' with snapshots</div></div>';

    /* Row 1: Dollar financials */
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Client Budget</div><div class="sf-value sf-gold">$' + totalDollarBudget.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value">$' + totalLaborMU.toLocaleString() + '</div><div class="sf-sub">Cost: $' + Math.round(totalLaborCost).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Out-of-Pocket</div><div class="sf-value">$' + totalOOP.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Portfolio Reserve</div><div class="sf-value ' + (totalProfit >= 0 ? 'sf-green' : '') + '">$' + totalProfit.toLocaleString() + '</div><div class="sf-sub">' + overallProfitPct + '%</div></div>';
    h += '</div>';

    /* Row 2: Hours tracking */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Hours Budget</div><div class="sf-value">' + totalBudgetHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + totalSpentHrs.toFixed(1) + '</div><div class="sf-sub">' + pct(totalSpentHrs, totalBudgetHrs) + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value">' + remainingHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Spent</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(spentDollar).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Remaining</div><div class="sf-value">$' + Math.round(estRemainDollar).toLocaleString() + '</div></div>';
    h += '</div>';

    /* Profitability gauge */
    var profPctNum = parseFloat(overallProfitPct);
    var gaugeColor = profPctNum >= 30 ? '#81C784' : profPctNum >= 15 ? 'var(--honey)' : profPctNum >= 0 ? 'var(--sand)' : '#C62828';
    h += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:20px">';
    h += '<div style="font-size:11px;font-weight:600;color:var(--mid-gray);text-transform:uppercase;letter-spacing:.5px">Portfolio Reserve %</div>';
    h += '<div style="flex:1;height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden"><div style="height:100%;width:' + Math.min(Math.max(profPctNum, 0), 100) + '%;background:' + gaugeColor + ';border-radius:6px;transition:width .3s"></div></div>';
    h += '<div style="font-size:18px;font-weight:700;color:' + gaugeColor + '">' + overallProfitPct + '%</div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + Math.max(0, profitDollar) + totalOOP;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((totalOOP / barTotal) * 100);
    var profBarPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 8 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 8 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 8 ? '$' + totalOOP.toLocaleString() : '') + '</div>';
    if (profBarPct > 0) h += '<div class="lob-seg" style="width:' + profBarPct + '%;background:#81C784">' + (profBarPct >= 8 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Reserve</div>';
    h += '</div></div>';
    h += '</div>';
  }

  /* ── FINANCE TABLE — date-filtered hours + OOP spent per project ── */
  /* Compute per-project hours and revenue for the selected date range */
  var dateRange = getDateRange(globalDateFilter);
  var hasDateFilter = !!(dateRange && dateRange.start && dateRange.end);
  var periodLabel = hasDateFilter ? fmtDateShort(dateRange.start.toISOString().slice(0,10)) + ' – ' + fmtDateShort(dateRange.end.toISOString().slice(0,10)) : 'All Time';

  var rows = [];
  for (var i = 0; i < all.length; i++) {
    var p = all[i];
    /* Hours spent in date range from Supabase actuals */
    var hrsInRange = 0;
    var billableHrsInRange = 0;
    var peopleInRange = {};
    var entriesInRange = 0;
    if (SUPA_ACTUALS_ALL) {
      for (var j = 0; j < SUPA_ACTUALS_ALL.length; j++) {
        var a = SUPA_ACTUALS_ALL[j];
        if (a.project_code !== p.code) continue;
        if (hasDateFilter) {
          var ad = new Date(a.work_date + 'T00:00:00');
          if (ad < dateRange.start || ad > dateRange.end) continue;
        }
        hrsInRange += a.hours || 0;
        if (a.is_billable) billableHrsInRange += a.hours || 0;
        if (a.person_name) peopleInRange[a.person_name] = true;
        entriesInRange++;
      }
    }

    var revenue = billableHrsInRange * 200; /* $200/hr agency rate */
    var oopSpent = (p._supabudget && p._supabudget.oopSpent) ? p._supabudget.oopSpent : 0;
    var pBudget = p.dollarBudget || 0;
    var pLabor = p.laborCost || 0;
    var pOOP = p.oopCost || 0;
    var pProfit = p.profit || 0;
    var pMarginNum = pBudget > 0 ? (pProfit / pBudget) * 100 : 0;

    /* Determine category */
    var category = 'Client Billable';
    if (p.code === '100_00_00' || p.projectType === 'internal' || (p._supabudget && p._supabudget.status === 'nonbillable')) category = 'Non-Billable';
    else if (p.projectType === 'bizdev' || (p._supabudget && p._supabudget.status === 'bizdev')) category = 'Biz Dev';

    if (hrsInRange > 0 || (!hasDateFilter && (pBudget > 0 || (p._supabudget)))) {
      rows.push({ p:p, budget:pBudget, labor:pLabor, oop:pOOP, oopSpent:oopSpent,
        profit:pProfit, margin:pMarginNum, hrsInRange:hrsInRange,
        billableHrs:billableHrsInRange, revenue:revenue,
        people:Object.keys(peopleInRange).length, entries:entriesInRange,
        category: category });
    }
  }

  /* Sort */
  var dir = masterSortDir === 'asc' ? 1 : -1;
  rows.sort(function(a, b) {
    var va, vb;
    switch (masterSortCol) {
      case 'name': va = a.p.code || ''; vb = b.p.code || ''; return va < vb ? -dir : va > vb ? dir : 0;
      case 'client': va = (a.p.clientName||'').toLowerCase(); vb = (b.p.clientName||'').toLowerCase(); return va < vb ? -dir : va > vb ? dir : 0;
      case 'category': va = a.category; vb = b.category; return va < vb ? -dir : va > vb ? dir : 0;
      case 'budget': return (a.budget - b.budget) * dir;
      case 'hours': return (a.billableHrs - b.billableHrs) * dir;
      case 'revenue': return (a.revenue - b.revenue) * dir;
      case 'oop': return (a.oopSpent - b.oopSpent) * dir;
      case 'profit': return (a.profit - b.profit) * dir;
      case 'margin': return (a.margin - b.margin) * dir;
      default: return (a.billableHrs - b.billableHrs) * -1; /* default: most hours first */
    }
  });

  var sortArrow = function(col) {
    if (masterSortCol !== col) return ' <span style="opacity:.3;font-size:10px">&#9650;&#9660;</span>';
    return masterSortDir === 'asc' ? ' <span style="font-size:10px">&#9650;</span>' : ' <span style="font-size:10px">&#9660;</span>';
  };
  var thStyle = 'cursor:pointer;user-select:none;white-space:nowrap;font-size:11px';

  /* Totals row */
  var totalBillHrs = 0, totalRevenue = 0, totalOopSpent = 0, totalEntries = 0;
  for (var i = 0; i < rows.length; i++) {
    totalBillHrs += rows[i].billableHrs;
    totalRevenue += rows[i].revenue;
    totalOopSpent += rows[i].oopSpent;
    totalEntries += rows[i].entries;
  }

  h += '<div class="section-title" style="margin-top:28px">Finance View <span style="font-size:12px;font-weight:400;color:var(--mid-gray)">' + periodLabel + ' &middot; ' + rows.length + ' projects &middot; ' + totalBillHrs.toFixed(1) + ' billable hrs &middot; $' + Math.round(totalRevenue).toLocaleString() + ' revenue</span></div>';

  h += '<table class="phase-table"><thead><tr>';
  h += '<th style="' + thStyle + ';text-align:right;width:30px">#</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'category\')">Category' + sortArrow('category') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'client\')">Client' + sortArrow('client') + '</th>';
  h += '<th style="' + thStyle + '" onclick="toggleMasterSort(\'name\')">Project' + sortArrow('name') + '</th>';
  h += '<th style="' + thStyle + ';text-align:right" onclick="toggleMasterSort(\'hours\')">Billable Hrs' + sortArrow('hours') + '</th>';
  h += '<th style="' + thStyle + ';text-align:right" onclick="toggleMasterSort(\'revenue\')">Revenue @$200/hr' + sortArrow('revenue') + '</th>';
  h += '<th style="' + thStyle + ';text-align:center">People</th>';
  h += '<th style="' + thStyle + ';text-align:center">Entries</th>';
  h += '</tr></thead><tbody>';

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i], p = r.p;
    var catColor = r.category === 'Non-Billable' ? 'var(--mid-gray)' : r.category === 'Biz Dev' ? '#F57F17' : 'var(--ocean)';

    h += '<tr onclick="navigate(\'project:' + p.id + '\')" style="cursor:pointer">';
    h += '<td style="text-align:right;font-size:11px;color:var(--mid-gray)">' + (i + 1) + '</td>';
    h += '<td><span style="font-size:11px;font-weight:600;color:' + catColor + ';padding:2px 8px;border-radius:8px;background:' + catColor + '15">' + r.category + '</span></td>';
    h += '<td style="font-size:12px;color:var(--mid-gray)">' + (p.clientName || '') + '</td>';
    h += '<td><div style="font-size:10px;color:var(--mid-gray);font-family:monospace">' + p.code + '</div><div style="font-weight:600;font-size:13px">' + p.name + '</div></td>';
    h += '<td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600">' + r.billableHrs.toFixed(2) + '</td>';
    h += '<td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600">$' + Math.round(r.revenue).toLocaleString() + '</td>';
    h += '<td style="text-align:center;font-size:12px">' + r.people + '</td>';
    h += '<td style="text-align:center;font-size:12px">' + r.entries + '</td>';
    h += '</tr>';
  }

  /* Totals row */
  h += '<tr style="font-weight:700;border-top:2px solid var(--abyss);background:var(--cloud)">';
  h += '<td></td><td></td><td></td><td>Total (' + rows.length + ' projects)</td>';
  h += '<td style="text-align:right;font-variant-numeric:tabular-nums">' + totalBillHrs.toFixed(2) + '</td>';
  h += '<td style="text-align:right;font-variant-numeric:tabular-nums">$' + Math.round(totalRevenue).toLocaleString() + '</td>';
  h += '<td></td><td style="text-align:center">' + totalEntries + '</td>';
  h += '</tr>';
  h += '</tbody></table>';

  document.getElementById('mainContent').innerHTML = h;
}

/* ── RENDER: CLIENT ── */
function renderClient(clientId) {
  var c = clientById(clientId);
  if (!c) return;
  /* Split active vs completed */
  var activeList = [], doneList = [];
  for (var i = 0; i < c.projects.length; i++) {
    if (isProjectCompleted(c.projects[i])) doneList.push(c.projects[i]);
    else activeList.push(c.projects[i]);
  }
  var visibleList = showFinalized ? c.projects : activeList;
  var rate = getRate(c.id);

  /* Aggregate financials from snapshots and Supabase budgets */
  var totalBudget = 0, totalSpent = 0;
  var totalDollarBudget = 0, totalLaborMU = 0, totalLaborCost = 0, totalOOP = 0;
  var totalEstProfit = 0, totalActiveProfit = 0, snapshotCount = 0;
  for (var i = 0; i < visibleList.length; i++) {
    var p = visibleList[i];
    totalBudget += p.totalBudget || 0;
    totalSpent += filteredProjectSpent(p);
    if (p.dataSource === 'supabase' || p.dataSource === 'snapshot') {
      totalDollarBudget += p.dollarBudget || 0;
      totalLaborMU += p.laborCost || 0;
      /* All labor at $200/hr */
      totalLaborCost += p.laborCost || 0;
      totalOOP += p.oopCost || 0;
      totalEstProfit += p.profit || 0;
      totalActiveProfit += p.profit || 0;
      snapshotCount++;
    }
  }

  var h = '<h1 class="page-title">' + c.code + ' ' + c.name;
  h += '<span class="view-toggle"><button class="view-toggle-btn ' + (!showFinalized ? 'active' : '') + '" onclick="showFinalized=false;navigate(currentView)">Active</button>';
  h += '<button class="view-toggle-btn ' + (showFinalized ? 'active' : '') + '" onclick="showFinalized=true;navigate(currentView)">All</button></span>';
  h += '</h1>';
  var label = showFinalized ? (visibleList.length + ' total project' + (visibleList.length !== 1 ? 's' : '')) : (activeList.length + ' active project' + (activeList.length !== 1 ? 's' : '') + (doneList.length ? ' &middot; ' + doneList.length + ' completed' : ''));
  h += '<p class="page-subtitle">' + label + ' &middot; Rate: ' + (rate > 0 ? '$' + rate + '/hr' : 'Not set') + '</p>';

  /* ── CLIENT FINANCIALS BANNER (snapshot-based) ── */
  if (snapshotCount > 0) {
    var costPerHr = totalBudget > 0 ? totalLaborCost / totalBudget : 0;
    var spentDollar = totalSpent * costPerHr;
    var remainingHrs = Math.max(0, totalBudget - totalSpent);
    var estRemainDollar = remainingHrs * costPerHr;
    var totalEstPrice = totalLaborMU + totalOOP;
    var profitDollar = totalDollarBudget - totalEstPrice;
    var estProfitPct = totalDollarBudget > 0 ? Math.round((totalEstProfit / totalDollarBudget) * 10000) / 100 : 0;
    var actProfitPct = totalDollarBudget > 0 ? Math.round((totalActiveProfit / totalDollarBudget) * 10000) / 100 : 0;

    h += '<div class="snapshot-banner">';
    h += '<div class="snap-header"><div class="snap-title">Client Financials</div><div class="snap-version">' + snapshotCount + ' project' + (snapshotCount !== 1 ? 's' : '') + ' with snapshots</div></div>';

    /* Row 1: Dollar financials */
    h += '<div class="snap-financials">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Client Budget</div><div class="sf-value sf-gold">$' + totalDollarBudget.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">FMG Labor</div><div class="sf-value">$' + totalLaborMU.toLocaleString() + '</div><div class="sf-sub">Cost: $' + totalLaborCost.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Out-of-Pocket</div><div class="sf-value">$' + totalOOP.toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Est. Reserve</div><div class="sf-value sf-green">$' + totalEstProfit.toLocaleString() + '</div><div class="sf-sub">' + estProfitPct + '%</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Active Reserve</div><div class="sf-value sf-green">$' + totalActiveProfit.toLocaleString() + '</div><div class="sf-sub">' + actProfitPct + '%</div></div>';
    h += '</div>';

    /* Row 2: Hours tracking */
    h += '<div class="snap-financials" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)">';
    h += '<div class="snap-fin-item"><div class="sf-label">Total Hours Budget</div><div class="sf-value">' + totalBudget.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Spent</div><div class="sf-value" style="color:var(--ember)">' + totalSpent.toFixed(1) + '</div><div class="sf-sub">' + pct(totalSpent, totalBudget) + '% of budget</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Hours Remaining</div><div class="sf-value">' + remainingHrs.toFixed(1) + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Spent</div><div class="sf-value" style="color:var(--ember)">$' + Math.round(spentDollar).toLocaleString() + '</div></div>';
    h += '<div class="snap-fin-item"><div class="sf-label">Labor $ Remaining</div><div class="sf-value">$' + Math.round(estRemainDollar).toLocaleString() + '</div></div>';
    h += '</div>';

    /* Budget breakdown bar */
    var barTotal = spentDollar + estRemainDollar + profitDollar + totalOOP;
    if (barTotal <= 0) barTotal = 1;
    var spentPct = Math.round((spentDollar / barTotal) * 100);
    var estPct = Math.round((estRemainDollar / barTotal) * 100);
    var oopBarPct = Math.round((totalOOP / barTotal) * 100);
    var profPct = Math.max(0, 100 - spentPct - estPct - oopBarPct);
    h += '<div class="labor-oop-bar" style="margin-top:16px">';
    h += '<div class="lob-title">Budget Breakdown</div>';
    h += '<div class="lob-bar">';
    if (spentPct > 0) h += '<div class="lob-seg" style="width:' + spentPct + '%;background:var(--ember)">' + (spentPct >= 8 ? '$' + Math.round(spentDollar).toLocaleString() : '') + '</div>';
    if (estPct > 0) h += '<div class="lob-seg" style="width:' + estPct + '%;background:var(--ocean)">' + (estPct >= 8 ? '$' + Math.round(estRemainDollar).toLocaleString() : '') + '</div>';
    if (oopBarPct > 0) h += '<div class="lob-seg" style="width:' + oopBarPct + '%;background:var(--sand);color:var(--abyss)">' + (oopBarPct >= 8 ? '$' + totalOOP.toLocaleString() : '') + '</div>';
    if (profPct > 0) h += '<div class="lob-seg" style="width:' + profPct + '%;background:#81C784">' + (profPct >= 8 ? '$' + Math.round(profitDollar).toLocaleString() : '') + '</div>';
    h += '</div>';
    h += '<div class="lob-legend">';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ember)"></div>Labor Spent</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--ocean)"></div>Labor Remaining</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:var(--sand)"></div>OOP</div>';
    h += '<div class="lob-legend-item"><div class="lob-legend-dot" style="background:#81C784"></div>Reserve</div>';
    h += '</div></div>';
    h += '</div>';
  } else {
    /* Fallback for clients without any snapshots */
    h += '<div class="stats-row">';
    h += '<div class="stat-card"><div class="label">Client Budget</div><div class="value">' + fmt(totalBudget, c.id) + '</div></div>';
    h += '<div class="stat-card"><div class="label">Spent</div><div class="value">' + fmt(totalSpent, c.id) + '</div><div class="sub">' + pct(totalSpent, totalBudget) + '%</div></div>';
    h += '<div class="stat-card"><div class="label">Remaining</div><div class="value">' + fmt(totalBudget - totalSpent, c.id) + '</div></div>';
    if (rate > 0) { h += '<div class="stat-card"><div class="label">Revenue (Spent)</div><div class="value">$' + Math.round(totalSpent * rate).toLocaleString() + '</div></div>'; }
    h += '</div>';
  }

  /* ── PROJECT STATUS TABLE (built from actual time data) ── */
  h += '<div class="section-title" style="margin-top:28px">Projects <span style="font-size:11px;font-weight:400;color:var(--mid-gray)">(from tracked time)</span></div>';

  /* Build project list from SUPA_ACTUALS_ALL, filtered by date range */
  var _dateRange = (globalDateFilter && globalDateFilter !== 'all') ? getDateRange(globalDateFilter) : null;
  var _projData = {}; /* code -> {name, client, hours, billHrs, oopSpent, category, projId} */
  var _nonBill = {hours: 0, entries: 0};
  var _bizDev = {hours: 0, entries: 0};

  /* Code aliases for matching */
  var _aliases = {'322_07_01':'322_07_02','322_07_02':'322_07_02','386_10':'386_10_XXX','320_10':'320_10_XXX','321_13_01':'321_13_01_A012','378_06_03':'378_06_05',
    'unknown':'_NB','100_02':'_NB','100_00':'_NB','100_07_05':'_NB','100_05':'_NB','100_07_03':'_NB','100_01':'_NB','100_07_09':'_NB'};

  /* Non-billable codes */
  var _nbCodes = {'100_00_00':1,'100_10_01':1,'100_99_01':1,'100_99_02':1,'_NB':1};

  if (SUPA_ACTUALS_ALL && SUPA_ACTUALS_ALL.length > 0) {
    for (var ai = 0; ai < SUPA_ACTUALS_ALL.length; ai++) {
      var _a = SUPA_ACTUALS_ALL[ai];
      if (!_a.hours) continue;
