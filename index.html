/* ── RESOURCE TRACKER STATE ── */
var RT_WEEKS = [];
var RT_LEADERSHIP = [];
var rtView = 'people';
var rtShowLeadership = false;
var rtSortBy = 'project';
var rtWeekIdx = -1; /* -1 = latest week with actuals */
var rtTimeMode = 'week'; /* week | month */

function rtGetCurrentIdx() {
  if (rtWeekIdx >= 0 && rtWeekIdx < RT_WEEKS.length) return rtWeekIdx;
  /* Default: latest week with actual hours */
  for (var i = RT_WEEKS.length - 1; i >= 0; i--) {
    var tot = 0;
    for (var p in RT_WEEKS[i].people) tot += RT_WEEKS[i].people[p].actual || 0;
    if (tot > 0) return i;
  }
  return RT_WEEKS.length - 1;
}
function rtNav(dir) {
  var idx = rtGetCurrentIdx();
  if (rtTimeMode === 'week') {
    rtWeekIdx = Math.max(0, Math.min(RT_WEEKS.length - 1, idx + dir));
  } else {
    /* Jump to next/prev month */
    var curMon = RT_WEEKS[idx].sunday.substring(0, 7);
    if (dir > 0) {
      for (var i = idx + 1; i < RT_WEEKS.length; i++) {
        if (RT_WEEKS[i].sunday.substring(0, 7) !== curMon) { rtWeekIdx = i; break; }
      }
    } else {
      for (var i = idx - 1; i >= 0; i--) {
        if (RT_WEEKS[i].sunday.substring(0, 7) !== curMon) {
          /* Find first week of that month */
          var tgtMon = RT_WEEKS[i].sunday.substring(0, 7);
          for (var j = 0; j <= i; j++) {
            if (RT_WEEKS[j].sunday.substring(0, 7) === tgtMon) { rtWeekIdx = j; break; }
          }
          break;
        }
      }
    }
  }
  renderResource();
}
function rtGetMonthWeeks(startIdx) {
  /* Get all weeks in the same month as startIdx */
  var mon = RT_WEEKS[startIdx].sunday.substring(0, 7);
  var indices = [];
  for (var i = 0; i < RT_WEEKS.length; i++) {
    if (RT_WEEKS[i].sunday.substring(0, 7) === mon) indices.push(i);
  }
  return indices;
}
function rtAggregateWeeks(indices) {
  /* Combine multiple weeks into one virtual week */
  var combined = {label:'', sunday:'', people:{}};
  var labels = [];
  for (var w = 0; w < indices.length; w++) {
    var wk = RT_WEEKS[indices[w]];
    labels.push(wk.label);
    for (var pn in wk.people) {
      if (!combined.people[pn]) combined.people[pn] = {predicted:0, actual:0, projects:{}};
      combined.people[pn].predicted += wk.people[pn].predicted || 0;
      combined.people[pn].actual += wk.people[pn].actual || 0;
      var projs = wk.people[pn].projects || {};
      for (var pk in projs) {
        if (!combined.people[pn].projects[pk]) combined.people[pn].projects[pk] = {p:0, a:0};
        combined.people[pn].projects[pk].p += projs[pk].p || 0;
        combined.people[pn].projects[pk].a += projs[pk].a || 0;
      }
    }
  }
  var d = new Date(RT_WEEKS[indices[0]].sunday + 'T00:00:00');
  combined.label = d.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  combined.sunday = RT_WEEKS[indices[0]].sunday;
  return combined;
}

function rtCalcAcc(predicted, actual) {
  return Math.max(predicted, actual) > 0 ? Math.min(predicted, actual) / Math.max(predicted, actual) * 100 : 100;
}
function rtCalcAccProject(predicted, actual) {
  if (predicted === 0 && actual === 0) return 100;
  if (predicted === 0) {
    if (actual <= 0.5) return 50;
    if (actual <= 1.0) return 25;
    return 0;
  }
  return Math.min(predicted, actual) / Math.max(predicted, actual) * 100;
}

function isFutureWk(wk) {
  for (var pn in wk.people) { if ((wk.people[pn].actual || 0) > 0) return false; }
  return true;
}

function rtFilterNames(allNames) {
  if (rtShowLeadership) return allNames;
  var out = [];
  for (var i = 0; i < allNames.length; i++) {
    if (RT_LEADERSHIP.indexOf(allNames[i]) === -1) out.push(allNames[i]);
  }
  return out;
}

function renderResource() {
  if (!RT_WEEKS || RT_WEEKS.length === 0) {
    document.getElementById('mainContent').innerHTML = '<h1 class="page-title">Resource Tracker</h1><p style="color:var(--mid-gray);margin-top:12px">No resource tracker data available yet.</p>';
    return;
  }

  var useGlobalFilter = (globalDateFilter !== 'all');
  var idx = rtGetCurrentIdx();
  var wk;
  if (useGlobalFilter) {
    wk = getFilteredRTData();
  } else if (rtTimeMode === 'month') {
    var monthIndices = rtGetMonthWeeks(idx);
    wk = rtAggregateWeeks(monthIndices);
  } else {
    wk = RT_WEEKS[idx];
  }

  var isFuture = true;
  for (var pn in wk.people) { if ((wk.people[pn].actual || 0) > 0) { isFuture = false; break; } }

  var ppl = wk.people;
  var allNames = Object.keys(ppl).sort(function(a,b){ return (ppl[b].actual||0) - (ppl[a].actual||0); });
  var names = rtFilterNames(allNames);

  /* Aggregate totals */
  var totPred = 0, totAct = 0;
  for (var i = 0; i < names.length; i++) { totPred += ppl[names[i]].predicted || 0; totAct += ppl[names[i]].actual || 0; }
  var totalAcc = rtCalcAcc(totPred, totAct);
  var onTarget = 0;
  for (var i = 0; i < names.length; i++) {
    var p = ppl[names[i]].predicted || 0, a = ppl[names[i]].actual || 0;
    if (rtCalcAcc(p, a) >= 80) onTarget++;
  }

  var h = '<h1 class="page-title">Resource Tracker</h1>';
  h += '<p class="page-subtitle">Comparing resource planner predictions vs actual hours logged</p>';

  if (useGlobalFilter) {
    /* When global date filter is active, show filtered label instead of week nav */
    var range = getDateRange(globalDateFilter);
    var opts = {month:'short', day:'numeric', year:'numeric'};
    var rangeLabel = range ? (range.start.toLocaleDateString('en-US', opts) + ' – ' + range.end.toLocaleDateString('en-US', opts)) : 'Filtered';
    var filteredIndices = getFilteredWeekIndices();
    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:10px 16px;background:var(--light-gray);border-radius:8px">';
    h += '<span style="font-size:12px;color:var(--mid-gray)">Showing data for:</span>';
    h += '<span style="font-size:14px;font-weight:600;color:var(--abyss)">' + rangeLabel + '</span>';
    h += '<span style="font-size:11px;color:var(--mid-gray)">(' + filteredIndices.length + ' week' + (filteredIndices.length !== 1 ? 's' : '') + ')</span>';
    h += '</div>';
  } else {
    /* ── Standard Time navigation bar ── */
    var canPrev = (rtTimeMode === 'week') ? idx > 0 : rtGetMonthWeeks(idx)[0] > 0;
    var canNext = (rtTimeMode === 'week') ? idx < RT_WEEKS.length - 1 : rtGetMonthWeeks(idx).slice(-1)[0] < RT_WEEKS.length - 1;

    h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
    h += '<div style="display:flex;gap:4px">';
    h += '<div class="rt-tab' + (rtTimeMode === 'week' ? ' active' : '') + '" onclick="rtTimeMode=\'week\';renderResource()" style="font-size:11px;padding:4px 12px">Weekly</div>';
    h += '<div class="rt-tab' + (rtTimeMode === 'month' ? ' active' : '') + '" onclick="rtTimeMode=\'month\';renderResource()" style="font-size:11px;padding:4px 12px">Monthly</div>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;gap:8px;flex:1;justify-content:center">';
    h += '<div onclick="' + (canPrev ? 'rtNav(-1)' : '') + '" style="width:28px;height:28px;border-radius:50%;border:1px solid ' + (canPrev ? 'var(--canvas)' : 'var(--light-gray)') + ';display:flex;align-items:center;justify-content:center;cursor:' + (canPrev ? 'pointer' : 'default') + ';color:' + (canPrev ? 'var(--abyss)' : 'var(--canvas)') + ';font-size:14px;user-select:none' + (canPrev ? ';background:var(--white)' : '') + '">&#9664;</div>';
    h += '<div style="font-size:14px;font-weight:600;color:var(--abyss);min-width:200px;text-align:center">';
    if (isFuture) h += '<span style="font-size:9px;background:var(--ocean);color:var(--white);padding:2px 6px;border-radius:3px;margin-right:6px;vertical-align:middle">UPCOMING</span>';
    h += wk.label + '</div>';
    h += '<div onclick="' + (canNext ? 'rtNav(1)' : '') + '" style="width:28px;height:28px;border-radius:50%;border:1px solid ' + (canNext ? 'var(--canvas)' : 'var(--light-gray)') + ';display:flex;align-items:center;justify-content:center;cursor:' + (canNext ? 'pointer' : 'default') + ';color:' + (canNext ? 'var(--abyss)' : 'var(--canvas)') + ';font-size:14px;user-select:none' + (canNext ? ';background:var(--white)' : '') + '">&#9654;</div>';
    h += '</div>';
    h += '<div style="width:120px"></div>'; /* spacer to balance layout */
    h += '</div>';
  }

  /* Summary cards */
  h += '<div class="rt-summary">';
  h += '<div class="rt-scard"><div class="rs-label">Predicted</div><div class="rs-val">' + totPred.toFixed(1) + '</div><div class="rs-sub">total hrs planned</div></div>';
  if (isFuture) {
    h += '<div class="rt-scard"><div class="rs-label">Status</div><div class="rs-val" style="font-size:18px;color:var(--ocean)">Upcoming</div><div class="rs-sub">actuals will fill in</div></div>';
  } else {
    h += '<div class="rt-scard"><div class="rs-label">Actual</div><div class="rs-val">' + totAct.toFixed(1) + '</div><div class="rs-sub">total hrs logged</div></div>';
  }
  h += '<div class="rt-scard"><div class="rs-label">' + (isFuture ? 'People' : 'Accuracy') + '</div><div class="rs-val" style="color:' + (isFuture ? 'var(--abyss)' : accColor(totalAcc)) + '">' + (isFuture ? names.length : totalAcc.toFixed(1) + '%') + '</div><div class="rs-sub">' + (isFuture ? 'with planned allocations' : (totAct > totPred ? '+' : '') + (totAct - totPred).toFixed(1) + ' hrs variance') + '</div></div>';
  h += '<div class="rt-scard"><div class="rs-label">' + (isFuture ? 'Projects' : 'On Target') + '</div>';
  if (isFuture) {
    var projCount;
    if (wk.billableProjects !== undefined) {
      projCount = wk.billableProjects;
    } else {
      var projSet = {};
      for (var i = 0; i < names.length; i++) { var pr = ppl[names[i]].projects || {}; for (var pk in pr) { projSet[pk] = true; } }
      projCount = Object.keys(projSet).length;
    }
    h += '<div class="rs-val">' + projCount + '</div><div class="rs-sub">billable projects</div>';
  } else {
    h += '<div class="rs-val">' + onTarget + '/' + names.length + '</div><div class="rs-sub">people within 80% accuracy</div>';
  }
  h += '</div></div>';

  /* View toggle + leadership */
  h += '<div class="rt-tabs">';
  h += '<div class="rt-tab' + (rtView === 'people' ? ' active' : '') + '" onclick="rtView=\'people\';renderResource()">By Person</div>';
  h += '<div class="rt-tab' + (rtView === 'projects' ? ' active' : '') + '" onclick="rtView=\'projects\';renderResource()">By Project</div>';
  h += '<div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid-gray)">';
  h += '<span>Include Leadership</span>';
  h += '<div onclick="rtShowLeadership=!rtShowLeadership;renderResource()" style="width:36px;height:20px;border-radius:10px;background:' + (rtShowLeadership ? 'var(--ocean)' : 'var(--canvas)') + ';cursor:pointer;position:relative;transition:background .2s"><div style="width:16px;height:16px;border-radius:50%;background:var(--white);position:absolute;top:2px;' + (rtShowLeadership ? 'left:18px' : 'left:2px') + ';transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div></div>';
  h += '</div>';
  h += '</div>';

  if (rtView === 'people') {
    h += renderRTPeople(wk);
  } else {
    h += renderRTProjects(wk);
  }
  document.getElementById('mainContent').innerHTML = h;
}

function accColor(v) { return v >= 80 ? '#2E7D32' : v >= 50 ? 'var(--honey)' : 'var(--ember)'; }
function accClass(v) { return v >= 80 ? 'high' : v >= 50 ? 'mid' : 'low'; }

function renderRTPeople(wk) {
  var ppl = wk.people;
  var allFiltered = rtFilterNames(Object.keys(ppl));
  var names;
  if (rtSortBy === 'accuracy') {
    names = allFiltered.sort(function(a,b){ return rtCalcAcc(ppl[b].predicted||0,ppl[b].actual||0) - rtCalcAcc(ppl[a].predicted||0,ppl[a].actual||0); });
  } else {
    names = allFiltered.sort(function(a,b){ return (ppl[b].actual||ppl[b].predicted||0) - (ppl[a].actual||ppl[a].predicted||0); });
  }
  var maxHrs = 1;
  for (var i = 0; i < names.length; i++) { var m = Math.max(ppl[names[i]].predicted||0, ppl[names[i]].actual||0); if (m > maxHrs) maxHrs = m; }

  var sortIcon = rtSortBy === 'accuracy' ? ' &#9650;' : '';
  var h = '<div class="rt-card"><h3>Team ' + (isFutureWk(wk) ? 'Plan' : 'Accuracy') + '</h3>';
  h += '<div class="rt-row rt-hdr"><div>Person</div><div class="rt-num">Predicted</div><div class="rt-num">Actual</div><div class="rt-num">Diff</div><div>Comparison</div><div class="rt-acc" style="cursor:pointer;user-select:none" onclick="rtSortBy=rtSortBy===\'accuracy\'?\'actual\':\'accuracy\';renderResource()">' + (isFutureWk(wk) ? 'Planned' : 'Accuracy' + sortIcon) + '</div></div>';
  for (var i = 0; i < names.length; i++) {
    var n = names[i], d = ppl[n];
    var pred = d.predicted || 0, act = d.actual || 0;
    var acc = rtCalcAcc(pred, act);
    var diff = act - pred;
    var predW = (pred / maxHrs) * 100;
    var actW = (act / maxHrs) * 100;
    var pc = PC[n] || '#9B9590';
    h += '<div class="rt-row">';
    h += '<div class="rt-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + pc + ';margin-right:6px"></span>' + n + '</div>';
    h += '<div class="rt-num" style="color:var(--mid-gray)">' + pred.toFixed(1) + '</div>';
    h += '<div class="rt-num" style="font-weight:600">' + act.toFixed(1) + '</div>';
    h += '<div class="rt-num" style="color:' + (diff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (diff >= 0 ? '+' : '') + diff.toFixed(1) + '</div>';
    h += '<div class="rt-bar-wrap"><div class="rt-bar-pred" style="width:' + predW + '%"></div><div class="rt-bar-act" style="width:' + actW + '%;background:' + pc + '"></div></div>';
    h += '<div class="rt-acc ' + accClass(acc) + '">' + acc.toFixed(0) + '%</div>';
    h += '</div>';
  }
  h += '</div>';

  /* Per-person project breakdown */
  h += '<div class="rt-card"><h3>Per-Person Project Breakdown</h3>';
  for (var i = 0; i < names.length; i++) {
    var n = names[i], d = ppl[n];
    var pred = d.predicted || 0, act = d.actual || 0;
    var acc = rtCalcAcc(pred, act);
    var pc = PC[n] || '#9B9590';
    h += '<div style="margin-bottom:20px;padding:14px 0;border-bottom:1px solid var(--light-gray)">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + pc + '"></span><strong>' + n + '</strong><span style="font-size:11px;color:var(--mid-gray)">' + pred.toFixed(1) + 'h predicted → ' + act.toFixed(1) + 'h actual</span><span class="rt-acc ' + accClass(acc) + '" style="margin-left:auto">' + acc.toFixed(0) + '%</span></div>';
    var projs = d.projects || {};
    var pkeys = Object.keys(projs).sort(function(a,b){ return Math.max(projs[b].p||0,projs[b].a||0) - Math.max(projs[a].p||0,projs[a].a||0); });
    h += '<div style="display:grid;grid-template-columns:200px 60px 60px 60px 1fr;gap:6px;font-size:11px;padding-left:18px">';
    h += '<div style="color:var(--mid-gray)">Project</div><div style="color:var(--mid-gray);text-align:right">Pred</div><div style="color:var(--mid-gray);text-align:right">Act</div><div style="color:var(--mid-gray);text-align:right">Diff</div><div></div>';
    for (var j = 0; j < pkeys.length; j++) {
      var pk = pkeys[j], pv = projs[pk];
      var pp = pv.p || 0, pa = pv.a || 0;
      var pdiff = pa - pp;
      h += '<div style="font-weight:500">' + pk + '</div>';
      h += '<div style="text-align:right;color:var(--mid-gray)">' + pp.toFixed(1) + '</div>';
      h += '<div style="text-align:right;font-weight:600">' + pa.toFixed(1) + '</div>';
      h += '<div style="text-align:right;color:' + (pdiff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (pdiff >= 0 ? '+' : '') + pdiff.toFixed(1) + '</div>';
      var mh = Math.max(pp, pa); if (mh === 0) mh = 1;
      h += '<div style="display:flex;gap:2px;align-items:center"><div style="height:6px;border-radius:3px;background:var(--canvas);width:' + (pp/mh*100) + '%"></div><div style="height:6px;border-radius:3px;background:' + pc + ';width:' + (pa/mh*100) + '%"></div></div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderRTProjects(wk) {
  var ppl = wk.people;
  /* Aggregate by project across all people */
  var projAgg = {};
  var names = rtFilterNames(Object.keys(ppl));
  for (var i = 0; i < names.length; i++) {
    var projs = ppl[names[i]].projects || {};
    for (var pk in projs) {
      if (!projAgg[pk]) projAgg[pk] = {predicted:0, actual:0, people:{}};
      projAgg[pk].predicted += projs[pk].p || 0;
      projAgg[pk].actual += projs[pk].a || 0;
      if ((projs[pk].p||0) > 0 || (projs[pk].a||0) > 0) {
        projAgg[pk].people[names[i]] = {p:projs[pk].p||0, a:projs[pk].a||0};
      }
    }
  }
  /* Enrich projAgg with code and remaining */
  var projKeys = Object.keys(projAgg);
  for (var i = 0; i < projKeys.length; i++) {
    var pk = projKeys[i];
    projAgg[pk].code = PROJECT_CODES[pk] || '';
    var bud = PROJECT_BUDGETS[pk];
    projAgg[pk].remaining = bud ? bud.remaining : null;
    projAgg[pk].acc = rtCalcAccProject(projAgg[pk].predicted, projAgg[pk].actual);
    projAgg[pk].diff = projAgg[pk].actual - projAgg[pk].predicted;
  }

  /* Sort helpers — expose globally for onclick */
  window.rtProjSort = function(field) { rtSortBy = (rtSortBy === field) ? field + '_asc' : field; renderResource(); };
  var desc = rtSortBy.indexOf('_asc') === -1;
  var sortField = rtSortBy.replace('_asc','');
  function sIcon(f) { return sortField === f ? (desc ? ' &#9660;' : ' &#9650;') : ''; }
  var hdrStyle = 'cursor:pointer;user-select:none';

  if (sortField === 'project') {
    projKeys.sort(function(a,b){ return desc ? (projAgg[b].code||'').localeCompare(projAgg[a].code||'') : (projAgg[a].code||'').localeCompare(projAgg[b].code||''); });
  } else if (sortField === 'remaining') {
    projKeys.sort(function(a,b){ var ra = projAgg[a].remaining === null ? -99999 : projAgg[a].remaining; var rb = projAgg[b].remaining === null ? -99999 : projAgg[b].remaining; return desc ? rb - ra : ra - rb; });
  } else if (sortField === 'predicted') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].predicted - projAgg[a].predicted : projAgg[a].predicted - projAgg[b].predicted; });
  } else if (sortField === 'actual') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].actual - projAgg[a].actual : projAgg[a].actual - projAgg[b].actual; });
  } else if (sortField === 'diff') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].diff - projAgg[a].diff : projAgg[a].diff - projAgg[b].diff; });
  } else if (sortField === 'accuracy') {
    projKeys.sort(function(a,b){ return desc ? projAgg[b].acc - projAgg[a].acc : projAgg[a].acc - projAgg[b].acc; });
  } else {
    /* Default: sort by project code ascending */
    projKeys.sort(function(a,b){ return (projAgg[a].code||'zzz').localeCompare(projAgg[b].code||'zzz'); });
  }

  var maxHrs = 1;
  for (var i = 0; i < projKeys.length; i++) { var m = Math.max(projAgg[projKeys[i]].predicted, projAgg[projKeys[i]].actual); if (m > maxHrs) maxHrs = m; }

  /* Group projects by client code prefix and sort by project code within each group */
  function getClientFromCode(code) {
    if (!code) return '999_Unknown';
    var prefix = code.replace(/[a-zA-Z]/, '').split('_')[0];
    return prefix;
  }
  function getClientLabel(prefix) {
    for (var ci = 0; ci < CLIENTS.length; ci++) { if (CLIENTS[ci].code === prefix) return CLIENTS[ci].code + ' ' + CLIENTS[ci].name; }
    /* Check RT alias targets too */
    if (prefix === '100') return '100 Forge';
    return prefix;
  }

  /* Always sort by project code for grouping, then apply user sort within groups */
  var grouped = {};
  for (var i = 0; i < projKeys.length; i++) {
    var pk = projKeys[i], d = projAgg[pk];
    var code = d.code || '';
    var clientPrefix = getClientFromCode(code);
    if (!grouped[clientPrefix]) grouped[clientPrefix] = [];
    grouped[clientPrefix].push(pk);
  }

  /* Sort client groups by prefix */
  var clientPrefixes = Object.keys(grouped).sort();

  /* Sort projects within each group by code */
  for (var gi = 0; gi < clientPrefixes.length; gi++) {
    var grp = grouped[clientPrefixes[gi]];
    if (sortField === 'predicted') {
      grp.sort(function(a,b){ return desc ? projAgg[b].predicted - projAgg[a].predicted : projAgg[a].predicted - projAgg[b].predicted; });
    } else if (sortField === 'actual') {
      grp.sort(function(a,b){ return desc ? projAgg[b].actual - projAgg[a].actual : projAgg[a].actual - projAgg[b].actual; });
    } else if (sortField === 'diff') {
      grp.sort(function(a,b){ return desc ? projAgg[b].diff - projAgg[a].diff : projAgg[a].diff - projAgg[b].diff; });
    } else if (sortField === 'remaining') {
      grp.sort(function(a,b){ var ra = projAgg[a].remaining === null ? -99999 : projAgg[a].remaining; var rb = projAgg[b].remaining === null ? -99999 : projAgg[b].remaining; return desc ? rb - ra : ra - rb; });
    } else if (sortField === 'accuracy') {
      grp.sort(function(a,b){ return desc ? projAgg[b].acc - projAgg[a].acc : projAgg[a].acc - projAgg[b].acc; });
    } else {
      /* Default: sort by project code ascending */
      grp.sort(function(a,b){ return (projAgg[a].code||'zzz').localeCompare(projAgg[b].code||'zzz'); });
    }
  }

  var h = '<div class="rt-card"><h3>Project Accuracy</h3>';
  h += '<div class="rt-row rt-hdr rt-proj">';
  h += '<div style="' + hdrStyle + '" onclick="rtProjSort(\'project\')">Project' + sIcon('project') + '</div>';
  h += '<div class="rt-num" style="' + hdrStyle + '" onclick="rtProjSort(\'remaining\')">Remaining' + sIcon('remaining') + '</div>';
  h += '<div class="rt-num" style="' + hdrStyle + '" onclick="rtProjSort(\'predicted\')">Predicted' + sIcon('predicted') + '</div>';
  h += '<div class="rt-num" style="' + hdrStyle + '" onclick="rtProjSort(\'actual\')">Actual' + sIcon('actual') + '</div>';
  h += '<div class="rt-num" style="' + hdrStyle + '" onclick="rtProjSort(\'diff\')">Diff' + sIcon('diff') + '</div>';
  h += '<div>Comparison</div>';
  h += '<div class="rt-acc" style="' + hdrStyle + '" onclick="rtProjSort(\'accuracy\')">Accuracy' + sIcon('accuracy') + '</div>';
  h += '</div>';

  for (var gi = 0; gi < clientPrefixes.length; gi++) {
    var cp = clientPrefixes[gi];
    var grp = grouped[cp];
    /* Client group header */
    var clientLabel = getClientLabel(cp);
    var grpPred = 0, grpAct = 0;
    for (var j = 0; j < grp.length; j++) { grpPred += projAgg[grp[j]].predicted; grpAct += projAgg[grp[j]].actual; }
    h += '<div style="background:var(--abyss);padding:8px 12px;margin-top:' + (gi > 0 ? '12px' : '0') + ';border-radius:6px;display:flex;justify-content:space-between;align-items:center">';
    h += '<div style="font-weight:700;font-size:12px;color:var(--white);letter-spacing:.3px">' + clientLabel + '</div>';
    h += '<div style="font-size:11px;color:var(--mid-gray)">' + grp.length + ' project' + (grp.length !== 1 ? 's' : '') + ' &middot; ' + grpPred.toFixed(1) + 'h predicted &middot; ' + grpAct.toFixed(1) + 'h actual</div>';
    h += '</div>';

    for (var j = 0; j < grp.length; j++) {
      var pk = grp[j], d = projAgg[pk];
      var predW = (d.predicted / maxHrs) * 100;
      var actW = (d.actual / maxHrs) * 100;
      var remHrs = d.remaining;
      var remColor = remHrs === null ? 'var(--mid-gray)' : remHrs < 0 ? 'var(--ember)' : (PROJECT_BUDGETS[pk] && remHrs < PROJECT_BUDGETS[pk].budget * 0.15) ? 'var(--honey)' : '#2E7D32';
      var remText = remHrs === null ? '—' : remHrs.toFixed(1);
      var projCode = d.code || '';
      h += '<div class="rt-row rt-proj">';
      h += '<div class="rt-name">' + (projCode ? '<span style="font-size:10px;color:var(--mid-gray);font-weight:400;display:block;line-height:1.2">' + projCode + '</span>' : '') + pk + '</div>';
      h += '<div class="rt-num" style="font-weight:600;color:' + remColor + '">' + remText + '</div>';
      h += '<div class="rt-num" style="color:var(--mid-gray)">' + d.predicted.toFixed(1) + '</div>';
      h += '<div class="rt-num" style="font-weight:600">' + d.actual.toFixed(1) + '</div>';
      h += '<div class="rt-num" style="color:' + (d.diff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (d.diff >= 0 ? '+' : '') + d.diff.toFixed(1) + '</div>';
      h += '<div class="rt-bar-wrap"><div class="rt-bar-pred" style="width:' + predW + '%"></div><div class="rt-bar-act" style="width:' + actW + '%;background:var(--ocean)"></div></div>';
      h += '<div class="rt-acc ' + accClass(d.acc) + '">' + d.acc.toFixed(0) + '%</div>';
      h += '</div>';
    }
  }
  h += '</div>';

  /* Budget remaining per project */
  var budgetProjs = projKeys.filter(function(pk) { return !!PROJECT_BUDGETS[pk]; });
  if (budgetProjs.length > 0) {
    budgetProjs.sort(function(a,b) { return (PROJECT_BUDGETS[a].remaining) - (PROJECT_BUDGETS[b].remaining); });
    h += '<div class="rt-card"><h3>Hours Remaining by Project</h3>';
    h += '<p style="font-size:11px;color:var(--mid-gray);margin:-6px 0 14px">Total budget minus hours spent to date — helps prevent over-allocation</p>';
    for (var i = 0; i < budgetProjs.length; i++) {
      var pk = budgetProjs[i], b = PROJECT_BUDGETS[pk];
      var pct = b.budget > 0 ? Math.min((b.spent / b.budget) * 100, 100) : 100;
      var overPct = b.spent > b.budget ? Math.min(((b.spent - b.budget) / b.budget) * 100, 60) : 0;
      var isOver = b.remaining < 0;
      var isLow = !isOver && b.remaining < b.budget * 0.15;
      var barColor = isOver ? 'var(--ember)' : isLow ? 'var(--honey)' : 'var(--ocean)';
      var overBarColor = 'rgba(211,47,47,0.35)';
      var remColor = isOver ? 'var(--ember)' : isLow ? 'var(--honey)' : '#2E7D32';
      var statusTag = isOver ? '<span style="font-size:9px;font-weight:700;color:var(--white);background:var(--ember);padding:1px 5px;border-radius:3px;margin-left:6px">OVER</span>' : isLow ? '<span style="font-size:9px;font-weight:700;color:var(--abyss);background:var(--honey);padding:1px 5px;border-radius:3px;margin-left:6px">LOW</span>' : '';
      h += '<div style="margin-bottom:14px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      h += '<div style="font-weight:600;font-size:13px">' + pk + statusTag + '</div>';
      h += '<div style="font-size:12px;color:' + remColor + ';font-weight:700">' + (isOver ? '' : '+') + b.remaining.toFixed(1) + 'h remaining</div>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<div style="flex:1;height:10px;background:var(--light-gray);border-radius:5px;overflow:visible;position:relative">';
      h += '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:5px;position:absolute;top:0;left:0"></div>';
      if (overPct > 0) {
        h += '<div style="height:100%;width:' + overPct + '%;background:' + overBarColor + ';border-radius:0 5px 5px 0;position:absolute;top:0;left:' + pct + '%;border-left:2px solid var(--ember)"></div>';
      }
      h += '</div>';
      h += '<div style="font-size:10px;color:var(--mid-gray);min-width:90px;text-align:right">' + b.spent.toFixed(1) + ' / ' + b.budget.toFixed(0) + 'h</div>';
      h += '</div>';
      h += '</div>';
    }
    h += '</div>';
  }

  /* Per-project people breakdown */
  h += '<div class="rt-card"><h3>Per-Project Team Breakdown</h3>';
  for (var i = 0; i < projKeys.length; i++) {
    var pk = projKeys[i], d = projAgg[pk];
    var acc = rtCalcAccProject(d.predicted, d.actual);
    h += '<div style="margin-bottom:18px;padding:12px 0;border-bottom:1px solid var(--light-gray)">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><strong>' + pk + '</strong><span style="font-size:11px;color:var(--mid-gray)">' + d.predicted.toFixed(1) + 'h → ' + d.actual.toFixed(1) + 'h</span><span class="rt-acc ' + accClass(acc) + '" style="margin-left:auto">' + acc.toFixed(0) + '%</span></div>';
    var pkeys = Object.keys(d.people).sort(function(a,b){ return Math.max(d.people[b].p,d.people[b].a) - Math.max(d.people[a].p,d.people[a].a); });
    h += '<div style="display:grid;grid-template-columns:150px 60px 60px 60px 1fr;gap:6px;font-size:11px;padding-left:18px">';
    for (var j = 0; j < pkeys.length; j++) {
      var pn = pkeys[j], pv = d.people[pn];
      var pdiff = pv.a - pv.p;
      var pc = PC[pn] || '#9B9590';
      h += '<div style="font-weight:500;display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:' + pc + ';display:inline-block"></span>' + pn + '</div>';
      h += '<div style="text-align:right;color:var(--mid-gray)">' + pv.p.toFixed(1) + '</div>';
      h += '<div style="text-align:right;font-weight:600">' + pv.a.toFixed(1) + '</div>';
      h += '<div style="text-align:right;color:' + (pdiff >= 0 ? '#2E7D32' : 'var(--ember)') + '">' + (pdiff >= 0 ? '+' : '') + pdiff.toFixed(1) + '</div>';
      var mh = Math.max(pv.p, pv.a); if (mh === 0) mh = 1;
      h += '<div style="display:flex;gap:2px;align-items:center"><div style="height:6px;border-radius:3px;background:var(--canvas);width:' + (pv.p/mh*100) + '%"></div><div style="height:6px;border-radius:3px;background:' + pc + ';width:' + (pv.a/mh*100) + '%"></div></div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

/* ── COMPUTE ENGINE (builds RT_WEEKS from native allocations + actuals) ── */
function computeResourceWeeks() {
  var weekMap = {};

  /* 1. Process predicted hours from ALLOCATIONS (per-day format: each alloc has a .date field) */
  var allocs = ALLOCATIONS.allocations || [];
  for (var i = 0; i < allocs.length; i++) {
    var a = allocs[i];
    var dateField = a.date || a.weekOf; /* support both new per-day and old per-week format */
    var monISO = getMondayOfWeek ? getMondayOfWeek(dateField) : (a.weekOf || dateField);
    var mon = new Date(monISO + 'T00:00:00');
    var sun = new Date(mon); sun.setDate(sun.getDate() - 1);
    var sunKey = sun.toISOString().slice(0, 10);
    var hrs = a.hoursPerDay || a.totalHours || 0;

    if (!weekMap[sunKey]) weekMap[sunKey] = { people: {} };
    var wk = weekMap[sunKey];
    if (!wk.people[a.person]) wk.people[a.person] = { predicted: 0, actual: 0, projects: {} };
    wk.people[a.person].predicted += hrs;
    if (!wk.people[a.person].projects[a.project]) wk.people[a.person].projects[a.project] = { p: 0, a: 0 };
    wk.people[a.person].projects[a.project].p += hrs;
  }

  /* 2. Process actual hours from ACTUALS */
  var weeks = ACTUALS.weeks || [];
  for (var i = 0; i < weeks.length; i++) {
    var aw = weeks[i];
    var mon = new Date(aw.weekOf + 'T00:00:00');
    var sun = new Date(mon); sun.setDate(sun.getDate() - 1);
    var sunKey = sun.toISOString().slice(0, 10);

    if (!weekMap[sunKey]) weekMap[sunKey] = { people: {} };
    var wk = weekMap[sunKey];
    for (var pn in aw.people) {
      if (!wk.people[pn]) wk.people[pn] = { predicted: 0, actual: 0, projects: {} };
      var projs = aw.people[pn].projects || {};
      for (var proj in projs) {
        wk.people[pn].actual += projs[proj];
        if (!wk.people[pn].projects[proj]) wk.people[pn].projects[proj] = { p: 0, a: 0 };
        wk.people[pn].projects[proj].a += projs[proj];
      }
    }
  }

  /* 3. Also merge in any existing RT_WEEKS data from portfolio.json (for backward compat during migration) */
  /* This keeps old actual data visible until it's migrated to actuals.json */

  /* 4. Build sorted array */
  var sundays = Object.keys(weekMap).sort();
  var result = [];
  for (var i = 0; i < sundays.length; i++) {
    var s = sundays[i];
    var sat = new Date(s + 'T00:00:00'); sat.setDate(sat.getDate() + 6);
    var sunD = new Date(s + 'T00:00:00');
    var label = sunD.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' + sat.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    result.push({ label: label, sunday: s, people: weekMap[s].people });
  }

  /* Only replace RT_WEEKS if we have native data; otherwise keep portfolio.json data */
  if (allocs.length > 0 || weeks.length > 0) {
    /* Merge: keep portfolio.json weeks that aren't covered by native data */
    var nativeSundays = {};
    for (var i = 0; i < result.length; i++) nativeSundays[result[i].sunday] = true;
    for (var i = 0; i < RT_WEEKS.length; i++) {
      if (!nativeSundays[RT_WEEKS[i].sunday]) result.push(RT_WEEKS[i]);
    }
    result.sort(function(a, b) { return a.sunday < b.sunday ? -1 : a.sunday > b.sunday ? 1 : 0; });
    RT_WEEKS = result;
  }
}

/* ── ALLOCATION HELPERS ── */
var allocViewMode = 'week'; /* 'day' or 'week' */
var allocProjSearch = '';
var allocEditingCell = null; /* {person, date} when inline editing */

function getNextMonday() {
  var d = new Date(); var day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? 1 : 8 - day));
  return d.toISOString().slice(0, 10);
}
function getCurrentMonday() {
  var d = new Date(); var day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d.toISOString().slice(0, 10);
}
function shiftWeek(mondayISO, delta) {
  var d = new Date(mondayISO + 'T00:00:00');
  d.setDate(d.getDate() + delta * 7);
  return d.toISOString().slice(0, 10);
}
function getMondayOfWeek(dateISO) {
  var d = new Date(dateISO + 'T00:00:00'); var day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().slice(0, 10);
}
function getWeekDays(mondayISO) {
  var days = []; var d = new Date(mondayISO + 'T00:00:00');
  for (var i = 0; i < 5; i++) {
    days.push(new Date(d).toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }
  return days;
}
function fmtDayShort(iso) {
  var d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' });
}
function fmtDayNum(iso) {
  var d = new Date(iso + 'T00:00:00');
  return d.getDate();
}
function fmtMonShort(iso) {
  var d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short' });
}
function getAllocWeekLabel(mondayISO) {
  var mon = new Date(mondayISO + 'T00:00:00');
  var fri = new Date(mon); fri.setDate(fri.getDate() + 4);
  var wn = getISOWeek(mondayISO);
  return 'Week ' + wn + ' &middot; ' + mon.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' + fri.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getProjectList() {
  var forecast = (ALLOCATIONS && ALLOCATIONS.forecastProjects) || [];
  var list = [];
  for (var i = 0; i < CLIENTS.length; i++) {
    var c = CLIENTS[i];
    if (c.status === 'inactive') continue;
    for (var j = 0; j < c.projects.length; j++) {
      var p = c.projects[j];
      if (p.status === 'finished' || p.status === 'closed' || p.status === 'completed' || p.status === 'complete') continue;
      if (forecast.length > 0 && forecast.indexOf(p.name) < 0) continue;
      list.push({ client: c.name, clientCode: c.code, clientColor: c.color, name: p.name, code: p.code, id: p.id });
    }
  }
  list.sort(function(a, b) { return a.code < b.code ? -1 : a.code > b.code ? 1 : 0; });
  return list;
}

  if (window.furnaceAPI) await window.furnaceAPI.writeAllocations(ALLOCATIONS);

function allocDebouncedSave() {
  if (allocSaveTimer) clearTimeout(allocSaveTimer);
  allocSaveTimer = setTimeout(function() {
    saveAllocations();
    var el = document.getElementById('allocSaveStatus');
    if (el) { el.textContent = 'Saved'; setTimeout(function() { if (el) el.textContent = ''; }, 1500); }

/* Get hours for a specific person+date+project */
function getAllocHours(project, person, dateISO) {
  var allocs = ALLOCATIONS.allocations;
  for (var i = 0; i < allocs.length; i++) {
    var a = allocs[i];
    if (a.project === project && a.person === person && a.date === dateISO) return a.hoursPerDay;
  }
  return 0;
}

/* Get weekly total for a person on a project */
function getAllocWeekTotal(project, person, mondayISO) {
  var days = getWeekDays(mondayISO);
  var total = 0;
  var allocs = ALLOCATIONS.allocations;
  for (var i = 0; i < allocs.length; i++) {
    var a = allocs[i];
    if (a.project === project && a.person === person && days.indexOf(a.date) >= 0) total += a.hoursPerDay;
  }
  return total;
}

/* Set hours for a cell — creates or updates or deletes allocation */
function allocSetCell(project, person, dateISO, hours) {
  var allocs = ALLOCATIONS.allocations;
  var idx = -1;
  for (var i = 0; i < allocs.length; i++) {
    if (allocs[i].project === project && allocs[i].person === person && allocs[i].date === dateISO) { idx = i; break; }
  }
  if (hours <= 0) {
    if (idx >= 0) allocs.splice(idx, 1);
  } else if (idx >= 0) {
    allocs[idx].hoursPerDay = hours;
    allocs[idx].modified = new Date().toISOString();
  } else {
    allocs.push({
      id: 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      person: person, project: project, date: dateISO,
      hoursPerDay: hours,
      weekOf: getMondayOfWeek(dateISO),
      totalHours: hours, days: 1, notes: '',
      created: new Date().toISOString(), modified: new Date().toISOString()
    });
  }
  allocDebouncedSave();
}

/* Get weekly total for person across ALL projects */
function getPersonWeekTotal(person, mondayISO) {
  var days = getWeekDays(mondayISO);
  var total = 0;
  var allocs = ALLOCATIONS.allocations;
  for (var i = 0; i < allocs.length; i++) {
    if (allocs[i].person === person && days.indexOf(allocs[i].date) >= 0) total += allocs[i].hoursPerDay;
  }
  return total;
}

/* Get daily total for person across ALL projects */
function getPersonDayTotal(person, dateISO) {
  var total = 0;
  var allocs = ALLOCATIONS.allocations;
  for (var i = 0; i < allocs.length; i++) {
    if (allocs[i].person === person && allocs[i].date === dateISO) total += allocs[i].hoursPerDay;
  }
  return total;
}

/* Get people assigned to project in current week range */
function getProjectPeople(project, mondayISO) {
  var days = getWeekDays(mondayISO);
  var team = ALLOCATIONS.team || [];
  var assigned = {};
  var allocs = ALLOCATIONS.allocations;
  for (var i = 0; i < allocs.length; i++) {
    if (allocs[i].project === project && days.indexOf(allocs[i].date) >= 0) assigned[allocs[i].person] = true;
  }
  /* Return assigned people + all team for adding new ones */
  var result = [];
  for (var i = 0; i < team.length; i++) {
    if (assigned[team[i]]) result.push(team[i]);
  }
  return result;
}

  h += '</div>';

  h += '<div class="alloc-grid-area">';

  h += '<div class="at-label" id="allocWeekLabel">' + getAllocWeekLabel(allocWeekOf) + '</div>';
  h += '<button onclick="allocWeekOf=shiftWeek(allocWeekOf,1);renderAllocGrid();renderCapacityPanel()">&#9654;</button>';

  h += '<button class="' + (allocViewMode === 'week' ? 'active' : '') + '" onclick="allocViewMode=\'week\';renderAllocGrid()">Week</button>';

function renderAllocProjList() {
  var el = document.getElementById('allocProjListInner');
  if (!el) return;
  var projects = getProjectList();
  var search = (allocProjSearch || '').toLowerCase();
  var h = '';
  var lastClient = '';
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    if (search && p.name.toLowerCase().indexOf(search) < 0 && p.code.toLowerCase().indexOf(search) < 0 && p.client.toLowerCase().indexOf(search) < 0) continue;
    if (p.client !== lastClient) {
      h += '<div class="aps-client"><span style="color:' + p.clientColor + '">&#9679;</span> ' + p.clientCode + ' ' + p.client + '</div>';
      lastClient = p.client;
    }
    var isActive = allocProject === p.name;
    h += '<div class="aps-item' + (isActive ? ' active' : '') + '" onclick="allocProject=\'' + p.name.replace(/'/g, "\\'") + '\';renderAllocProjList();renderAllocGrid()">';
    h += '<span class="aps-code">' + p.code + '</span> ' + p.name;
    h += '</div>';
  }
  if (!h) h = '<div style="padding:14px;font-size:11px;color:var(--mid-gray)">No projects match.</div>';
  el.innerHTML = h;
}

function renderAllocGrid() {
  var el = document.getElementById('allocGridScroll');
  var lbl = document.getElementById('allocWeekLabel');
  if (!el) return;
  if (lbl) lbl.innerHTML = getAllocWeekLabel(allocWeekOf);

  if (!allocProject) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mid-gray);font-size:14px">Select a project from the sidebar</div>';
    return;
  }

  var team = ALLOCATIONS.team || [];
  /* Show assigned people first, then unassigned */
  var assigned = getProjectPeople(allocProject, allocWeekOf);
  var unassigned = [];
  for (var i = 0; i < team.length; i++) {
    if (assigned.indexOf(team[i]) < 0) unassigned.push(team[i]);
  }
  var people = assigned.concat(unassigned);

  var days, cols;
  if (allocViewMode === 'day') {
    days = getWeekDays(allocWeekOf);
    cols = days.length;
  } else {
    /* Week view: show 4 weeks (current + 3 ahead) */
    days = [];
    for (var w = 0; w < 4; w++) {
      days.push(shiftWeek(allocWeekOf, w));
    }
    cols = days.length;
  }

  var gridCols = '150px ' + ('1fr ').repeat(cols) + '60px'; /* extra col for row total */
  var h = '<div class="alloc-grid" style="grid-template-columns:' + gridCols + '">';

  /* Header row */
  h += '<div class="ag-corner">People</div>';
  if (allocViewMode === 'day') {
    for (var c = 0; c < days.length; c++) {
      var isToday = days[c] === new Date().toISOString().slice(0, 10);
      h += '<div class="ag-col-hdr" style="' + (isToday ? 'background:rgba(48,109,124,.08)' : '') + '">';
      h += '<span class="ag-day">' + fmtDayShort(days[c]) + '</span> ' + fmtDayNum(days[c]);
      h += '</div>';
    }
  } else {
    for (var c = 0; c < days.length; c++) {
      var wn = getISOWeek(days[c]);
      var fri = new Date(days[c] + 'T00:00:00'); fri.setDate(fri.getDate() + 4);
      h += '<div class="ag-col-hdr">';
      h += '<span class="ag-day">Week ' + wn + '</span>';
      h += fmtMonShort(days[c]) + ' ' + fmtDayNum(days[c]) + '–' + fmtDayNum(fri.toISOString().slice(0, 10));
      h += '</div>';
    }
  }
  h += '<div class="ag-col-hdr" style="font-size:10px">Total</div>';

  /* People rows */
  for (var r = 0; r < people.length; r++) {
    var person = people[r];
    var pc = PC[person] || '#9B9590';
    var rowTotal = 0;

    /* Row header */
    if (allocViewMode === 'day') {
      rowTotal = getAllocWeekTotal(allocProject, person, allocWeekOf);
    } else {
      for (var c = 0; c < days.length; c++) rowTotal += getAllocWeekTotal(allocProject, person, days[c]);
    }

    h += '<div class="ag-row-hdr"><span class="ag-person-dot" style="background:' + pc + '"></span>' + person;
    if (rowTotal > 0) h += '<span class="ag-person-total">' + rowTotal.toFixed(1) + 'h</span>';
    h += '</div>';

    /* Cells */
    for (var c = 0; c < days.length; c++) {
      var cellKey, cellVal;
      if (allocViewMode === 'day') {
        cellKey = days[c];
        cellVal = getAllocHours(allocProject, person, cellKey);
      } else {
        cellKey = days[c]; /* Monday of that week */
        cellVal = getAllocWeekTotal(allocProject, person, cellKey);
      }

      var isEditing = allocEditingCell && allocEditingCell.person === person && allocEditingCell.date === cellKey;

      h += '<div class="ag-cell' + (cellVal > 0 ? ' ag-cell-filled' : '') + '"';
      if (!isEditing) {
        if (allocViewMode === 'day') {
          h += ' onclick="allocStartEdit(\'' + person.replace(/'/g, "\\'") + '\',\'' + cellKey + '\')"';
        } else {
          /* In week view, clicking expands to day view for that week */
          h += ' onclick="allocWeekOf=\'' + cellKey + '\';allocViewMode=\'day\';renderAllocGrid()"';
        }
      }
      h += '>';

      if (isEditing) {
        h += '<input class="ag-cell-input" type="number" min="0" max="24" step="0.5" value="' + (cellVal || '') + '" id="allocCellInput" '
          + 'onblur="allocFinishEdit(\'' + person.replace(/'/g, "\\'") + '\',\'' + cellKey + '\',this.value)" '
          + 'onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){allocEditingCell=null;renderAllocGrid();}" '
          + 'autofocus>';
      } else if (cellVal > 0) {
        if (allocViewMode === 'day') {
          h += '<div class="ag-cell-val" style="background:' + pc + '">' + cellVal + ' h/d</div>';
        } else {
          h += '<div class="ag-cell-val" style="background:' + pc + '">' + cellVal.toFixed(1) + 'h</div>';
        }
      } else {
        h += '<div class="ag-cell-empty"></div>';
      }
      h += '</div>';
    }

    /* Row total */
    var weekTotalAll = getPersonWeekTotal(person, allocWeekOf);
    var cap = ALLOCATIONS.weeklyCapacity || 40;
    var tColor = weekTotalAll > cap ? 'var(--ember)' : weekTotalAll >= cap * 0.8 ? 'var(--honey)' : 'var(--mid-gray)';
    h += '<div class="ag-col-hdr" style="font-size:11px;font-weight:700;color:' + tColor + ';border-bottom:1px solid var(--light-gray)">' + (weekTotalAll > 0 ? weekTotalAll.toFixed(1) : '') + '</div>';
  }

  /* Add person row */
  h += '<div class="ag-row-hdr" style="cursor:pointer;color:var(--ocean);font-size:12px" onclick="allocShowAddPerson()">+ Add person</div>';
  for (var c = 0; c <= cols; c++) h += '<div class="ag-cell" style="border-bottom:none"></div>';

  h += '</div>';
  el.innerHTML = h;

  /* Focus input if editing */
  if (allocEditingCell) {
    var inp = document.getElementById('allocCellInput');
    if (inp) { inp.focus(); inp.select(); }
  }
}

function allocStartEdit(person, dateISO) {
  allocEditingCell = { person: person, date: dateISO };
  renderAllocGrid();
}

function allocFinishEdit(person, dateISO, value) {
  allocEditingCell = null;
  var hrs = parseFloat(value) || 0;
  allocSetCell(allocProject, person, dateISO, hrs);
  renderAllocGrid();
  renderCapacityPanel();
}

function allocShowAddPerson() {
  /* Quick: add first unassigned person with 0 hours so they appear in the grid */
  var team = ALLOCATIONS.team || [];
  var assigned = getProjectPeople(allocProject, allocWeekOf);
  for (var i = 0; i < team.length; i++) {
    if (assigned.indexOf(team[i]) < 0) {
      /* Start editing their first day cell */
      var firstDay = getWeekDays(allocWeekOf)[0];
      allocStartEdit(team[i], firstDay);
      return;
    }
  }
}

function renderCapacityPanel() {
  var el = document.getElementById('allocCapPanel');
  if (!el) return;
  var maxCap = ALLOCATIONS.weeklyCapacity || 40;
  var team = ALLOCATIONS.team || [];

  /* Build capacity data for current week */
  var people = [];
  for (var i = 0; i < team.length; i++) {
    var total = getPersonWeekTotal(team[i], allocWeekOf);
    /* Get project breakdown */
    var projMap = {};
    var days = getWeekDays(allocWeekOf);
    var allocs = ALLOCATIONS.allocations;
    for (var j = 0; j < allocs.length; j++) {
      if (allocs[j].person === team[i] && days.indexOf(allocs[j].date) >= 0) {
        if (!projMap[allocs[j].project]) projMap[allocs[j].project] = 0;
        projMap[allocs[j].project] += allocs[j].hoursPerDay;
      }
    }
    people.push({ name: team[i], total: total, projects: projMap });
  }
  people.sort(function(a, b) { return b.total - a.total; });

  var totalAllocated = 0;
  var activeCount = 0;
  for (var i = 0; i < people.length; i++) {
    totalAllocated += people[i].total;
    if (people[i].total > 0) activeCount++;
  }

  var h = '';
  h += '<h3>Team Capacity</h3>';
  h += '<div class="cap-sub">' + totalAllocated.toFixed(1) + ' hrs &bull; ' + activeCount + ' people allocated</div>';

  for (var i = 0; i < people.length; i++) {
    var p = people[i];
    var pct = maxCap > 0 ? (p.total / maxCap) * 100 : 0;
    var colorClass = pct >= 100 ? 'cap-red' : pct >= 80 ? 'cap-yellow' : 'cap-green';
    var pc = PC[p.name] || '#9B9590';

    h += '<div class="cap-person">';
    h += '<div class="cap-person-header">';
    h += '<div class="cap-person-name"><span class="cp-dot" style="background:' + pc + '"></span>' + p.name + '</div>';
    h += '<div class="cap-person-hrs ' + colorClass + '">' + p.total.toFixed(1) + ' / ' + maxCap + '</div>';
    h += '</div>';
    h += '<div class="cap-bar">';
    var projKeys = Object.keys(p.projects).sort(function(a, b) { return p.projects[b] - p.projects[a]; });
    var segColors = ['var(--ocean)', 'var(--honey)', 'var(--ember)', '#7A8B6F', '#9B8EC2', '#6B9DAD', '#B8948A', '#5B7FAF'];
    for (var j = 0; j < projKeys.length; j++) {
      var segPct = maxCap > 0 ? (p.projects[projKeys[j]] / maxCap) * 100 : 0;
      h += '<div class="cap-bar-seg" style="width:' + Math.min(segPct, 100) + '%;background:' + segColors[j % segColors.length] + '" title="' + projKeys[j] + ': ' + p.projects[projKeys[j]].toFixed(1) + 'h"></div>';
    }
    h += '</div>';
    if (projKeys.length > 0) {
      h += '<div class="cap-projects">';
      var parts = [];
      for (var j = 0; j < projKeys.length; j++) parts.push(projKeys[j] + ' ' + p.projects[projKeys[j]].toFixed(1) + 'h');
      h += parts.join(' &bull; ');
      h += '</div>';
    }
    h += '</div>';
  }

  el.innerHTML = h;
}

/* ── NAVIGATION ── */
function navigate(view) {
  currentView = view;
  if (view.indexOf('client:') === 0) {
    openClients[view.split(':')[1]] = true;
  } else if (view.indexOf('project:') === 0) {
    var pid = view.split(':')[1];
    for (var i = 0; i < CLIENTS.length; i++) {
      for (var j = 0; j < CLIENTS[i].projects.length; j++) {
        if (CLIENTS[i].projects[j].id === pid) openClients[CLIENTS[i].id] = true;
      }
    }
  }
  renderSidebar();
  if (view === 'master') renderMaster();
  else if (view === 'flagged') renderFlagged();
  else if (view === 'completed') renderCompleted();
  else if (view === 'resource') renderResource();
  else if (view === 'allocations') renderAllocations();
  else if (view === 'settings') renderSettings();
  else if (view.indexOf('client:') === 0) renderClient(view.split(':')[1]);
  else if (view.indexOf('project:') === 0) renderProject(view.split(':')[1]);
}

function buildProjectBudgetLookup() {
  PROJECT_BUDGETS = {};
  PROJECT_CODES = {};
  /* Build lookup from portfolio client/project data */
  var portfolioBudgets = {};
  var portfolioCodes = {};
  for (var i = 0; i < CLIENTS.length; i++) {
    var projs = CLIENTS[i].projects || [];
    for (var j = 0; j < projs.length; j++) {
      var p = projs[j];
      portfolioCodes[p.name] = p.code || '';
      if (p.hasBudgetData) {
        var spent = 0;
        var phases = p.phases || [];
        for (var k = 0; k < phases.length; k++) spent += phases[k].spent || 0;
        portfolioBudgets[p.name] = { budget: p.totalBudget || 0, spent: spent, remaining: (p.totalBudget || 0) - spent };
      }
    }
  }
  /* Map RT project names to budget entries (exact + alias) */
  var allRTNames = {};
  for (var w = 0; w < RT_WEEKS.length; w++) {
    var ppl = RT_WEEKS[w].people || {};
    for (var pn in ppl) {
      var pr = ppl[pn].projects || {};
      for (var pk in pr) allRTNames[pk] = true;
    }
  }
  for (var rtName in allRTNames) {
    if (portfolioBudgets[rtName]) {
      PROJECT_BUDGETS[rtName] = portfolioBudgets[rtName];
    } else if (RT_BUDGET_ALIASES[rtName] && portfolioBudgets[RT_BUDGET_ALIASES[rtName]]) {
      PROJECT_BUDGETS[rtName] = portfolioBudgets[RT_BUDGET_ALIASES[rtName]];
    }
    if (portfolioCodes[rtName]) {
      PROJECT_CODES[rtName] = portfolioCodes[rtName];
    } else if (RT_BUDGET_ALIASES[rtName] && portfolioCodes[RT_BUDGET_ALIASES[rtName]]) {
      PROJECT_CODES[rtName] = portfolioCodes[RT_BUDGET_ALIASES[rtName]];
    }
  }
}

/* ── DATA LOADER ── */
async function loadData() {
  try {
    var resp = await fetch('data/portfolio.json');
    var data = await resp.json();
    CLIENTS = data.clients || [];
    FLAGGED_NO_STRUCTURE = data.flaggedNoStructure || [];
    FLAGGED_DATA_MISMATCH = data.flaggedDataMismatch || [];
    PC = data.personColors || {};
    RES = data.resourceAllocations || {};
    RT_WEEKS = data.resourceTrackerWeeks || [];
    RT_LEADERSHIP = data.leadershipFilter || [];
    METADATA = data.metadata || {};
    var lu = document.getElementById('lastUpdated');
    if (lu && data.lastUpdated) {
      lu.textContent = 'Updated ' + new Date(data.lastUpdated).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
    }
    buildProjectBudgetLookup();

    /* Load native allocation data if running in Electron */
    if (window.furnaceAPI) {
      try {
        var allocData = await window.furnaceAPI.readAllocations();
        if (allocData) ALLOCATIONS = allocData;
        var actualsData = await window.furnaceAPI.readActuals();
        if (actualsData) ACTUALS = actualsData;
        computeResourceWeeks();
      } catch(ae) {
        console.warn('Could not load native allocations:', ae);
      }
    }

    navigate('master');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div style="padding:60px 40px;text-align:center"><h2 style="color:var(--ember)">Unable to load portfolio data</h2><p style="color:var(--mid-gray);margin-top:12px">Could not fetch data/portfolio.json</p><p style="color:var(--mid-gray);margin-top:4px;font-size:11px">' + e.message + '</p><p style="color:var(--mid-gray);margin-top:16px;font-size:12px">If running locally, start a server:<br><code style="background:#f5f3f0;padding:2px 6px;border-radius:3px">npx serve .</code></p></div>';
  }
}

/* ── INIT ── */
loadData();
